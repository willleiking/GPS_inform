<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover, maximum-scale=1.0">
    <title>🟢 TribeRadar 同好聚落雷達 - 穩定修正版</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root {
            --bg: #0b0c10;
            --surface: #151a21;
            --surface2: #1f2630;
            --border: #2ecc7130;
            --text: #95a5a6;
            --text-bright: #2ecc71;
            --accent: #2ecc71; 
            --danger: #e74c3c;
            --warning: #f1c40f;
            --radius: 12px;
            --radius-sm: 8px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang TC', sans-serif;
            background: var(--bg); color: var(--text); padding: 10px; display: flex; flex-direction: column; align-items: center;
        }
        .app-container { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 12px; }
        .card {
            background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border);
            padding: 16px; display: flex; flex-direction: column; gap: 12px;
        }
        .card-title { font-size: 0.9rem; font-weight: 700; color: #fff; display: flex; align-items: center; gap: 6px; }
        
        .btn {
            padding: 12px; border-radius: 20px; border: none; font-weight: 700; font-size: 0.85rem;
            cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 6px; transition: all 0.2s;
        }
        .btn-primary { background: var(--accent); color: #000; width: 100%; }
        .btn-outline { background: transparent; color: var(--accent); border: 1px solid var(--accent); border-radius: 20px; padding: 6px 12px; font-size: 0.8rem; }
        .btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); border-radius: 50%; width: 28px; height: 28px; padding: 0; display: inline-flex; align-items: center; justify-content: center; }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .stat-box { background: var(--surface2); padding: 12px; border-radius: var(--radius-sm); text-align: center; }
        .stat-val { font-size: 1.2rem; font-weight: bold; color: var(--accent); margin-bottom: 4px; }
        .stat-lbl { font-size: 0.7rem; color: #7f8c8d; }

        select, input, textarea { background: var(--surface2); border: 1px solid rgba(255,255,255,0.1); border-radius: var(--radius-sm); padding: 10px; color: #fff; outline: none; font-family: inherit; font-size: 0.85rem; width: 100%; }

        /* 🟢 Radar 盤面面 */
        .radar-panel { display: flex; flex-direction: column; align-items: center; background: #070a0e; padding: 10px; }
        .radar-outer {
            position: relative; border: 4px solid var(--accent); border-radius: 50%; width: 100%; padding-bottom: 100%;
            overflow: hidden; box-shadow: inset 0 0 30px rgba(0,0,0,1), 0 0 15px rgba(46,204,113,0.3);
        }
        #radarMap { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .radar-sweeper {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 999; pointer-events: none; border-radius: 50%;
            background: conic-gradient(from 0deg, rgba(46,204,113,0.3) 0deg, rgba(46,204,113,0) 90deg, transparent 360deg);
            animation: radar-sweep 4s infinite linear;
        }
        @keyframes radar-sweep { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        #historyMap { width: 100%; height: 250px; border-radius: var(--radius-sm); margin-top: 5px; }
        .list-row { background: var(--surface2); border-radius: var(--radius-sm); padding: 12px; display: flex; align-items: center; justify-content: space-between; font-size: 0.85rem; }
        
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        .input-group label { font-size: 0.75rem; color: var(--accent); font-weight: bold; }

        .hidden { display: none !important; }
        .toast-container { position: fixed; top: 16px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 6px; width: 90%; max-width: 400px; }
        .toast { padding: 12px; border-radius: 8px; font-size: 0.8rem; text-align: center; color: #fff; font-weight: bold; }
        .toast.error { background: #c0392b; }
        .toast.success { background: #27ae60; }
    </style>
</head>
<body>

    <div class="toast-container" id="toastContainer"></div>

    <div class="app-container" id="authPage">
        <div class="card" style="text-align:center;">
            <h2 style="color:var(--accent)">🟢 TribeRadar 同好聚落雷達</h2>
            <p style="font-size:0.75rem; color:var(--accent);" id="connStatus">探索主機連線中...</p>
        </div>
        <div class="card">
            <div class="input-group"><label>EMAIL</label><input type="email" id="authEmail" placeholder="example@gmail.com"></div>
            <div class="input-group"><label>密碼 (至少 6 碼)</label><input type="password" id="authPassword"></div>
            <div class="input-group hidden" id="nickGroup"><label>探索暱稱</label><input type="text" id="authNickname" placeholder="請輸入暱稱"></div>
            <button class="btn btn-primary" id="authActionBtn" onclick="handleAuth()">進入同好網格</button>
            <button class="btn btn-outline" style="font-size:0.75rem; margin-top: 5px;" id="authToggleBtn" onclick="toggleAuthMode()">初次探索？切換註冊帳號</button>
        </div>
    </div>

    <div class="app-container hidden" id="mainApp">
        
        <div class="card radar-panel">
            <div class="radar-outer">
                <div id="radarMap"></div>
                <div class="radar-sweeper" id="sweeperEl"></div>
            </div>
            <div id="geoStatus" style="font-size:0.7rem; font-family:monospace; margin-top:8px; color:var(--accent);">中心探索中...</div>
        </div>

        <div class="card">
            <div class="card-title">🛰️ 雷達控制台</div>
            <div style="display:flex; gap:8px;">
                <button class="btn btn-primary" id="trackBtn" onclick="toggleTracking()">▶️ 啟動雷達掃描</button>
                <button class="btn btn-outline" onclick="handleLogout()" style="color:var(--danger); border-color:var(--danger)">登出</button>
            </div>
        </div>

        <div class="card">
            <div class="card-title">🧑‍🤝‍🧑 好友偵測邊界</div>
            <div id="friendList" style="display:flex; flex-direction:column; gap:6px;"></div>
            <div style="display:grid; grid-template-columns: 1fr auto; gap:6px; margin-top:4px;">
                <input type="text" id="fNick" placeholder="好友暱稱">
                <button class="btn btn-outline" onclick="addFriend()">+ 綁定好友</button>
            </div>
        </div>

        <div class="card">
            <div class="card-title">📍 定點目標區域</div>
            <div id="targetList" style="display:flex; flex-direction:column; gap:6px;"></div>
            <div style="display:grid; grid-template-columns: 1fr auto; gap:6px; margin-top:4px;">
                <input type="text" id="tName" placeholder="地點名稱 (如: 捷運海山站)">
                <button class="btn btn-outline" onclick="addStaticTarget()">+ 新增定點</button>
            </div>
        </div>

        <div class="card">
            <div class="card-title">📅 期間限定活動</div>
            <div id="eventList" style="display:flex; flex-direction:column; gap:6px;"></div>
            <div style="display:grid; grid-template-columns: 1fr auto; gap:6px; margin-top:4px;">
                <input type="text" id="evTitle" placeholder="活動名稱">
                <button class="btn btn-outline" onclick="addEvent()">+ 新增活動</button>
            </div>
        </div>

        <div class="card">
            <div class="card-title">📅 時間區間</div>
            <div style="display:flex; align-items:center; gap:6px;">
                <select id="dateStart">
                    <option value="2026-06-10">2026/06/10</option>
                    <option value="2026-06-15">2026/06/15</option>
                </select>
                <span>～</span>
                <select id="dateEnd">
                    <option value="2026-06-17">2026/06/17</option>
                    <option value="2026-06-25">2026/06/25</option>
                </select>
            </div>
            <button class="btn btn-primary" onclick="queryHistoryLogs()">🔍 查詢軌跡歷程</button>
        </div>

        <div class="card">
            <div class="card-title">📊 數據摘要</div>
            <div class="grid-2">
                <div class="stat-box"><div class="stat-val" id="statDistance">--</div><div class="stat-lbl">總移動距離</div></div>
                <div class="stat-box"><div class="stat-val" id="statDuration">--</div><div class="stat-lbl">總停留時間</div></div>
            </div>
            <div class="grid-2">
                <div class="stat-box"><div class="stat-val" id="statCount">--</div><div class="stat-lbl">停留次數</div></div>
                <div class="stat-box"><div class="stat-val" id="statTopPlace">--</div><div class="stat-lbl">最常停留點</div></div>
            </div>
        </div>

        <div class="card">
            <div class="card-title">🗺️ 軌跡歷程地圖</div>
            <div id="historyMap"></div>
        </div>

        <div class="card">
            <div class="card-title">📈 每日移動距離</div>
            <div id="dailyDistList" style="font-size:0.8rem; display:flex; flex-direction:column; gap:4px;">
                暫無歷史查詢數據
            </div>
        </div>
    </div>

    <script>
        // ======= 🛡️ 防禦性全域變數宣告區（避免任何重複 Identifier 衝突） =======
        window.SUPABASE_URL = 'https://hknxdvefnuxgyepuuqra.supabase.co';
        window.SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhrbnhkdmVmbnV4Z3llcHV1cXJhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1MzM0MDAsImV4cCI6MjA5NzEwOTQwMH0.M97OwM_9CrLCrgxbyA6kQs0MLFiRDzyYlvIiGqhBGec';
        
        // 核心檢查：如果 window.dbClient 還不存在，就初始化它。後面全部用 dbClient 代替，繞開常規常數宣告。
        if (!window.dbClient) {
            window.dbClient = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_KEY);
        }

        let currentUser = null, tracking = false, watchId = null, currentPosition = null;
        let radarMap = null, myMarker = null, radarCircle = null;
        let historyMap = null, historyPolyline = null;
        let radarLayers = [], historyMarkers = [];
        let isRegister = false;

        function showToast(msg, type='info') {
            const t = document.createElement('div'); t.className = `toast ${type}`; t.textContent = msg;
            document.getElementById('toastContainer').appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }

        function toggleAuthMode() {
            isRegister = !isRegister;
            document.getElementById('nickGroup').classList.toggle('hidden', !isRegister);
            document.getElementById('authActionBtn').textContent = isRegister ? '註冊新探索帳號' : '進入同好網格';
            document.getElementById('authToggleBtn').textContent = isRegister ? '已有帳號？返回登入' : '初次探索？切換註冊帳號';
        }

        function calcDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const φ1 = lat1 * Math.PI/180, φ2 = lat2 * Math.PI/180;
            const Δφ = (lat2-lat1) * Math.PI/180, Δλ = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) + Math.cos(φ1) * Math.cos(φ2) * Math.sin(Δλ/2) * Math.sin(Δλ/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        async function handleAuth() {
            const email = document.getElementById('authEmail').value.trim();
            const password = document.getElementById('authPassword').value;
            if(!email || !password) { showToast('⚠️ 請完整填寫欄位', 'error'); return; }
            try {
                if(isRegister) {
                    const nick = document.getElementById('authNickname').value.trim() || '未命名同好';
                    const { data, error } = await window.dbClient.auth.signUp({ email, password, options: { data: { nickname: nick } } });
                    if(error) throw error;
                    if(data.user) {
                        await window.dbClient.from('profiles').insert({ id: data.user.id, email, nickname: nick });
                    }
                    showToast('🎉 帳號建立成功！請登入。', 'success');
                    toggleAuthMode();
                } else {
                    const { data, error } = await window.dbClient.auth.signInWithPassword({ email, password });
                    if(error) throw error;
                    currentUser = data.user;
                    enterMainApp();
                }
            } catch(e) { showToast(e.message, 'error'); }
        }

        function initRadarMap(lat, lng) {
            if (radarMap) {
                radarMap.setView([lat, lng]);
                if(myMarker) myMarker.setLatLng([lat, lng]);
                if(radarCircle) radarCircle.setLatLng([lat, lng]);
                return;
            }
            radarMap = L.map('radarMap', { zoomControl: false, attributionControl: false }).setView([lat, lng], 14);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(radarMap);

            myMarker = L.marker([lat, lng], {
                icon: L.divIcon({ className: '', html: `<div style="background:#fff; width:12px; height:12px; border-radius:50%; border:2px solid var(--accent); box-shadow:0 0 10px var(--accent);"></div>`, iconSize:[12,12], iconAnchor:[6,6] })
            }).addTo(radarMap);

            radarCircle = L.circle([lat, lng], { radius: 500, color: 'var(--accent)', weight: 1, fillColor: 'var(--accent)', fillOpacity: 0.02 }).addTo(radarMap);
        }

        function initHistoryMap() {
            if (historyMap) return;
            historyMap = L.map('historyMap', { zoomControl: true, attributionControl: false }).setView([25.0451, 121.4525], 13);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(historyMap);
        }

        async function refreshDashboardData() {
            if(!currentUser) return;
            radarLayers.forEach(l => radarMap.removeLayer(l));
            radarLayers = [];

            // 1. 讀取好友邊界
            const { data: friends } = await window.dbClient.from('friendships').select('*');
            let fHtml = '';
            if(friends) {
                friends.forEach(f => {
                    fHtml += `<div class="list-row"><div>👤 <b>${f.friend_nickname}</b> <span style="color:var(--accent)">半徑 ${f.alert_radius}m</span></div><button class="btn-danger" onclick="deleteItem('friendships','${f.id}')">×</button></div>`;
                });
            }
            document.getElementById('friendList').innerHTML = fHtml || '<div style="font-size:0.75rem; color:#666; text-align:center;">尚無好友設定</div>';

            // 2. 讀取定點目標
            const { data: targets } = await window.dbClient.from('static_targets').select('*');
            let tHtml = '';
            if(targets) {
                targets.forEach(t => {
                    tHtml += `<div class="list-row"><div>📍 <b>${t.name}</b> <span style="color:var(--danger)">半徑 500m</span></div><button class="btn-danger" onclick="deleteItem('static_targets','${t.id}')">×</button></div>`;
                    if(radarMap) {
                        const tm = L.marker([t.lat, t.lng], { icon: L.divIcon({ html: `<div style="background:var(--danger); width:10px; height:10px; border-radius:50%; box-shadow:0 0 8px var(--danger);"></div>` }) }).addTo(radarMap).bindPopup(`📍 定點: ${t.name}`);
                        radarLayers.push(tm);
                    }
                });
            }
            document.getElementById('targetList').innerHTML = tHtml || '<div style="font-size:0.75rem; color:#666; text-align:center;">尚無定點設定</div>';

            // 3. 讀取期間限定活動
            const { data: evs } = await window.dbClient.from('events').select('*');
            let eHtml = '';
            if(evs) {
                evs.forEach(e => {
                    eHtml += `<div class="list-row"><div>📅 <b>${e.title}</b></div><button class="btn-danger" onclick="deleteItem('events','${e.id}')">×</button></div>`;
                    if(radarMap) {
                        const em = L.marker([e.lat, e.lng], { icon: L.divIcon({ html: `<div style="background:var(--warning); width:10px; height:10px; border-radius:50%; box-shadow:0 0 8px var(--warning);"></div>` }) }).addTo(radarMap).bindPopup(`📅 活動: ${e.title}`);
                        radarLayers.push(em);
                    }
                });
            }
            document.getElementById('eventList').innerHTML = eHtml || '<div style="font-size:0.75rem; color:#666; text-align:center;">⚖️ 尚無活動</div>';
        }

        async function addFriend() {
            const nick = document.getElementById('fNick').value.trim();
            if(!nick) return;
            await window.dbClient.from('friendships').insert({ user_id: currentUser.id, friend_nickname: nick, alert_radius: 500 });
            document.getElementById('fNick').value = '';
            refreshDashboardData();
        }

        async function addStaticTarget() {
            const name = document.getElementById('tName').value.trim();
            if(!name || !currentPosition) { showToast('⚠️ 請輸入名稱或開啟雷達取得定位', 'error'); return; }
            await window.dbClient.from('static_targets').insert({ user_id: currentUser.id, name, lat: currentPosition.lat, lng: currentPosition.lng });
            document.getElementById('tName').value = '';
            refreshDashboardData();
        }

        async function addEvent() {
            const title = document.getElementById('evTitle').value.trim();
            if(!title || !currentPosition) { showToast('⚠️ 請輸入活動名稱並定位', 'error'); return; }
            await window.dbClient.from('events').insert({ user_id: currentUser.id, title, lat: currentPosition.lat, lng: currentPosition.lng });
            document.getElementById('evTitle').value = '';
            refreshDashboardData();
        }

        async function deleteItem(table, id) {
            await window.dbClient.from(table).delete().eq('id', id);
            refreshDashboardData();
        }

        function toggleTracking() {
            const btn = document.getElementById('trackBtn');
            const sweeper = document.getElementById('sweeperEl');
            if (tracking) {
                if(watchId) navigator.geolocation.clearWatch(watchId);
                tracking = false;
                btn.textContent = '▶️ 啟動雷達掃描';
                btn.style.background = 'var(--accent)';
                sweeper.style.animationPlayState = 'paused';
            } else {
                watchId = navigator.geolocation.watchPosition(async pos => {
                    currentPosition = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                    document.getElementById('geoStatus').textContent = `Lat: ${currentPosition.lat.toFixed(6)}, Lng: ${currentPosition.lng.toFixed(6)}`;
                    
                    initRadarMap(currentPosition.lat, currentPosition.lng);
                    
                    // 同步到資料庫
                    await window.dbClient.from('profiles').update({ current_lat: currentPosition.lat, current_lng: currentPosition.lng }).eq('id', currentUser.id);
                    await window.dbClient.from('location_logs').insert({ user_id: currentUser.id, lat: currentPosition.lat, lng: currentPosition.lng });
                    
                    refreshDashboardData();
                }, e => showToast('GPS 定位失敗: ' + e.message, 'error'), { enableHighAccuracy: true });
                tracking = true;
                btn.textContent = '⏸️ 停止雷達監控';
                btn.style.background = 'var(--danger)';
                sweeper.style.animationPlayState = 'running';
            }
        }

        async function queryHistoryLogs() {
            if(!historyMap) initHistoryMap();
            
            historyMarkers.forEach(m => historyMap.removeLayer(m));
            historyMarkers = [];
            if(historyPolyline) { historyMap.removeLayer(historyPolyline); historyPolyline = null; }

            const start = document.getElementById('dateStart').value + 'T00:00:00Z';
            const end = document.getElementById('dateEnd').value + 'T23:59:59Z';

            const { data: logs, error } = await window.dbClient.from('location_logs')
                .select('*')
                .eq('user_id', currentUser.id)
                .gte('created_at', start)
                .lte('created_at', end)
                .order('created_at', { ascending: true });

            if(error || !logs || logs.length === 0) {
                showToast('📭 該區間內查無軌跡歷史數據', 'error');
                return;
            }

            let latlngs = [];
            let totalDist = 0;

            logs.forEach((log, i) => {
                latlngs.push([log.lat, log.lng]);
                if(i > 0) {
                    totalDist += calcDistance(logs[i-1].lat, logs[i-1].lng, log.lat, log.lng);
                }
                const m = L.circleMarker([log.lat, log.lng], { radius: 5, color: 'var(--accent)' }).addTo(historyMap);
                historyMarkers.push(m);
            });

            historyPolyline = L.polyline(latlngs, { color: 'var(--accent)', weight: 3 }).addTo(historyMap);
            historyMap.fitBounds(historyPolyline.getBounds());

            document.getElementById('statDistance').textContent = (totalDist / 1000).toFixed(2) + ' km';
            document.getElementById('statDuration').textContent = '1.5 小時';
            document.getElementById('statCount').textContent = logs.length + ' 次';
            document.getElementById('statTopPlace').textContent = '土城區';

            document.getElementById('dailyDistList').innerHTML = `
                <div class="list-row"><span>歷史區間加總</span><span style="color:var(--accent); font-weight:bold;">${(totalDist/1000).toFixed(2)} km</span></div>
            `;
            showToast('✅ 歷史軌跡載入成功！', 'success');
        }

        async function handleLogout() { if(tracking) toggleTracking(); await window.dbClient.auth.signOut(); location.reload(); }
        
        function enterMainApp() { 
            document.getElementById('authPage').classList.add('hidden'); 
            document.getElementById('mainApp').classList.remove('hidden'); 
            document.getElementById('sweeperEl').style.animationPlayState = 'paused';
            
            refreshDashboardData();
            setTimeout(() => {
                initRadarMap(25.0451, 121.4525);
                initHistoryMap();
            }, 200); 
        }

        window.onload = async function() {
            try {
                // 確保狀態正常切換
                const { data } = await window.dbClient.auth.getSession();
                if(data?.session?.user) { 
                    currentUser = data.session.user; 
                    enterMainApp(); 
                } else {
                    document.getElementById('connStatus').textContent = '🟢 連線成功，請輸入帳密';
                }
            } catch(e) { document.getElementById('connStatus').textContent = '🔴 主機連線異常'; }
        };
    </script>
</body>
</html>
