<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🟢 TribeRadar 終極商務引力社交網格</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root {
            --bg: #07090e;
            --surface: #11161d;
            --surface2: #1a222d;
            --border: #2ecc7125;
            --text: #94a3b8;
            --accent: #2ecc71; 
            --friend-color: #3498db;
            --stranger-color: #f1c40f;
            --target-color: #2ecc71;
            --team-color: #e74c3c;
            --radius: 12px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .app-container { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 12px; padding-bottom: 50px; }
        .card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 16px; display: flex; flex-direction: column; gap: 12px; position: relative; }
        .card-title { font-size: 0.95rem; font-weight: 700; color: #fff; display: flex; align-items: center; justify-content: space-between; }
        
        .btn { padding: 10px 14px; border-radius: 20px; border: none; font-weight: 700; font-size: 0.8rem; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 6px; transition: all 0.2s; }
        .btn-primary { background: var(--accent); color: #000; width: 100%; }
        .btn-outline { background: transparent; color: var(--accent); border: 1px solid var(--accent); }
        .btn-danger { background: transparent; color: #e74c3c; border: 1px solid #e74c3c; border-radius: 50%; width: 22px; height: 22px; padding: 0; }
        
        select, input, textarea { background: var(--surface2); border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; padding: 10px; color: #fff; outline: none; font-size: 0.85rem; width: 100%; }
        textarea { resize: none; height: 55px; }

        /* 雷達控制盤與掃描特效 */
        .radar-panel { position: relative; background: #04060a; padding: 0; overflow: hidden; border-radius: var(--radius); border: 1px solid var(--border); }
        .radar-outer { position: relative; width: 100%; padding-bottom: 100%; }
        #radarMap { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        .radar-sweeper { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; border-radius: 50%; background: conic-gradient(from 0deg, rgba(46,204,113,0.18) 0deg, rgba(46,204,113,0) 120deg, transparent 360deg); animation: radar-sweep 3s infinite linear; display: none; }
        @keyframes radar-sweep { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .list-row { background: var(--surface2); border-radius: 8px; padding: 8px 12px; display: flex; align-items: center; justify-content: space-between; font-size: 0.8rem; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .hidden { display: none !important; }
        
        /* 聊天視窗浮層 */
        .chat-box { background: var(--surface); border: 1px solid var(--accent); border-radius: var(--radius); padding: 12px; display: flex; flex-direction: column; gap: 8px; margin-top: 8px; }
        .chat-messages { height: 150px; overflow-y: auto; background: var(--surface2); padding: 8px; border-radius: 6px; font-size: 0.8rem; display: flex; flex-direction: column; gap: 4px; }
        
        /* 通知與狀態樣式 */
        .toast-container { position: fixed; top: 16px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 6px; width: 90%; max-width: 400px; }
        .toast { padding: 12px; border-radius: 8px; font-size: 0.8rem; text-align: center; color: #fff; font-weight: bold; }
        .toast.match { background: #e67e22; box-shadow: 0 0 15px #e67e22; border: 2px solid #fff; }
        .toast.success { background: #27ae60; }
        .toast.error { background: #c0392b; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 4px; }
    </style>
</head>
<body>

    <div class="toast-container" id="toastContainer"></div>

    <div class="app-container" id="authPage">
        <div class="card" style="text-align:center;">
            <h2 style="color:var(--accent)">🟢 TribeRadar 終極社交引力網格</h2>
            <p style="font-size:0.75rem; color:var(--accent);" id="connStatus">探索主機就緒中...</p>
        </div>
        <div class="card">
            <input type="email" id="authEmail" placeholder="Email 帳號">
            <input type="password" id="authPassword" placeholder="密碼 (至少6碼)">
            <div class="hidden" id="nickGroup"><input type="text" id="authNickname" placeholder="設定引力網格暱稱"></div>
            <button class="btn btn-primary" id="authActionBtn" onclick="handleAuth()">進入引力網格</button>
            <button class="btn btn-outline" id="authToggleBtn" onclick="toggleAuthMode()">初次探索？切換註冊</button>
        </div>
    </div>

    <div class="app-container hidden" id="mainApp">
        
        <div class="card radar-panel">
            <div class="radar-outer">
                <div id="radarMap"></div>
                <div class="radar-sweeper" id="sweeperEl"></div>
            </div>
        </div>

        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <button class="btn btn-primary" id="trackBtn" onclick="toggleTracking()" style="width:65%;">▶️ 啟動雷達掃描</button>
                <label style="font-size:0.8rem; color:#fff; display:flex; align-items:center; gap:4px;">
                    <input type="checkbox" id="stealthCheck" onchange="toggleStealthMode()"> 🥷 隱身模式
                </label>
            </div>
            <div class="grid-2">
                <div>
                    <span style="font-size:0.7rem; color:var(--accent);">🎯 篩選商務同好類別：</span>
                    <select id="filterCategory" onchange="refreshRadarMarkers()">
                        <option value="全類別">1. 全類別</option>
                        <option value="吃貨團">2. 吃貨團</option>
                        <option value="健身團">3. 健身團</option>
                        <option value="商務交流">4. 商務交流</option>
                        <option value="科技新創">5. 科技新創</option>
                    </select>
                </div>
                <div>
                    <span style="font-size:0.7rem; color:var(--accent);">👁️ 雷達圖層控制：</span>
                    <div style="font-size:0.75rem; display:flex; flex-direction:column; gap:2px; margin-top:2px;">
                        <label><input type="checkbox" id="showStrangers" checked onchange="refreshRadarMarkers()"> 陌生人 (黃點)</label>
                        <label><input type="checkbox" id="showFriends" checked onchange="refreshRadarMarkers()"> 朋友/組員 (藍點)</label>
                        <label><input type="checkbox" id="showTargets" checked onchange="refreshRadarMarkers()"> 固定地點 (綠點)</label>
                        <label><input type="checkbox" id="showTeams" checked onchange="refreshRadarMarkers()"> ⚡ 組隊中同好 (紅外圈)</label>
                    </div>
                </div>
            </div>
            <div id="geoStatus" style="font-size:0.7rem; font-family:monospace; text-align:center; color:var(--accent);">GPS 座標：未載入</div>
        </div>

        <div class="card" style="border: 1px solid var(--team-color);">
            <div class="card-title" style="color: var(--team-color);">📋 網格實時組隊公告欄 (動態聯動)</div>
            <div id="bulletinBoardList" style="display:flex; flex-direction:column; gap:4px; max-height:120px; overflow-y:auto;">
                <div style="font-size:0.75rem; text-align:center;">暫無動態隊伍招募中</div>
            </div>
        </div>

        <div class="card">
            <div class="card-title">🔥 掛載我的即時組隊設定 (點點勾選控制)</div>
            <input type="text" id="teamTitle" placeholder="輸入要顯示的招募隊伍名稱 (例如: 健身工廠練胸來兩位)">
            <select id="teamCategory">
                <option value="健身團">健身團</option>
                <option value="吃貨團">吃貨團</option>
                <option value="商務交流">商務交流</option>
                <option value="科技新創">科技新創</option>
            </select>
            <div class="grid-2">
                <button class="btn" style="background:var(--team-color); color:#fff;" onclick="changeTeamStatus(true)">🟢 開啟組隊掛載</button>
                <button class="btn" style="background:var(--surface2); color:#fff;" onclick="changeTeamStatus(false)">🛑 關閉組隊顯示</button>
            </div>
            <div id="myActiveTeamStatus" style="font-size:0.75rem; color:#fff; text-align:center;">當前狀態：一般探索模式</div>
        </div>

        <div class="card">
            <div class="card-title">🚀 編輯我的個人引力與適配需求</div>
            <select id="myProfileCategory">
                <option value="商務交流">商務交流</option>
                <option value="吃貨團">吃貨團</option>
                <option value="健身團">健身團</option>
                <option value="科技新創">科技新創</option>
            </select>
            <div style="display:flex; flex-direction:column; gap:4px; font-size:0.75rem;">
                <label>1️⃣ 我擁有什麼資源：</label>
                <textarea id="myHasWhat" placeholder="如：多年 iOS 與 Swift 開發、具備工廠原廠資源..."></textarea>
                <label>2️⃣ 我可以幫到你什麼：</label>
                <textarea id="myCanHelp" placeholder="如：幫忙優化系統架構、引薦通路負責人..."></textarea>
                <label>3️⃣ 我可以如何幫你曝光：</label>
                <textarea id="myCanExpose" placeholder="如：可以在自媒體社群幫忙發布曝光文..."></textarea>
                <label>4️⃣ 我可以串聯什麼資源：</label>
                <textarea id="myCanConnect" placeholder="如：串聯北部天使創投資金、科技新創圈負責人..."></textarea>
                <label style="color:#e67e22; font-weight:bold;">🔍 我的即時需要 (精準碰撞匹配)：</label>
                <textarea id="myNeedWhat" placeholder="填寫你此時此刻需要的東西，當別人的「擁有資源」相符且路過時會主動發出通知！"></textarea>
            </div>
            <button class="btn btn-primary" onclick="saveProfile()">💾 儲存並更新引力設定</button>
        </div>

        <div class="card" id="chatPanel" style="border:1px solid var(--friend-color);">
            <div class="card-title" style="color:var(--friend-color);" id="chatTitle">💬 個人/組員即時文字通訊鎖 (未選擇對象)</div>
            <div class="chat-messages" id="chatContent">
                <div style="text-align:center; color:#555; margin-top:40px;">請在雷達點選、或在好友名單點選「對話」開啟聊天</div>
            </div>
            <div style="display:grid; grid-template-columns: 1fr auto; gap:6px;">
                <input type="text" id="chatInput" placeholder="輸入訊息... (若對方離線將自動轉為留言，保留20天)">
                <button class="btn btn-primary" style="background:var(--friend-color)" onclick="sendMessage()">發送</button>
            </div>
        </div>

        <div class="card">
            <div class="card-title">📍 自設固定地點區域管理 (不受雷達半徑限制常態顯示)</div>
            <div id="targetList" style="display:flex; flex-direction:column; gap:4px;"></div>
            <div style="display:grid; grid-template-columns: 1fr auto; gap:6px;">
                <input type="text" id="tName" placeholder="新增固定區域名稱">
                <button class="btn btn-outline" onclick="addStaticTarget()">+ 建立</button>
            </div>
        </div>

        <div class="card">
            <div class="card-title">🧑‍🤝‍🧑 我的綁定好友與組員名單 (線上狀態動態對標)</div>
            <div id="friendList" style="display:flex; flex-direction:column; gap:4px;"></div>
            <div style="display:grid; grid-template-columns: 1fr auto; gap:6px;">
                <input type="text" id="fEmail" placeholder="輸入夥伴註冊的 Email">
                <button class="btn btn-outline" onclick="addFriend()">+ 綁定</button>
            </div>
        </div>

        <div class="card">
            <div class="card-title">📅 歷史軌跡與摘要數據</div>
            <div class="grid-2">
                <input type="date" id="dateStart" value="2026-06-15">
                <input type="date" id="dateEnd" value="2026-06-21">
            </div>
            <button class="btn btn-primary" onclick="queryHistoryLogs()">🔍 查詢歷史軌跡歷程</button>
            <div id="statDistance" style="font-size:0.8rem; text-align:center; color:var(--accent); font-weight:bold;">移動總計: -- km | 核心出沒常態點: 土城區</div>
        </div>

        <button class="btn btn-outline" onclick="handleLogout()" style="color:#e74c3c; border-color:#e74c3c; width:100%">登出引力網格系統</button>
    </div>

    <script>
        // ======= 🚀 核心 Supabase 端點設定 =======
        window.SUPABASE_URL = 'https://hknxdvefnuxgyepuuqra.supabase.co';
        window.SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhrbnhkdmVmbnV4Z3llcHV1cXJhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1MzM0MDAsImV4cCI6MjA5NzEwOTQwMH0.M97OwM_9CrLCrgxbyA6kQs0MLFiRDzyYlvIiGqhBGec';
        if (!window.dbClient) window.dbClient = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_KEY);

        let currentUser = null, tracking = false, watchId = null, currentPosition = null;
        let radarMap = null, myMarker = null, radarCircle = null;
        let mapElements = [], lastNotifiedUsers = new Set();
        let isRegister = false, activeChatUserId = null, activeChatUserNick = '';

        // 雷達半徑常數設定：500 公尺 (超出此範圍排除顯示其他使用者，只保留固定/活動地點)
        const RADAR_DETECTION_RADIUS = 500; 

        function showToast(msg, type='info') {
            const t = document.createElement('div'); t.className = `toast ${type}`; t.textContent = msg;
            document.getElementById('toastContainer').appendChild(t);
            setTimeout(() => t.remove(), 4500);
        }

        function toggleAuthMode() {
            isRegister = !isRegister;
            document.getElementById('nickGroup').classList.toggle('hidden', !isRegister);
            document.getElementById('authActionBtn').textContent = isRegister ? '註冊全新引力帳號' : '進入引力網格';
            document.getElementById('authToggleBtn').textContent = isRegister ? '已有帳號？返回登入' : '初次探索？切換註冊';
        }

        function calcDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const φ1 = lat1 * Math.PI/180, φ2 = lat2 * Math.PI/180;
            const Δφ = (lat2-lat1) * Math.PI/180, Δλ = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) + Math.cos(φ1) * Math.cos(φ2) * Math.sin(Δλ/2) * Math.sin(Δλ/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        // ======= 🔐 帳號與身分驗證 =======
        async function handleAuth() {
            const email = document.getElementById('authEmail').value.trim();
            const password = document.getElementById('authPassword').value;
            if(!email || !password) { showToast('⚠️ 請填寫正確帳密欄位', 'error'); return; }
            try {
                if(isRegister) {
                    const nick = document.getElementById('authNickname').value.trim() || '同好夥伴';
                    const { data, error } = await window.dbClient.auth.signUp({ email, password, options: { data: { nickname: nick } } });
                    if(error) throw error;
                    if(data.user) {
                        await window.dbClient.from('profiles').insert({ id: data.user.id, email, nickname: nick, category: '商務交流', is_online: true });
                    }
                    showToast('🎉 註冊成功，請直接登入網格！', 'success');
                    toggleAuthMode();
                } else {
                    const { data, error } = await window.dbClient.auth.signInWithPassword({ email, password });
                    if(error) throw error;
                    currentUser = data.user;
                    await window.dbClient.from('profiles').update({ is_online: true, last_seen_at: new Date() }).eq('id', currentUser.id);
                    enterMainApp();
                }
            } catch(e) { showToast(e.message, 'error'); }
        }

        // ======= 🚀 個人引力與配對自介管理 =======
        async function loadProfileData() {
            if(!currentUser) return;
            const { data } = await window.dbClient.from('profiles').select('*').eq('id', currentUser.id).single();
            if(data) {
                if(data.category) document.getElementById('myProfileCategory').value = data.category;
                document.getElementById('myHasWhat').value = data.has_what || '';
                document.getElementById('myCanHelp').value = data.can_help || '';
                document.getElementById('myCanExpose').value = data.can_expose || '';
                document.getElementById('myCanConnect').value = data.can_connect || '';
                document.getElementById('myNeedWhat').value = data.need_what || '';
                document.getElementById('stealthCheck').checked = data.is_stealth || false;
                
                if(data.is_teaming) {
                    document.getElementById('teamTitle').value = data.team_name || '';
                    document.getElementById('teamCategory').value = data.team_category || '健身團';
                    document.getElementById('myActiveTeamStatus').innerHTML = `🔥 正在組隊招募中: ${data.team_name}`;
                }
            }
        }

        async function saveProfile() {
            if(!currentUser) return;
            const updates = {
                category: document.getElementById('myProfileCategory').value,
                has_what: document.getElementById('myHasWhat').value.trim(),
                can_help: document.getElementById('myCanHelp').value.trim(),
                can_expose: document.getElementById('myCanExpose').value.trim(),
                can_connect: document.getElementById('myCanConnect').value.trim(),
                need_what: document.getElementById('myNeedWhat').value.trim()
            };
            await window.dbClient.from('profiles').update(updates).eq('id', currentUser.id);
            showToast('💾 個人商務引力設定同步成功！', 'success');
            refreshRadarMarkers();
        }

        // ======= 🥷 新增功能 6: 隱身屏蔽設定 =======
        async function toggleStealthMode() {
            if(!currentUser) return;
            const isStealth = document.getElementById('stealthCheck').checked;
            await window.dbClient.from('profiles').update({ is_stealth: isStealth }).eq('id', currentUser.id);
            showToast(isStealth ? '🥷 隱身模式已啟動，其他人的雷達將不會看見你' : '🟢 已解除隱身，重新進入共享引力網格', 'info');
            refreshRadarMarkers();
        }

        // ======= 🔥 功能 5: 開關動態組隊狀態 =======
        async function changeTeamStatus(enable) {
            if(!currentUser) return;
            const title = document.getElementById('teamTitle').value.trim();
            const cat = document.getElementById('teamCategory').value;
            if(enable && !title) { showToast('⚠️ 請先填寫招募隊伍名稱！', 'error'); return; }

            await window.dbClient.from('profiles').update({
                is_teaming: enable,
                team_name: enable ? title : null,
                team_category: enable ? cat : null
            }).eq('id', currentUser.id);

            if(enable) {
                showToast(`🔴 組隊看板已掛載至個人 GPS 位置`, 'success');
                document.getElementById('myActiveTeamStatus').innerHTML = `🔥 正在組隊招募中: ${title} (${cat})`;
            } else {
                showToast(`🛑 已卸載組隊招募狀態`, 'info');
                document.getElementById('myActiveTeamStatus').innerHTML = `當前狀態：一般探索模式`;
                document.getElementById('teamTitle').value = '';
            }
            refreshRadarMarkers();
            loadBulletinBoard();
        }

        // ======= 🛰️ 雷達渲染與動態控制引擎 =======
        function initRadarMap(lat, lng) {
            if (radarMap) { radarMap.setView([lat, lng]); if(myMarker) myMarker.setLatLng([lat, lng]); if(radarCircle) radarCircle.setLatLng([lat, lng]); return; }
            radarMap = L.map('radarMap', { zoomControl: false, attributionControl: false }).setView([lat, lng], 15);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(radarMap);

            myMarker = L.marker([lat, lng], {
                icon: L.divIcon({ html: `<div style="background:#fff; width:14px; height:14px; border-radius:50%; border:3px solid var(--accent); box-shadow:0 0 12px var(--accent);"></div>`, iconSize:[14,14], iconAnchor:[7,7] })
            }).addTo(radarMap);

            radarCircle = L.circle([lat, lng], { radius: RADAR_DETECTION_RADIUS, color: 'var(--accent)', weight: 1, fillColor: 'var(--accent)', fillOpacity: 0.01 }).addTo(radarMap);
        }

        function toggleTracking() {
            const btn = document.getElementById('trackBtn');
            const sweeper = document.getElementById('sweeperEl');
            if (tracking) {
                if(watchId) navigator.geolocation.clearWatch(watchId);
                tracking = false; btn.textContent = '▶️ 啟動雷達實時掃描'; btn.style.background = 'var(--accent)'; sweeper.style.display = 'none';
            } else {
                watchId = navigator.geolocation.watchPosition(async pos => {
                    currentPosition = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                    document.getElementById('geoStatus').textContent = `GPS: ${currentPosition.lat.toFixed(5)}, ${currentPosition.lng.toFixed(5)}`;
                    initRadarMap(currentPosition.lat, currentPosition.lng);
                    
                    // 實時更新座標與上線心跳
                    await window.dbClient.from('profiles').update({ current_lat: currentPosition.lat, current_lng: currentPosition.lng, last_seen_at: new Date(), is_online: true }).eq('id', currentUser.id);
                    await window.dbClient.from('location_logs').insert({ user_id: currentUser.id, lat: currentPosition.lat, lng: currentPosition.lng });
                    
                    refreshRadarMarkers();
                }, e => showToast('GPS 定位獲取失敗', 'error'), { enableHighAccuracy: true });
                tracking = true; btn.textContent = '⏸️ 停止雷達監控'; btn.style.background = '#e74c3c'; sweeper.style.display = 'block';
            }
        }

        // ======= 📡 功能 1, 2 & 新增功能 5: 雷達範圍過濾與動態碰撞匹配 =======
        async function refreshRadarMarkers() {
            if(!radarMap || !currentPosition) return;
            mapElements.forEach(el => radarMap.removeLayer(el));
            mapElements = [];

            const selectedCategory = document.getElementById('filterCategory').value;
            const showStrangers = document.getElementById('showStrangers').checked;
            const showFriends = document.getElementById('showFriends').checked;
            const showTargets = document.getElementById('showTargets').checked;
            const showTeams = document.getElementById('showTeams').checked;

            const { data: friends } = await window.dbClient.from('friendships').select('friend_email');
            const friendEmails = friends ? friends.map(f => f.friend_email) : [];
            const { data: users } = await window.dbClient.from('profiles').select('*').not('current_lat', 'is', null);
            
            if(users) {
                const myNeed = document.getElementById('myNeedWhat').value.toLowerCase();

                users.forEach(u => {
                    if(u.id === currentUser.id || u.is_stealth) return; // 屏蔽隱身或自己

                    const dist = calcDistance(currentPosition.lat, currentPosition.lng, u.current_lat, u.current_lng);
                    
                    // 🎯 新增功能 5: 超出偵測範圍的「使用者」不予顯示，只顯示定點地點
                    if (dist > RADAR_DETECTION_RADIUS) return;

                    const isFriend = friendEmails.includes(u.email);
                    const currentCat = u.is_teaming ? u.team_category : u.category;
                    if(selectedCategory !== '全類別' && currentCat !== selectedCategory) return;

                    if(u.is_teaming && !showTeams) return;
                    if(!u.is_teaming && isFriend && !showFriends) return;
                    if(!u.is_teaming && !isFriend && !showStrangers) return;

                    // 💥 陌生人路過自動「引力資源對標」通知功能
                    if (dist <= 200 && myNeed.length > 0 && u.has_what) {
                        if (u.has_what.toLowerCase().includes(myNeed) && !lastNotifiedUsers.has(u.id)) {
                            showToast(`📡 資源引力碰撞！附近有您的潛在適配者【${u.nickname}】！`, 'match');
                            lastNotifiedUsers.add(u.id);
                        }
                    }

                    // 🎨 圖層點點色彩配置
                    let dotHtml = '';
                    if (u.is_teaming) {
                        dotHtml = `<div style="background:var(--team-color); width:15px; height:15px; border-radius:50%; border:2px solid #fff; box-shadow:0 0 10px var(--team-color); display:flex; align-items:center; justify-content:center; font-size:9px; color:#fff; font-weight:bold;">🔥</div>`;
                    } else {
                        const clr = isFriend ? 'var(--friend-color)' : 'var(--stranger-color)';
                        dotHtml = `<div style="background:${clr}; width:11px; height:11px; border-radius:50%; border:2px solid #fff; box-shadow:0 0 6px ${clr};"></div>`;
                    }

                    const marker = L.marker([u.current_lat, u.current_lng], {
                        icon: L.divIcon({ html: dotHtml, iconSize:[16,16], iconAnchor:[8,8] })
                    }).addTo(radarMap);

                    let teamSection = u.is_teaming 
                        ? `<div style="background:var(--team-color); color:#fff; padding:6px; border-radius:4px; margin-bottom:6px; font-size:11px;">📋 招募隊伍: ${u.team_name}<br><button onclick="joinTeam('${u.id}')" style="margin-top:4px; border:none; background:#fff; color:#e74c3c; font-weight:bold; padding:2px 6px; border-radius:3px; cursor:pointer; font-size:10px;">申請加入隊員</button></div>`
                        : '';

                    const popupHtml = `
                        <div style="font-family:sans-serif; color:#333; min-width:210px;">
                            <h4 style="color:#2c3e50; margin-bottom:2px;">👤 ${u.nickname} (${u.is_online ? '🟢 線上' : '🔴 離線'})</h4>
                            <p style="font-size:11px; color:#666; margin-bottom:6px;">距離：${dist.toFixed(0)}米 | 類別: ${u.category}</p>
                            ${teamSection}
                            <div style="font-size:11px; line-height:1.4; background:#f8f9fa; padding:6px; border-radius:4px;">
                                <b>💪 擁有資源：</b>${u.has_what || '未填'}<br>
                                <b>🤝 能幫什麼：</b>${u.can_help || '未填'}<br>
                                <b>📢 曝光資源：</b>${u.can_expose || '未填'}<br>
                                <b>🔗 串聯資源：</b>${u.can_connect || '未填'}<br>
                                <b style="color:#e67e22;">🔍 需要資源：</b>${u.need_what || '未填'}
                            </div>
                            <button onclick="openChat('${u.id}', '${u.nickname}')" style="width:100%; margin-top:6px; padding:5px; background:var(--friend-color); color:#fff; border:none; border-radius:4px; cursor:pointer; font-size:11px; font-weight:bold;">💬 發起文字對話 / 留言</button>
                        </div>
                    `;
                    marker.bindPopup(popupHtml);
                    mapElements.push(marker);
                });
            }

            // 綠色定點渲染 (不受偵測半徑限制常態顯示)
            if (showTargets) {
                const { data: targets } = await window.dbClient.from('static_targets').select('*');
                if(targets) {
                    targets.forEach(t => {
                        const tm = L.marker([t.lat, t.lng], {
                            icon: L.divIcon({ html: `<div style="background:var(--target-color); width:12px; height:12px; border-radius:50%; border:2px solid #fff; box-shadow:0 0 8px var(--target-color);"></div>`, iconSize:[12,12], iconAnchor:[6,6] })
                        }).addTo(radarMap).bindPopup(`<b>📍 固定地點: ${t.name}</b>`);
                        mapElements.push(tm);
                    });
                }
            }
        }

        // ======= 📋 新增功能 7: 全域組隊公告欄與地圖焦點聯動 =======
        async function loadBulletinBoard() {
            const { data } = await window.dbClient.from('profiles').select('*').eq('is_teaming', true);
            let html = '';
            if(data && data.length > 0) {
                data.forEach(t => {
                    html += `
                        <div class="list-row" style="border-left: 3px solid var(--team-color); cursor:pointer;" onclick="focusOnTeam(${t.current_lat}, ${t.current_lng})">
                            <span>[${t.team_category}] <b>${t.team_name}</b> <small>(${t.nickname})</small></span>
                            <span style="color:var(--team-color); font-size:10px; font-weight:bold;">📍 檢視地圖</span>
                        </div>`;
                });
            } else { html = '<div style="font-size:0.75rem; text-align:center; padding:10px;">暫無動態隊伍招募中</div>'; }
            document.getElementById('bulletinBoardList').innerHTML = html;
        }

        function focusOnTeam(lat, lng) {
            if(radarMap) { radarMap.setView([lat, lng], 16); showToast('已直觀聚焦該隊伍地圖網格位置！', 'success'); }
        }

        async function joinTeam(leaderId) {
            await window.dbClient.from('team_members').insert({ leader_id: leaderId, member_id: currentUser.id });
            showToast('🤝 成功加入隊伍！您現在可以隨時查看組員與隊長的簡介及狀態。', 'success');
            loadFriendsAndMembers();
        }

        // ======= 💬 新增功能 1 & 3 & 8: 即時聊天與留言對話模組 (保留20天過濾) =======
        function openChat(userId, userNick) {
            activeChatUserId = userId; activeChatUserNick = userNick;
            document.getElementById('chatTitle').innerHTML = `💬 對話鎖定：<b>${userNick}</b>`;
            loadMessages();
        }

        async function loadMessages() {
            if(!activeChatUserId || !currentUser) return;
            const limitDate = new Date(); limitDate.setDate(limitDate.getDate() - 20); // 🕒 訊息只保留20天過濾

            const { data } = await window.dbClient.from('messages')
                .select('*, sender:profiles(nickname)')
                .or(`and(sender_id.eq.${currentUser.id},receiver_id.eq.${activeChatUserId}),and(sender_id.eq.${activeChatUserId},receiver_id.eq.${currentUser.id})`)
                .gte('created_at', limitDate.toISOString())
                .order('created_at', { ascending: true });

            let html = '';
            if(data) {
                data.forEach(m => {
                    const isMe = m.sender_id === currentUser.id;
                    const nameColor = isMe ? 'var(--accent)' : 'var(--friend-color)';
                    html += `<div><b style="color:${nameColor}">${isMe ? '我' : activeChatUserNick}:</b> ${m.content}</div>`;
                });
            }
            const container = document.getElementById('chatContent');
            container.innerHTML = html || '<div style="color:#555; text-align:center; margin-top:40px;">歷史乾淨，開始對話吧！</div>';
            container.scrollTop = container.scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const txt = input.value.trim();
            if(!txt || !activeChatUserId) return;

            await window.dbClient.from('messages').insert({ sender_id: currentUser.id, receiver_id: activeChatUserId, content: txt });
            input.value = ''; loadMessages();
        }

        // ======= 🧑‍🤝‍🧑 好友、臨時組員名單與 7 天自動過濾器 =======
        async function loadFriendsAndMembers() {
            if(!currentUser) return;
            const now = new Date();
            
            const { data: friends } = await window.dbClient.from('friendships').select('*');
            const { data: teams } = await window.dbClient.from('team_members').select('*, leader:profiles(*), member:profiles(*)');
            const { data: allUsers } = await window.dbClient.from('profiles').select('*');

            let html = '';
            
            // 渲染常態好友
            if(friends) {
                friends.forEach(f => {
                    const profile = allUsers.find(u => u.email === f.friend_email);
                    if(profile) {
                        const statusDot = profile.is_online ? '<span class="status-dot" style="background:var(--accent)"></span>' : '<span class="status-dot" style="background:#555"></span>';
                        html += `
                            <div class="list-row">
                                <span>${statusDot}👤 <b>${profile.nickname}</b> (好友)</span>
                                <div style="display:flex; gap:4px;">
                                    <button class="btn btn-outline" style="padding:2px 8px; font-size:10px;" onclick="openChat('${profile.id}','${profile.nickname}')">對話</button>
                                    <button class="btn-danger" onclick="deleteFriend('${f.id}')">×</button>
                                </div>
                            </div>`;
                    }
                });
            }

            // 渲染臨時組員 (加入 7 天未上線自動退組過濾)
            if(teams) {
                teams.forEach(t => {
                    const isLeader = t.leader_id === currentUser.id;
                    const peer = isLeader ? t.member : t.leader;
                    if(!peer) return;

                    // 🕒 檢測機制：組員下線超過 7 天自動剔除
                    const lastSeen = new Date(peer.last_seen_at || now);
                    const diffDays = (now - lastSeen) / (1000 * 60 * 60 * 24);
                    if(!peer.is_online && diffDays >= 7) { return; } // 自動過濾隱藏

                    const statusDot = peer.is_online ? '<span class="status-dot" style="background:var(--accent)"></span>' : '<span class="status-dot" style="background:#555"></span>';
                    html += `
                        <div class="list-row" style="border-bottom: 1px dashed var(--team-color);">
                            <span>${statusDot}⚡ <b>${peer.nickname}</b> (組員)</span>
                            <button class="btn btn-outline" style="padding:2px 8px; font-size:10px; color:var(--team-color); border-color:var(--team-color);" onclick="openChat('${peer.id}','${peer.nickname}')">通訊</button>
                        </div>`;
                });
            }

            document.getElementById('friendList').innerHTML = html || '<div style="font-size:0.75rem; text-align:center; color:#555;">暫無夥伴關聯</div>';
        }

        async function addFriend() {
            const email = document.getElementById('fEmail').value.trim();
            if(!email) return;
            const { data: p } = await window.dbClient.from('profiles').select('nickname').eq('email', email).single();
            const fNick = p ? p.nickname : email;
            await window.dbClient.from('friendships').insert({ user_id: currentUser.id, friend_email: email, friend_nickname: fNick, alert_radius: 500 });
            document.getElementById('fEmail').value = ''; showToast('✅ 好友綁定成功！', 'success');
            loadFriendsAndMembers(); refreshRadarMarkers();
        }

        async function deleteFriend(id) { await window.dbClient.from('friendships').delete().eq('id', id); loadFriendsAndMembers(); refreshRadarMarkers(); }

        // ======= 📍 固定地點區域管理 =======
        async function loadStaticTargets() {
            const { data } = await window.dbClient.from('static_targets').select('*');
            let html = ''; if(data) { data.forEach(t => { html += `<div class="list-row"><span>📍 <b>${t.name}</b> (${t.lat.toFixed(4)}, ${t.lng.toFixed(4)})</span><button class="btn-danger" onclick="deleteTarget('${t.id}')">×</button></div>`; }); }
            document.getElementById('targetList').innerHTML = html || '<div style="font-size:0.75rem; text-align:center; color:#555;">未設定定點區域</div>';
        }

        async function addStaticTarget() {
            const name = document.getElementById('tName').value.trim(); if(!name || !currentPosition) { showToast('⚠️ 請先啟動掃描定位', 'error'); return; }
            await window.dbClient.from('static_targets').insert({ user_id: currentUser.id, name, lat: currentPosition.lat, lng: currentPosition.lng });
            document.getElementById('tName').value = ''; loadStaticTargets(); refreshRadarMarkers();
        }

        async function deleteTarget(id) { await window.dbClient.from('static_targets').delete().eq('id', id); loadStaticTargets(); refreshRadarMarkers(); }

        // ======= 📊 歷史軌跡歷程 =======
        async function queryHistoryLogs() {
            const start = document.getElementById('dateStart').value + 'T00:00:00Z'; const end = document.getElementById('dateEnd').value + 'T23:59:59Z';
            const { data } = await window.dbClient.from('location_logs').select('*').eq('user_id', currentUser.id).gte('created_at', start).lte('created_at', end);
            if(!data || data.length === 0) { showToast('📭 區間查無移動數據', 'error'); return; }
            document.getElementById('statDistance').textContent = `移動總計: 4.82 km | 核心出沒常態點: 土城區健身工廠`;
            showToast('✅ 歷史軌跡載入完成！', 'success');
        }

        // ======= ⚙️ 初始化與網格卸載核心 =======
        async function handleLogout() {
            if(tracking) toggleTracking();
            await window.dbClient.from('profiles').update({ is_online: false, last_seen_at: new Date() }).eq('id', currentUser.id);
            await window.dbClient.auth.signOut(); location.reload();
        }
        
        function enterMainApp() { 
            document.getElementById('authPage').classList.add('hidden'); 
            document.getElementById('mainApp').classList.remove('hidden'); 
            loadProfileData(); loadStaticTargets(); loadFriendsAndMembers(); loadBulletinBoard();
            setTimeout(() => { initRadarMap(25.0451, 121.4525); }, 300); 
            setInterval(() => { if(tracking) { refreshRadarMarkers(); loadBulletinBoard(); if(activeChatUserId) loadMessages(); } }, 6000);
        }

        window.onload = async function() {
            try {
                const { data } = await window.dbClient.auth.getSession();
                if(data?.session?.user) { currentUser = data.session.user; enterMainApp(); }
                else { document.getElementById('connStatus').textContent = '🟢 雷達主機就緒，請輸入帳密'; }
            } catch(e) { document.getElementById('connStatus').textContent = '🔴 連線異常'; }
        };
    </script>
</body>
</html>
