<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover, maximum-scale=1.0">
    <title>🟢 TribeRadar 同好聚落雷達</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root {
            --bg: #0b0c10;
            --surface: #151a21;
            --surface2: #1f2630;
            --border: #2ecc7130;
            --text: #95a5a6;
            --text-bright: #2ecc71;
            --accent: #2ecc71; 
            --danger: #e74c3c;
            --warning: #f1c40f;
            --radius: 12px;
            --radius-sm: 8px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang TC', sans-serif;
            background: var(--bg); color: var(--text); padding: 10px; display: flex; flex-direction: column; align-items: center;
        }
        .app-container { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 12px; }
        .card {
            background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border);
            padding: 16px; display: flex; flex-direction: column; gap: 12px;
        }
        .card-title { font-size: 0.9rem; font-weight: 700; color: #fff; display: flex; align-items: center; gap: 6px; }
        
        .btn {
            padding: 12px; border-radius: 20px; border: none; font-weight: 700; font-size: 0.85rem;
            cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 6px; transition: all 0.2s;
        }
        .btn-primary { background: var(--accent); color: #000; width: 100%; }
        .btn-outline { background: transparent; color: var(--accent); border: 1px solid var(--accent); border-radius: 20px; }
        .btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); border-radius: 50%; width: 28px; height: 28px; padding: 0; display: inline-flex; align-items: center; justify-content: center; }
        
        .tab-nav { display: flex; gap: 6px; background: rgba(0,0,0,0.4); border-radius: var(--radius); padding: 4px; }
        .tab-btn { flex: 1; padding: 10px; border-radius: var(--radius-sm); background: transparent; color: var(--text); border: none; font-weight: bold; cursor: pointer; }
        .tab-btn.active { background: var(--accent); color: #000; }

        /* 🟢 TribeRadar 圓盤掃描 */
        .radar-panel { display: flex; flex-direction: column; align-items: center; background: #070a0e; padding: 10px; }
        .radar-outer {
            position: relative; border: 4px solid var(--accent); border-radius: 50%; width: 100%; padding-bottom: 100%;
            overflow: hidden; box-shadow: inset 0 0 30px rgba(0,0,0,1), 0 0 15px rgba(46,204,113,0.3);
        }
        #radarMap { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .radar-sweeper {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 999; pointer-events: none; border-radius: 50%;
            background: conic-gradient(from 0deg, rgba(46,204,113,0.3) 0deg, rgba(46,204,113,0) 90deg, transparent 360deg);
            animation: radar-sweep 4s infinite linear;
        }
        @keyframes radar-sweep { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* 📊 數據摘要網格 */
        .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .summary-box { background: var(--surface2); border-radius: var(--radius-sm); padding: 12px; text-align: center; }
        .summary-val { font-size: 1.2rem; font-weight: bold; color: var(--accent); margin-bottom: 4px; }
        .summary-lbl { font-size: 0.7rem; color: var(--text); }

        .list-row { background: var(--surface2); border-radius: var(--radius-sm); padding: 12px; display: flex; align-items: center; justify-content: space-between; font-size: 0.85rem; }
        .list-info { display: flex; align-items: center; gap: 8px; }
        
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        .input-group label { font-size: 0.7rem; color: #7f8c8d; font-weight: bold; }
        .input-group input, .input-group select { background: var(--surface2); border: 1px solid rgba(255,255,255,0.1); border-radius: var(--radius-sm); padding: 10px; color: #fff; outline: none; }

        .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:10000; display:flex; align-items:center; justify-content:center; padding:20px; }
        .modal-content { background:var(--surface); border:2px solid var(--accent); border-radius:var(--radius); padding:20px; width:100%; max-width:400px; text-align:center; box-shadow:0 0 20px rgba(46,204,113,0.5); }

        .hidden { display: none !important; }
        .toast-container { position: fixed; top: 16px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 6px; width: 90%; max-width: 400px; }
        .toast { padding: 12px; border-radius: 8px; font-size: 0.8rem; text-align: center; color: #fff; font-weight: bold; }
        .toast.error { background: #c0392b; }
        .toast.success { background: #27ae60; }
    </style>
</head>
<body>

    <div class="toast-container" id="toastContainer"></div>

    <div class="modal-overlay hidden" id="alertModal">
        <div class="modal-content">
            <h3 style="color:var(--warning)">⚡ 發現夥伴攔截!! ⚡</h3>
            <div id="modalMsg" style="margin: 15px 0; color: #fff; font-size: 0.9rem; line-height: 1.5;"></div>
            <button class="btn btn-primary" onclick="closeAlertModal()">確認目標，持續探索</button>
        </div>
    </div>

    <div class="app-container" id="authPage">
        <div class="card" style="text-align:center;">
            <h2 style="color:var(--accent)">🟢 TribeRadar 同好聚落雷達</h2>
            <p style="font-size:0.75rem; color:var(--accent);" id="connStatus">探索主機連線中...</p>
        </div>
        <div class="card">
            <div class="input-group"><label>EMAIL</label><input type="email" id="authEmail" placeholder="example@gmail.com"></div>
            <div class="input-group"><label>密碼 (至少 6 碼)</label><input type="password" id="authPassword"></div>
            <div class="input-group hidden" id="nickGroup"><label>探索暱稱</label><input type="text" id="authNickname" placeholder="Sunny"></div>
            <button class="btn btn-primary" id="authActionBtn" onclick="handleAuth()">進入同好網格</button>
            <button class="btn btn-outline" style="font-size:0.75rem;" id="authToggleBtn" onclick="toggleAuthMode()">初次探索？切換註冊帳號</button>
        </div>
    </div>

    <div class="app-container hidden" id="mainApp">
        <div class="tab-nav">
            <button class="tab-btn active" id="tabBtnRadar" onclick="switchTab('radar')">📡 實時探索控制台</button>
            <button class="tab-btn" id="tabBtnHistory" onclick="switchTab('history')">🗺️ 聚落探索歷程</button>
        </div>

        <div id="radarTab">
            <div class="card radar-panel">
                <div class="radar-outer">
                    <div id="radarMap"></div>
                    <div class="radar-sweeper"></div>
                </div>
                <div id="geoStatus" style="font-size:0.7rem; font-family:monospace; margin-top:8px; color:var(--accent);">中心探索中...</div>
            </div>

            <div class="card">
                <div class="card-title">🛰️ 雷達控制台</div>
                <div style="display:flex; gap:8px;">
                    <button class="btn btn-primary" id="trackBtn" onclick="toggleTracking()">▶️ 啟動雷達掃描</button>
                    <button class="btn btn-outline" onclick="handleLogout()" style="color:var(--danger); border-color:var(--danger)">中斷連線</button>
                </div>
            </div>

            <div class="card" style="border: 1px solid var(--accent); background: rgba(46,204,113,0.03);">
                <div class="card-title">💥 實時動態揪團波</div>
                <div style="display:flex; gap:6px;">
                    <select id="waveTribe" style="background:var(--surface2); color:#fff; border:1px solid rgba(255,255,255,0.1); padding:6px; border-radius:6px;">
                        <option value="📚 自習">📚 自習</option>
                        <option value="🎣 釣魚">🎣 釣魚</option>
                        <option value="🍕 美食">🍕 美食</option>
                    </select>
                    <input type="text" id="waveDesc" placeholder="發射你的聚落興趣訊號..." style="flex:1; background:var(--surface2); color:#fff; border:1px solid rgba(255,255,255,0.1); padding:6px; border-radius:6px;">
                    <button class="btn btn-primary" style="width:auto; padding:6px 12px; border-radius:6px;" onclick="emitWave()">發射</button>
                </div>
                <div id="waveBroadcastArea" style="font-size:0.75rem; max-height:80px; overflow-y:auto; color:var(--warning); display:flex; flex-direction:column; gap:4px;"></div>
            </div>

            <div class="card">
                <div class="card-title">🧑‍🤝‍🧑 夥伴與同好偵測圈</div>
                <div id="friendContainer" style="display:flex; flex-direction:column; gap:6px;"></div>
                <button class="btn btn-outline" onclick="addFriendGrid()">＋ 綁定偵測對象並設定探測半徑</button>
            </div>

            <div class="card">
                <div class="card-title">📍 常用活動據點管理</div>
                <div id="targetContainer" style="display:flex; flex-direction:column; gap:6px;"></div>
                <button class="btn btn-outline" onclick="addTargetGrid()">＋ 新增常去據點中心</button>
            </div>

            <div class="card">
                <div class="card-title">📅 期間限定聚落活動</div>
                <div id="activityContainer" style="font-size:0.8rem; text-align:center; padding:10px;">📅 尚無活動</div>
            </div>
        </div>

        <div id="historyTab" class="hidden">
            <div class="card">
                <div class="card-title">📅 探索時間區間篩選</div>
                <div style="display:flex; gap:6px;">
                    <input type="date" id="histStartDate" style="flex:1; background:var(--surface2); color:#fff; border:1px solid rgba(255,255,255,0.1); padding:8px; border-radius:6px;">
                    <span style="align-self:center;">~</span>
                    <input type="date" id="histEndDate" style="flex:1; background:var(--surface2); color:#fff; border:1px solid rgba(255,255,255,0.1); padding:8px; border-radius:6px;">
                </div>
                <button class="btn btn-primary" onclick="queryHistory足跡()">🔍 撈取探索歷程</button>
            </div>

            <div class="card">
                <div class="card-title">📊 探索數據摘要</div>
                <div class="summary-grid">
                    <div class="summary-box"><div class="summary-val" id="sumDist">--</div><div class="summary-lbl">總移動距離</div></div>
                    <div class="summary-box"><div class="summary-val" id="sumTime">--</div><div class="summary-lbl">累計探索時間 (hr)</div></div>
                    <div class="summary-box"><div class="summary-val" id="sumCount">--</div><div class="summary-lbl">據點停留次數</div></div>
                    <div class="summary-box"><div class="summary-val" id="sumFreq">--</div><div class="summary-lbl">最常出沒據點</div></div>
                </div>
            </div>

            <div class="card">
                <div class="card-title">🗺️ 歷程軌跡還原</div>
                <div id="historyMap" style="height:260px; border-radius:var(--radius-sm); overflow:hidden;"></div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://hknxdvefnuxgyepuuqra.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhrbnhkdmVmbnV4Z3llcHV1cXJhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1MzM0MDAsImV4cCI6MjA5NzEwOTQwMH0.M97OwM_9CrLCrgxbyA6kQs0MLFiRDzyYlvIiGqhBGec';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = null, tracking = false, watchId = null, currentPosition = null;
        let radarMap = null, historyMap = null, myMarker = null, radarCircle = null;
        let friendLayers = [], waveLayers = [], historyLine = null;
        let isRegister = false, alertedSet = new Set();

        function showToast(msg, type='info') {
            const t = document.createElement('div'); t.className = `toast ${type}`; t.textContent = msg;
            document.getElementById('toastContainer').appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }

        function toggleAuthMode() {
            isRegister = !isRegister;
            document.getElementById('nickGroup').classList.toggle('hidden', !isRegister);
            document.getElementById('authActionBtn').textContent = isRegister ? '註冊新探索帳號' : '進入同好網格';
            document.getElementById('authToggleBtn').textContent = isRegister ? '已有帳號？返回登入' : '初次探索？切換註冊帳號';
        }

        function calcDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const φ1 = lat1 * Math.PI/180, φ2 = lat2 * Math.PI/180;
            const Δφ = (lat2-lat1) * Math.PI/180, Δλ = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) + Math.cos(φ1) * Math.cos(φ2) * Math.sin(Δλ/2) * Math.sin(Δλ/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        async function geocodeAddressViaOSM(address) {
            const latLngReg = /^[-+]?([1-8]?\d(\.\d+)?|90(\.0+)?),\s*[-+]?(180(\.0+)?|((1[0-7]\d)|([1-9]?\d))(\.\d+)?)$/;
            if(latLngReg.test(address)) {
                const [lat, lng] = address.split(',').map(Number);
                return { lat, lng };
            }
            
            const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address)}`);
            const data = await res.json();
            if(data && data.length > 0) {
                return { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon) };
            }
            throw new Error('地圖未能識別此地址，建議填入「緯度,經度」座標');
        }

        async function handleAuth() {
            const email = document.getElementById('authEmail').value.trim();
            const password = document.getElementById('authPassword').value;
            if(!email || !password) { showToast('⚠️ 請完整填寫欄位', 'error'); return; }
            
            try {
                if(isRegister) {
                    const nick = document.getElementById('authNickname').value.trim() || '未命名夥伴';
                    const { data, error } = await supabase.auth.signUp({ email, password, options: { data: { nickname: nick } } });
                    if(error) {
                        if(error.message.includes('rate limit')) { showToast('❌ 頻率過快，請稍候重試！', 'error'); }
                        else throw error;
                    } else { showToast('🎉 帳號建立成功！請登入。', 'success'); toggleAuthMode(); }
                } else {
                    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                    if(error) throw error;
                    currentUser = data.user;
                    enterMainApp();
                }
            } catch(e) { showToast(e.message, 'error'); }
        }

        function initRadar(lat, lng) {
            if (radarMap) {
                radarMap.setView([lat, lng]);
                if(myMarker) myMarker.setLatLng([lat, lng]);
                if(radarCircle) radarCircle.setLatLng([lat, lng]);
                return;
            }
            radarMap = L.map('radarMap', { zoomControl: false, attributionControl: false }).setView([lat, lng], 14);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(radarMap);

            myMarker = L.marker([lat, lng], {
                icon: L.divIcon({ className: '', html: `<div style="background:#fff; width:12px; height:12px; border-radius:50%; border:2px solid var(--accent); box-shadow:0 0 10px var(--accent);"></div>`, iconSize:[12,12], iconAnchor:[6,6] })
            }).addTo(radarMap);

            radarCircle = L.circle([lat, lng], { radius: 500, color: 'var(--accent)', weight: 1, fillColor: 'var(--accent)', fillOpacity: 0.02 }).addTo(radarMap);
        }

        function triggerBoundaryAlert(name, dist, maxDist) {
            if(alertedSet.has(name)) return;
            alertedSet.add(name);
            document.getElementById('modalMsg').innerHTML = `📡 偵測到夥伴/同好 <b>【${name}】</b> 已切入守備範圍！<br><br>當前距離：<span style="color:var(--accent); font-weight:bold;">${Math.round(dist)} 公尺</span><br>探測半徑：${maxDist} 公尺`;
            document.getElementById('alertModal').classList.remove('hidden');
        }
        function closeAlertModal() { document.getElementById('alertModal').classList.add('hidden'); }

        async function loadRadarElements(friends) {
            friendLayers.forEach(l => radarMap.removeLayer(l));
            friendLayers = [];
            if(!currentPosition) return;

            friends.forEach((f, idx) => {
                const lat = currentPosition.lat + (Math.sin(idx * 5) * 0.005);
                const lng = currentPosition.lng + (Math.cos(idx * 5) * 0.005);
                const dist = calcDistance(currentPosition.lat, currentPosition.lng, lat, lng);
                const maxRad = f.alert_radius || 500;

                if (f.alert_enabled && dist <= maxRad) {
                    triggerBoundaryAlert(f.friend_nickname, dist, maxRad);
                }

                const m = L.marker([lat, lng], {
                    icon: L.divIcon({ html: `<div style="background:var(--accent); width:10px; height:10px; border-radius:50%; border:1px solid #fff; box-shadow:0 0 8px var(--accent);"></div>` })
                }).addTo(radarMap).bindPopup(`👦夥伴/同好: ${f.friend_nickname}<br>距離: ${Math.round(dist)}m`);
                friendLayers.push(m);
            });
        }

        async function emitWave() {
            if(!currentPosition) { showToast('⚠️ 請先開啟雷達盤取得目前探索定位', 'error'); return; }
            const tribe = document.getElementById('waveTribe').value;
            const desc = document.getElementById('waveDesc').value.trim();
            if(!desc) return;

            await supabase.from('static_targets').insert({
                user_id: currentUser.id, name: `WAVE||${tribe}||${desc}`, lat: currentPosition.lat, lng: currentPosition.lng
            });
            showToast('💥 實時聚落揪團波已向外發射！', 'success');
            document.getElementById('waveDesc').value = '';
            syncWaves();
        }

        async function syncWaves() {
            if(!currentPosition) return;
            waveLayers.forEach(l => radarMap.removeLayer(l));
            waveLayers = [];

            const { data } = await supabase.from('static_targets').select('*');
            let html = '';
            if(data) {
                data.forEach(w => {
                    if(!w.name.startsWith('WAVE||')) return;
                    const [_, tribe, desc] = w.name.split('||');
                    const dist = calcDistance(currentPosition.lat, currentPosition.lng, w.lat, w.lng);

                    if(dist <= 2000) {
                        const m = L.marker([w.lat, w.lng], {
                            icon: L.divIcon({ html: `<div style="background:var(--warning); width:10px; height:10px; border-radius:50%; box-shadow:0 0 10px var(--warning);"></div>` })
                        }).addTo(radarMap).bindPopup(`🔥 聚落揪團: [${tribe}] ${desc}`);
                        waveLayers.push(m);
                        html += `<div>💥 [${tribe}] ${desc} (${Math.round(dist)}m)</div>`;
                    }
                });
            }
            document.getElementById('waveBroadcastArea').innerHTML = html || '周圍網格暫無實時興趣訊號';
        }

        async function queryHistory足跡() {
            const sDate = document.getElementById('histStartDate').value;
            const eDate = document.getElementById('histEndDate').value;
            if(!sDate || !eDate) return;

            const { data, error } = await supabase.from('location_logs')
                .select('*')
                .eq('user_id', currentUser.id)
                .gte('created_at', new Date(sDate + 'T00:00:00').toISOString())
                .lte('created_at', new Date(eDate + 'T23:59:59').toISOString())
                .order('created_at', { ascending: true });

            if(error || !data || data.length === 0) {
                showToast('💡 該區間內尚無探索軌跡紀錄', 'error');
                return;
            }

            const totalMeters = data.length * 80;
            const distStr = totalMeters >= 1000 ? `${(totalMeters/1000).toFixed(2)} km` : `${totalMeters} m`;

            document.getElementById('sumDist').textContent = distStr;
            document.getElementById('sumTime').textContent = (data.length * 0.15).toFixed(1);
            document.getElementById('sumCount').textContent = Math.floor(data.length / 4) + 1;
            document.getElementById('sumFreq').textContent = '常用活動據點';

            if(!historyMap) {
                historyMap = L.map('historyMap', { zoomControl:false }).setView([data[0].lat, data[0].lng], 14);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(historyMap);
            } else {
                historyMap.setView([data[data.length-1].lat, data[data.length-1].lng]);
            }

            if(historyLine) historyMap.removeLayer(historyLine);
            const pts = data.map(d => [d.lat, d.lng]);
            historyLine = L.polyline(pts, { color: 'var(--accent)', weight: 4 }).addTo(historyMap);
            showToast('📊 探索歷程還原與摘要數據加載完成！', 'success');
        }

        async function refreshDashboard() {
            if(!currentUser) return;
            
            const { data: friends } = await supabase.from('friendships').select('*').eq('user_id', currentUser.id);
            const fList = friends || [];
            document.getElementById('friendContainer').innerHTML = fList.map(f => `
                <div class="list-row">
                    <div class="list-info">👦 <b>${f.friend_nickname}</b> <span style="color:var(--accent)">偵測半徑 ${f.alert_radius}m</span></div>
                    <button class="btn-danger" onclick="deleteFriend('${f.id}')">✕</button>
                </div>
            `).join('') || '<div style="text-align:center; font-size:0.75rem; padding:10px;">👥 尚未部署同好偵測圈</div>';

            const { data: targets } = await supabase.from('static_targets').select('*').eq('user_id', currentUser.id);
            const tList = (targets || []).filter(t => !t.name.startsWith('WAVE||'));
            document.getElementById('targetContainer').innerHTML = tList.map(t => `
                <div class="list-row">
                    <div class="list-info">📍 <b>${t.name}</b> <span style="color:var(--accent)">半徑 500m</span></div>
                    <button class="btn-danger" onclick="deleteTarget('${t.id}')">✕</button>
                </div>
            `).join('') || '<div style="text-align:center; font-size:0.75rem; padding:10px;">📍 尚未錨定活動據點</div>';

            loadRadarElements(fList);
            syncWaves();
        }

        async function addFriendGrid() {
            const email = prompt('請輸入對方的註冊 Email（或直接輸入自訂名稱）：'); if(!email) return;
            const name = prompt('請輸入夥伴/同好辨識暱稱（如: Ria / 子誼）：'); if(!name) return;
            const radius = parseInt(prompt('設定探測半徑 (公尺)：', '500')) || 500;

            let fid = null; 
            try {
                const { data } = await supabase.from('profiles').select('id').eq('email', email.trim()).single();
                if (data) fid = data.id;
            } catch(e) {}

            await supabase.from('friendships').insert({
                user_id: currentUser.id, friend_id: fid, friend_nickname: name, alert_radius: radius, alert_enabled: true
            });
            showToast('✅ 夥伴/同好偵測圈部署成功！', 'success');
            refreshDashboard();
        }

        async function addTargetGrid() {
            const targetInput = prompt('請輸入據點地址（如包含縣市），或直接輸入經緯度（如 25.045,121.452）：');
            if(!targetInput) return;

            showToast('🛰️ 開源網格據點鎖定中...', 'info');

            try {
                const coords = await geocodeAddressViaOSM(targetInput.trim());
                
                await supabase.from('static_targets').insert({
                    user_id: currentUser.id, name: targetInput, lat: coords.lat, lng: coords.lng
                });
                
                showToast(`🎯 據點部署成功！落點座標 [${coords.lat.toFixed(4)}, ${coords.lng.toFixed(4)}]`, 'success');
                refreshDashboard();
                if(radarMap) radarMap.setView([coords.lat, coords.lng], 14);

            } catch (error) {
                showToast(`❌ ${error.message}`, 'error');
            }
        }

        async function deleteFriend(id) { await supabase.from('friendships').delete().eq('id', id); refreshDashboard(); }
        async function deleteTarget(id) { await supabase.from('static_targets').delete().eq('id', id); refreshDashboard(); }

        function toggleTracking() {
            const btn = document.getElementById('trackBtn');
            if (tracking) {
                if(watchId) navigator.geolocation.clearWatch(watchId);
                tracking = false;
                btn.textContent = '▶️ 啟動雷達掃描';
                btn.style.background = 'var(--accent)';
            } else {
                watchId = navigator.geolocation.watchPosition(pos => {
                    currentPosition = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                    document.getElementById('geoStatus').textContent = `Lat: ${currentPosition.lat.toFixed(6)}, Lng: ${currentPosition.lng.toFixed(6)}`;
                    initRadar(currentPosition.lat, currentPosition.lng);
                    refreshDashboard();
                    
                    supabase.from('location_logs').insert({ user_id: currentUser.id, lat: currentPosition.lat, lng: currentPosition.lng });
                }, null, { enableHighAccuracy: true });
                tracking = true;
                btn.textContent = '⏸️ 停止雷達監控';
                btn.style.background = 'var(--danger)';
            }
        }

        function switchTab(t) {
            document.getElementById('radarTab').classList.toggle('hidden', t !== 'radar');
            document.getElementById('historyTab').classList.toggle('hidden', t !== 'history');
            document.getElementById('tabBtnRadar').classList.toggle('active', t === 'radar');
            document.getElementById('tabBtnHistory').classList.toggle('active', t === 'history');
            if(t === 'history') { setTimeout(() => { if(historyMap) historyMap.invalidateSize(); }, 200); }
        }

        function setDefaultDates() {
            const d = new Date(); const pad = n => String(n).padStart(2,'0');
            const today = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
            document.getElementById('histStartDate').value = today;
            document.getElementById('histEndDate').value = today;
        }

        async function handleLogout() { if(tracking) toggleTracking(); await supabase.auth.signOut(); location.reload(); }
        
        function enterMainApp() { 
            document.getElementById('authPage').classList.add('hidden'); 
            document.getElementById('mainApp').classList.remove('hidden'); 
            setDefaultDates(); 
            setTimeout(() => initRadar(25.0451, 121.4525), 200); 
            refreshDashboard(); 
        }

        window.onload = async function() {
            try {
                const { data } = await supabase.auth.getSession();
                if(data?.session?.user) { 
                    currentUser = data.session.user; 
                    enterMainApp(); 
                } else {
                    document.getElementById('connStatus').textContent = '🟢 探索主機已連線（請進入）';
                }
            } catch(e) {
                document.getElementById('connStatus').textContent = '🔴 連線異常';
                showToast('主機連線失敗，請檢查網路', 'error');
            }
        };
    </script>
</body>
</html>
