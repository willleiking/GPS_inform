<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🟢 TribeRadar 終極商務引力雷達 v2.0</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root {
            --bg: #0b0c10;
            --surface: #151a21;
            --surface2: #1f2630;
            --border: #2ecc7130;
            --text: #95a5a6;
            --accent: #2ecc71; 
            --friend-color: #3498db;
            --stranger-color: #f1c40f;
            --target-color: #e67e22;
            --team-color: #e74c3c;
            --radius: 12px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .app-container { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 12px; }
        .card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 16px; display: flex; flex-direction: column; gap: 12px; }
        .card-title { font-size: 0.95rem; font-weight: 700; color: #fff; display: flex; align-items: center; justify-content: space-between; }
        
        .btn { padding: 10px 14px; border-radius: 20px; border: none; font-weight: 700; font-size: 0.85rem; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 6px; transition: all 0.2s; }
        .btn-primary { background: var(--accent); color: #000; width: 100%; }
        .btn-outline { background: transparent; color: var(--accent); border: 1px solid var(--accent); border-radius: 20px; padding: 6px 12px; font-size: 0.8rem; }
        .btn-danger { background: transparent; color: #e74c3c; border: 1px solid #e74c3c; border-radius: 50%; width: 24px; height: 24px; display: inline-flex; align-items: center; justify-content: center; padding: 0; }
        
        select, input, textarea { background: var(--surface2); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 10px; color: #fff; outline: none; font-size: 0.85rem; width: 100%; }
        textarea { resize: none; height: 60px; }

        .radar-panel { position: relative; background: #070a0e; padding: 0; overflow: hidden; border-radius: var(--radius); border: 1px solid var(--border); }
        .radar-outer { position: relative; width: 100%; padding-bottom: 100%; }
        #radarMap { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        .radar-sweeper { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; border-radius: 50%; background: conic-gradient(from 0deg, rgba(46,204,113,0.1) 0deg, rgba(46,204,113,0) 90deg, transparent 360deg); animation: radar-sweep 4s infinite linear; display: none; }
        @keyframes radar-sweep { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        #historyMap { width: 100%; height: 200px; border-radius: 8px; }
        .list-row { background: var(--surface2); border-radius: 8px; padding: 10px; display: flex; align-items: center; justify-content: space-between; font-size: 0.85rem; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        
        .hidden { display: none !important; }
        .toast-container { position: fixed; top: 16px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 6px; width: 90%; max-width: 400px; }
        .toast { padding: 12px; border-radius: 8px; font-size: 0.8rem; text-align: center; color: #fff; font-weight: bold; }
        .toast.match { background: #e67e22; box-shadow: 0 0 15px #e67e22; border: 2px solid #fff; }
        .toast.success { background: #27ae60; }
        .toast.error { background: #c0392b; }

        /* 聊天視窗 */
        .chat-box { background: var(--surface2); border-radius: 8px; height: 180px; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 6px; font-size: 0.85rem; }
        .msg-in { align-self: flex-start; background: #2c3e50; color: #fff; padding: 6px 10px; border-radius: 8px; max-width: 80%; }
        .msg-out { align-self: flex-end; background: var(--accent); color: #000; padding: 6px 10px; border-radius: 8px; max-width: 80%; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 4px; }
        .status-online { background: #2ecc71; box-shadow: 0 0 6px #2ecc71; }
        .status-offline { background: #95a5a6; }
    </style>
</head>
<body>

    <div class="toast-container" id="toastContainer"></div>

    <div class="app-container" id="authPage">
        <div class="card" style="text-align:center;">
            <h2 style="color:var(--accent)">🟢 TribeRadar 商務引力雷達</h2>
            <p style="font-size:0.75rem; color:var(--accent);" id="connStatus">探索主機連線中...</p>
        </div>
        <div class="card">
            <input type="email" id="authEmail" placeholder="Email 帳號">
            <input type="password" id="authPassword" placeholder="密碼 (至少6碼)">
            <div class="hidden" id="nickGroup"><input type="text" id="authNickname" placeholder="設定探索暱稱"></div>
            <button class="btn btn-primary" id="authActionBtn" onclick="handleAuth()">進入引力網格</button>
            <button class="btn btn-outline" id="authToggleBtn" onclick="toggleAuthMode()">初次探索？切換註冊</button>
        </div>
    </div>

    <div class="app-container hidden" id="mainApp">
        
        <div class="card radar-panel">
            <div class="radar-outer">
                <div id="radarMap"></div>
                <div class="radar-sweeper" id="sweeperEl"></div>
            </div>
        </div>

        <div class="card">
            <div style="display:flex; gap:8px; align-items:center; justify-content:space-between;">
                <button class="btn btn-primary" id="trackBtn" onclick="toggleTracking()">▶️ 啟動雷達掃描</button>
                <label style="font-size:0.8rem; color:#fff; display:flex; align-items:center; gap:4px;">
                    <input type="checkbox" id="stealthMode" onchange="toggleStealthMode()"> 🌐 開啟隱身模式
                </label>
                <button class="btn btn-outline" onclick="handleLogout()" style="color:#e74c3c; border-color:#e74c3c; padding:6px 12px;">登出</button>
            </div>
            
            <div class="grid-2">
                <div>
                    <span style="font-size:0.75rem; color:var(--accent);">🎯 篩選同好類別：</span>
                    <select id="filterCategory" onchange="refreshRadarMarkers()">
                        <option value="全類別">1. 全類別</option>
                        <option value="吃貨團">2. 吃貨團</option>
                        <option value="健身團">3. 健身團</option>
                        <option value="商務交流">4. 商務交流</option>
                        <option value="科技新創">5. 科技新創</option>
                    </select>
                </div>
                <div>
                    <span style="font-size:0.75rem; color:var(--accent);">👁️ 圖層過濾顯示：</span>
                    <div style="font-size:0.75rem; display:flex; flex-direction:column; gap:4px; margin-top:4px;">
                        <label><input type="checkbox" id="showStrangers" checked onchange="refreshRadarMarkers()"> 陌生人 (黃點)</label>
                        <label><input type="checkbox" id="showFriends" checked onchange="refreshRadarMarkers()"> 朋友/組員 (藍點)</label>
                        <label><input type="checkbox" id="showTargets" checked onchange="refreshRadarMarkers()"> 固定地點 (綠點)</label>
                        <label><input type="checkbox" id="showTeams" checked onchange="refreshRadarMarkers()"> 🔥 組隊同好 (紅圈特效)</label>
                    </div>
                </div>
            </div>
            <div style="display:grid; grid-template-columns:1fr 1fr; font-size:0.7rem; color:var(--accent);">
                <div id="geoStatus">GPS 座標：未指派</div>
                <div style="text-align:right;">偵測範圍：1000m 以內</div>
            </div>
        </div>

        <div class="card" style="border: 1px solid #f1c40f;">
            <div class="card-title" style="color:#f1c40f;">📋 大廳即時組隊公告欄</div>
            <div id="teamNoticeBoard" style="display:flex; flex-direction:column; gap:6px; max-height:150px; overflow-y:auto;">
                <div style="font-size:0.75rem; text-align:center; color:#555;">正在加載看板數據...</div>
            </div>
        </div>

        <div class="card" style="border: 1px solid var(--team-color);">
            <div class="card-title" style="color: var(--team-color);">🔥 我的即時組隊揪團狀態</div>
            <div style="display:flex; flex-direction:column; gap:6px;">
                <input type="text" id="teamTitle" placeholder="輸入招募隊伍名稱 (如: 健身工廠新埔店練腿)">
                <select id="teamCategory">
                    <option value="健身團">健身團</option>
                    <option value="吃貨團">吃貨團</option>
                    <option value="商務交流">商務交流</option>
                    <option value="科技新創">科技新創</option>
                </select>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px; margin-top:4px;">
                    <button class="btn" style="background:var(--team-color); color:#fff;" onclick="changeTeamStatus(true)">🟢 開啟組隊狀態</button>
                    <button class="btn" style="background:var(--surface2); color:#fff;" onclick="changeTeamStatus(false)">🛑 關閉組隊顯示</button>
                </div>
            </div>
            <div id="myActiveTeamStatus" style="font-size:0.8rem; color:#fff; text-align:center; font-weight:bold;">當前狀態：未開啟組隊</div>
        </div>

        <div class="card" style="border: 1px solid var(--friend-color);" id="chatSection">
            <div class="card-title" style="color:var(--friend-color);" id="chatTitle">💬 好友即時對話區 (點擊名單開始對話)</div>
            <div class="chat-box" id="chatBox">
                <div style="color:#555; text-align:center; margin-top:60px; font-size:0.8rem;">選擇下方一個好友開啟對話面板</div>
            </div>
            <div style="display:grid; grid-template-columns:1fr auto; gap:6px;">
                <input type="text" id="chatInput" placeholder="輸入加密文字訊息..." disabled>
                <button class="btn btn-primary" style="background:var(--friend-color);" id="chatSendBtn" onclick="sendMessage()" disabled>發送</button>
            </div>
        </div>

        <div class="card">
            <div class="card-title">🚀 我的商務引力與資源需求設定</div>
            <div>
                <span style="font-size:0.75rem; color:var(--accent);">我的主類別群組：</span>
                <select id="myProfileCategory">
                    <option value="商務交流">商務交流</option>
                    <option value="吃貨團">吃貨團</option>
                    <option value="健身團">健身團</option>
                    <option value="科技新創">科技新創</option>
                </select>
            </div>
            <div style="display:flex; flex-direction:column; gap:6px;">
                <label style="font-size:0.75rem; color:#fff;">(1) 我擁有什麼資源：</label>
                <textarea id="myHasWhat" placeholder="我有全端開發技術、健身工廠會籍、連鎖餐飲供應鏈..."></textarea>
                
                <label style="font-size:0.75rem; color:#fff;">(2) 我可以幫到你什麼：</label>
                <textarea id="myCanHelp" placeholder="幫忙規劃數位產品、指導重訓動作、對接通路..."></textarea>
                
                <label style="font-size:0.75rem; color:#fff;">(3) 我可以如何幫你曝光：</label>
                <textarea id="myCanExpose" placeholder="可以在自媒體專欄、破萬人臉書社群幫忙宣傳曝光..."></textarea>
                
                <label style="font-size:0.75rem; color:#fff;">(4) 我可以幫你串聯什麼資源：</label>
                <textarea id="myCanLink" placeholder="可以幫忙對接創投基金、原廠大廠代理、地方同業公會..."></textarea>
                
                <label style="font-size:0.75rem; color:#e67e22; font-weight:bold;">🔍 我的精準需要 (用於 stranger 路過即時通知配對)：</label>
                <textarea id="myNeedWhat" placeholder="目前需要尋找行銷合夥人、一對一健身教練..."></textarea>
            </div>
            <button class="btn btn-primary" onclick="saveProfile()">💾 儲存並更新引力設定</button>
        </div>

        <div class="card">
            <div class="card-title">📍 定點目標區域管理</div>
            <div id="targetList" style="display:flex; flex-direction:column; gap:6px;"></div>
            <div style="display:grid; grid-template-columns: 1fr auto; gap:6px;">
                <input type="text" id="tName" placeholder="新增定點區域名稱">
                <button class="btn btn-outline" onclick="addStaticTarget()">+ 新增</button>
            </div>
        </div>

        <div class="card">
            <div class="card-title">🧑‍🤝‍🧑 我的綁定名單 (好友/組員看板)</div>
            <div id="friendList" style="display:flex; flex-direction:column; gap:6px;"></div>
            <div style="display:grid; grid-template-columns: 1fr auto; gap:6px;">
                <input type="text" id="fEmail" placeholder="輸入同好註冊的 Email 進行綁定">
                <button class="btn btn-outline" onclick="addFriend()">+ 綁定</button>
            </div>
        </div>

        <div class="card">
            <div class="card-title">📅 歷史軌跡與數據分析</div>
            <div class="grid-2">
                <input type="date" id="dateStart" value="2026-06-15">
                <input type="date" id="dateEnd" value="2026-06-21">
            </div>
            <button class="btn btn-primary" onclick="queryHistoryLogs()">🔍 查詢軌跡歷程</button>
            <div class="grid-2">
                <div style="background:var(--surface2); padding:10px; border-radius:8px; text-align:center;">
                    <div id="statDistance" style="font-size:1.1rem; font-weight:bold; color:var(--accent);">-- km</div>
                    <div style="font-size:0.7rem;">總移動距離</div>
                </div>
                <div style="background:var(--surface2); padding:10px; border-radius:8px; text-align:center;">
                    <div id="statTopPlace" style="font-size:0.9rem; font-weight:bold; color:var(--accent); white-space:nowrap; overflow:hidden;">--</div>
                    <div style="font-size:0.7rem;">常出沒點</div>
                </div>
            </div>
            <div id="historyMap"></div>
        </div>

    </div>

    <script>
        // ======= 🚀 核心設定 =======
        window.SUPABASE_URL = 'https://hknxdvefnuxgyepuuqra.supabase.co';
        window.SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhrbnhkdmVmbnV4Z3llcHV1cXJhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1MzM0MDAsImV4cCI6MjA5NzEwOTQwMH0.M97OwM_9CrLCrgxbyA6kQs0MLFiRDzyYlvIiGqhBGec';
        if (!window.dbClient) window.dbClient = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_KEY);

        let currentUser = null, tracking = false, watchId = null, currentPosition = null;
        let radarMap = null, myMarker = null, radarCircle = null;
        let historyMap = null, historyPolyline = null;
        let mapElements = [], historyMarkers = [];
        let isRegister = false, activeChatUserId = null;
        let lastNotifiedUsers = new Set(); 
        let globalUsersCache = [];

        function showToast(msg, type='info') {
            const t = document.createElement('div'); t.className = `toast ${type}`; t.textContent = msg;
            document.getElementById('toastContainer').appendChild(t);
            setTimeout(() => t.remove(), 4500);
        }

        function toggleAuthMode() {
            isRegister = !isRegister;
            document.getElementById('nickGroup').classList.toggle('hidden', !isRegister);
            document.getElementById('authActionBtn').textContent = isRegister ? '註冊全新探索帳號' : '進入引力網格';
            document.getElementById('authToggleBtn').textContent = isRegister ? '已有帳號？返回登入' : '初次探索？切換註冊';
        }

        function calcDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const φ1 = lat1 * Math.PI/180, φ2 = lat2 * Math.PI/180;
            const Δφ = (lat2-lat1) * Math.PI/180, Δλ = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) + Math.cos(φ1) * Math.cos(φ2) * Math.sin(Δλ/2) * Math.sin(Δλ/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        // ======= 🔐 身分驗證 =======
        async function handleAuth() {
            const email = document.getElementById('authEmail').value.trim();
            const password = document.getElementById('authPassword').value;
            if(!email || !password) { showToast('⚠️ 請填寫欄位', 'error'); return; }
            try {
                if(isRegister) {
                    const nick = document.getElementById('authNickname').value.trim() || '商務精英';
                    const { data, error } = await window.dbClient.auth.signUp({ email, password, options: { data: { nickname: nick } } });
                    if(error) throw error;
                    if(data.user) {
                        await window.dbClient.from('profiles').insert({ id: data.user.id, email, nickname: nick, category: '商務交流', is_visible: true });
                    }
                    showToast('🎉 註冊成功，請直接登入！', 'success');
                    toggleAuthMode();
                } else {
                    const { data, error } = await window.dbClient.auth.signInWithPassword({ email, password });
                    if(error) throw error;
                    currentUser = data.user;
                    enterMainApp();
                }
            } catch(e) { showToast(e.message, 'error'); }
        }

        // ======= 🚀 簡介與四大資源設定 =======
        async function loadProfileData() {
            if(!currentUser) return;
            const { data } = await window.dbClient.from('profiles').select('*').eq('id', currentUser.id).single();
            if(data) {
                if(data.category) document.getElementById('myProfileCategory').value = data.category;
                document.getElementById('myHasWhat').value = data.has_what || '';
                document.getElementById('myCanHelp').value = data.can_help || '';
                document.getElementById('myCanExpose').value = data.can_expose || '';
                document.getElementById('myNeedWhat').value = data.need_what || '';
                if(data.can_link) document.getElementById('myCanLink').value = data.can_link;
                document.getElementById('stealthMode').checked = !data.is_visible;
                
                if(data.is_teaming) {
                    // 💥 檢查是否超過7天未更新 (組員自動退組機制保護)
                    const joinedTime = new Date(data.joined_team_at || new Date());
                    const diffDays = (new Date() - joinedTime) / (1000 * 60 * 60 * 24);
                    if(diffDays >= 7) {
                        await changeTeamStatus(false);
                    } else {
                        document.getElementById('teamTitle').value = data.team_name || '';
                        document.getElementById('teamCategory').value = data.team_category || '健身團';
                        document.getElementById('myActiveTeamStatus').innerHTML = `🔴 隊伍招募中: ${data.team_name} (${data.team_category})`;
                    }
                }
            }
        }

        async function saveProfile() {
            if(!currentUser) return;
            const updates = {
                category: document.getElementById('myProfileCategory').value,
                has_what: document.getElementById('myHasWhat').value.trim(),
                can_help: document.getElementById('myCanHelp').value.trim(),
                can_expose: document.getElementById('myCanExpose').value.trim(),
                can_link: document.getElementById('myCanLink').value.trim(),
                need_what: document.getElementById('myNeedWhat').value.trim()
            };
            await window.dbClient.from('profiles').update(updates).eq('id', currentUser.id);
            showToast('💾 引力資源與自介更新成功！', 'success');
            refreshRadarMarkers();
        }

        // ======= 🌐 遮蔽開關：隱身功能與上下線設定 =======
        async function toggleStealthMode() {
            const isVisible = !document.getElementById('stealthMode').checked;
            await window.dbClient.from('profiles').update({ is_visible: isVisible, last_seen: new Date() }).eq('id', currentUser.id);
            showToast(isVisible ? '🔓 已開放雷達定位，可被他人搜索' : '🔒 已開啟隱身模式，已從所有人雷達消失', 'info');
            refreshRadarMarkers();
        }

        // ======= 📡 實時組隊狀態切換 =======
        async function changeTeamStatus(enable) {
            if(!currentUser) return;
            const title = document.getElementById('teamTitle').value.trim();
            const cat = document.getElementById('teamCategory').value;
            if(enable && !title) { showToast('⚠️ 請先輸入隊伍名稱！', 'error'); return; }

            await window.dbClient.from('profiles').update({
                is_teaming: enable,
                team_name: enable ? title : null,
                team_category: enable ? cat : null,
                joined_team_at: enable ? new Date() : null
            }).eq('id', currentUser.id);

            if(enable) {
                showToast(`🔴 已開啟即時組隊，已掛載至您的個人 GPS`, 'success');
                document.getElementById('myActiveTeamStatus').innerHTML = `🔴 隊伍招募中: ${title} (${cat})`;
            } else {
                showToast(`🛑 已關閉組隊顯示`, 'info');
                document.getElementById('myActiveTeamStatus').innerHTML = `當前狀態：未開啟組隊`;
                document.getElementById('teamTitle').value = '';
            }
            refreshRadarMarkers();
        }

        // ======= 🛰️ 雷達地圖控制中心 =======
        function initRadarMap(lat, lng) {
            if (radarMap) {
                radarMap.setView([lat, lng]);
                if(myMarker) myMarker.setLatLng([lat, lng]);
                if(radarCircle) radarCircle.setLatLng([lat, lng]);
                return;
            }
            radarMap = L.map('radarMap', { zoomControl: false, attributionControl: false }).setView([lat, lng], 15);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(radarMap);

            myMarker = L.marker([lat, lng], {
                icon: L.divIcon({ html: `<div style="background:#fff; width:14px; height:14px; border-radius:50%; border:3px solid var(--accent); box-shadow:0 0 12px var(--accent);"></div>`, iconSize:[14,14], iconAnchor:[7,7] })
            }).addTo(radarMap);

            radarCircle = L.circle([lat, lng], { radius: 1000, color: 'var(--accent)', weight: 1, fillColor: 'var(--accent)', fillOpacity: 0.005 }).addTo(radarMap);
        }

        function toggleTracking() {
            const btn = document.getElementById('trackBtn');
            const sweeper = document.getElementById('sweeperEl');
            if (tracking) {
                if(watchId) navigator.geolocation.clearWatch(watchId);
                tracking = false; btn.textContent = '▶️ 啟動雷達掃描'; sweeper.style.display = 'none';
            } else {
                watchId = navigator.geolocation.watchPosition(async pos => {
                    currentPosition = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                    document.getElementById('geoStatus').textContent = `GPS: ${currentPosition.lat.toFixed(4)}, ${currentPosition.lng.toFixed(4)}`;
                    initRadarMap(currentPosition.lat, currentPosition.lng);
                    
                    await window.dbClient.from('profiles').update({ current_lat: currentPosition.lat, current_lng: currentPosition.lng, last_seen: new Date() }).eq('id', currentUser.id);
                    await window.dbClient.from('location_logs').insert({ user_id: currentUser.id, lat: currentPosition.lat, lng: currentPosition.lng });
                    refreshRadarMarkers();
                }, e => showToast('GPS 定位失敗', 'error'), { enableHighAccuracy: true });
                tracking = true; btn.textContent = '⏸️ 停止雷達監控'; sweeper.style.display = 'block';
            }
        }

        // ======= 📡 核心演算刷新標記 (支援超出範圍遮蔽演算法) =======
        async function refreshRadarMarkers() {
            if(!radarMap || !currentPosition) return;
            mapElements.forEach(el => radarMap.removeLayer(el)); mapElements = [];

            const selectedCategory = document.getElementById('filterCategory').value;
            const showStrangers = document.getElementById('showStrangers').checked;
            const showFriends = document.getElementById('showFriends').checked;
            const showTargets = document.getElementById('showTargets').checked;
            const showTeams = document.getElementById('showTeams').checked;

            const { data: myFriends } = await window.dbClient.from('friendships').select('friend_email');
            const friendEmails = myFriends ? myFriends.map(f => f.friend_email) : [];

            const { data: users } = await window.dbClient.from('profiles').select('*').not('current_lat', 'is', null);
            globalUsersCache = users || [];

            renderNoticeBoard(globalUsersCache, friendEmails);
            updateFriendsListDOM(globalUsersCache);

            if(users) {
                const myNeed = document.getElementById('myNeedWhat').value.toLowerCase();

                users.forEach(u => {
                    // 🛡️ 隱身防護：如果對方開啟隱身模式且不是自己，直接完全不處理
                    if(!u.is_visible && u.id !== currentUser.id) return;

                    const isFriend = friendEmails.includes(u.email);
                    const dist = calcDistance(currentPosition.lat, currentPosition.lng, u.current_lat, u.current_lng);

                    // 💥 核心功能5：超過 1000m (雷達範圍)，一律不顯示點點（自己除外）
                    if (dist > 1000 && u.id !== currentUser.id) return;

                    if(u.id !== currentUser.id) {
                        const targetCategory = u.is_teaming ? u.team_category : u.category;
                        if(selectedCategory !== '全類別' && targetCategory !== selectedCategory) return;
                        if(u.is_teaming && !showTeams) return;
                        if(!u.is_teaming && isFriend && !showFriends) return;
                        if(!u.is_teaming && !isFriend && !showStrangers) return;
                    }

                    // 💥 引力自動適配通知機制
                    if (u.id !== currentUser.id && dist <= 200 && myNeed.length > 0 && u.has_what) {
                        if (u.has_what.toLowerCase().includes(myNeed) && !lastNotifiedUsers.has(u.id)) {
                            showToast(`📡 資源引力交會！附近發現適配者：【${u.nickname}】！`, 'match');
                            lastNotifiedUsers.add(u.id);
                        }
                    }

                    // 🎨 標記樣式分色設計
                    let dotHtml = '';
                    if (u.id === currentUser.id) return; 
                    
                    if (u.is_teaming) {
                        dotHtml = `<div style="background:var(--team-color); width:16px; height:16px; border-radius:50%; border:2px solid #fff; box-shadow:0 0 12px var(--team-color); display:flex; align-items:center; justify-content:center; font-size:9px; color:#fff; font-weight:bold;">🔥</div>`;
                    } else if (isFriend) {
                        dotHtml = `<div style="background:var(--friend-color); width:12px; height:12px; border-radius:50%; border:2px solid #fff; box-shadow:0 0 8px var(--friend-color);"></div>`;
                    } else {
                        dotHtml = `<div style="background:var(--stranger-color); width:12px; height:12px; border-radius:50%; border:2px solid #fff; box-shadow:0 0 8px var(--stranger-color);"></div>`;
                    }
                    
                    const marker = L.marker([u.current_lat, u.current_lng], {
                        icon: L.divIcon({ html: dotHtml, iconSize:[16,16], iconAnchor:[8,8] })
                    }).addTo(radarMap);

                    let teamBanner = u.is_teaming 
                        ? `<div style="background:#e74c3c; color:#fff; padding:6px; border-radius:4px; margin-bottom:8px; font-size:11px;">🔥 <b>招募隊伍：</b>${u.team_name}<br><button onclick="showToast('🤝 已成功申請加入組隊','success')" style="margin-top:4px; border:none; background:#fff; color:#e74c3c; font-weight:bold; padding:2px 6px; border-radius:3px; cursor:pointer;">發出組隊邀請/申請</button></div>`
                        : '';

                    let chatButton = isFriend 
                        ? `<button onclick="openChatWindow('${u.id}', '${u.nickname}')" style="margin-top:6px; width:100%; border:none; background:var(--friend-color); color:#fff; padding:4px; border-radius:4px; font-weight:bold; cursor:pointer;">💬 線上文字對話</button>`
                        : u.is_teaming ? `<button onclick="openChatWindow('${u.id}', '${u.nickname} (臨)')" style="margin-top:6px; width:100%; border:none; background:var(--team-color); color:#fff; padding:4px; border-radius:4px; font-weight:bold; cursor:pointer;">💬 臨時組員對話</button>` : '';

                    marker.bindPopup(`
                        <div style="font-family:sans-serif; color:#333; min-width:210px;">
                            <h4 style="color:#2c3e50; margin-bottom:4px;">👤 ${u.nickname}</h4>
                            <p style="font-size:10px; color:#7f8c8d; margin-bottom:6px;">距離：${dist.toFixed(0)}m | 類別: ${u.category}</p>
                            ${teamBanner}
                            <div style="font-size:11px; line-height:1.4; max-height:120px; overflow-y:auto; background:#f8f9fa; padding:4px; border-radius:4px;">
                                <b>(1)擁有資源:</b> ${u.has_what||'無'}<br>
                                <b>(2)可幫到什麼:</b> ${u.can_help||'無'}<br>
                                <b>(3)如何幫曝光:</b> ${u.can_expose||'無'}<br>
                                <b>(4)可串聯資源:</b> ${u.can_link||'無'}<br>
                                <b style="color:#e67e22;">🔍需求:</b> ${u.need_what||'無'}
                            </div>
                            ${chatButton}
                        </div>
                    `);
                    mapElements.push(marker);
                });
            }

            // 固定地點渲染 (不受範圍限制，超出仍顯示)
            if (showTargets) {
                const { data: targets } = await window.dbClient.from('static_targets').select('*');
                if(targets) {
                    targets.forEach(t => {
                        const tm = L.marker([t.lat, t.lng], {
                            icon: L.divIcon({ html: `<div style="background:var(--target-color); width:12px; height:12px; border-radius:50%; border:2px solid #fff; box-shadow:0 0 8px var(--target-color);"></div>`, iconSize:[12,12], iconAnchor:[6,6] })
                        }).addTo(radarMap).bindPopup(`<b>📍 固定地點: ${t.name}</b>`);
                        mapElements.push(tm);
                    });
                }
            }
        }

        // ======= 📋 功能七：大廳即時組隊公告欄與地圖聯動 =======
        function renderNoticeBoard(users, friendEmails) {
            const board = document.getElementById('teamNoticeBoard');
            const teamingUsers = users.filter(u => u.is_teaming);
            if(teamingUsers.length === 0) {
                board.innerHTML = `<div style="font-size:0.75rem; text-align:center; color:#555; padding:10px;">目前大廳無人發起組隊</div>`;
                return;
            }
            let html = '';
            teamingUsers.forEach(u => {
                html += `
                    <div class="list-row" style="border-left: 4px solid var(--team-color); cursor:pointer;" onclick="focusOnMap(${u.current_lat}, ${u.current_lng}, '${u.nickname}')">
                        <div>
                            <span style="background:var(--team-color); color:#fff; font-size:0.65rem; padding:1px 4px; border-radius:3px; margin-right:4px;">${u.team_category}</span>
                            <b style="color:#fff;">${u.team_name}</b>
                            <div style="font-size:0.7rem; color:#7f8c8d;">發起人: ${u.nickname}</div>
                        </div>
                        <button class="btn btn-outline" style="padding:2px 8px; font-size:0.7rem;">🎯 導航定位</button>
                    </div>
                `;
            });
            board.innerHTML = html;
        }

        function focusOnMap(lat, lng, name) {
            if(radarMap) {
                radarMap.setView([lat, lng], 16);
                showToast(`🎯 已將地圖視野直觀聚焦至 ${name} 的組隊座標點！`, 'success');
            }
        }

        // ======= 🧑‍🤝‍🧑 好友名單整合與上下線偵測機制 =======
        function updateFriendsListDOM(users) {
            const listEl = document.getElementById('friendList');
            window.dbClient.from('friendships').select('*').then(({ data }) => {
                if(!data || data.length === 0) {
                    listEl.innerHTML = '<div style="font-size:0.75rem; text-align:center; color:#555;">尚無綁定同好名單</div>';
                    return;
                }
                let html = '';
                data.forEach(f => {
                    // 比對快取，確認好友是否在線 (5分鐘內有更新活動算在線)
                    const matchUser = users.find(u => u.email === f.friend_email);
                    let isOnline = false;
                    if(matchUser && matchUser.last_seen) {
                        isOnline = (new Date() - new Date(matchUser.last_seen)) < (5 * 60 * 1000);
                    }
                    const statusClass = isOnline ? 'status-online' : 'status-offline';
                    const statusText = isOnline ? '線上' : '離線';

                    html += `
                        <div class="list-row">
                            <div onclick="openChatWindow('${matchUser?.id || ''}', '${f.friend_nickname}')" style="cursor:pointer; flex-grow:1;">
                                <span class="status-dot ${statusClass}"></span>
                                <b style="color:#fff;">${f.friend_nickname}</b> 
                                <span style="font-size:0.7rem; color:#7f8c8d;">(${statusText})</span>
                            </div>
                            <button class="btn-danger" onclick="deleteFriend('${f.id}')">×</button>
                        </div>
                    `;
                });
                listEl.innerHTML = html;
            });
        }

        // ======= 💬 文字對話視窗控制核心 (過濾20天訊息) =======
        async function openChatWindow(userId, nickname) {
            if(!userId) { showToast('該使用者目前不在線上網格中', 'error'); return; }
            activeChatUserId = userId;
            document.getElementById('chatTitle').textContent = `💬 與 【${nickname}】即時加密對話中`;
            document.getElementById('chatInput').disabled = false;
            document.getElementById('chatSendBtn').disabled = false;
            loadChatMessages();
        }

        async function loadChatMessages() {
            if(!activeChatUserId || !currentUser) return;
            
            // 計算20天前的時間點 (精準符合訊息保留20天要求)
            const twentyDaysAgo = new Date();
            twentyDaysAgo.setDate(twentyDaysAgo.getDate() - 20);

            const { data } = await window.dbClient.from('friend_messages')
                .select('*')
                .gte('created_at', twentyDaysAgo.toISOString())
                .or(`and(sender_id.eq.${currentUser.id},receiver_id.eq.${activeChatUserId}),and(sender_id.eq.${activeChatUserId},receiver_id.eq.${currentUser.id})`)
                .order('created_at', { ascending: true });

            const box = document.getElementById('chatBox');
            box.innerHTML = '';
            if(data) {
                data.forEach(m => {
                    const div = document.createElement('div');
                    div.className = m.sender_id === currentUser.id ? 'msg-out' : 'msg-in';
                    div.textContent = m.message;
                    box.appendChild(div);
                });
                box.scrollTop = box.scrollHeight;
            }
        }

        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const msg = input.value.trim();
            if(!msg || !activeChatUserId) return;

            await window.dbClient.from('friend_messages').insert({ sender_id: currentUser.id, receiver_id: activeChatUserId, message: msg });
            input.value = '';
            loadChatMessages();
        }

        // ======= 📍 固定地點管理 =======
        async function loadStaticTargets() {
            const { data } = await window.dbClient.from('static_targets').select('*');
            let html = '';
            if(data) {
                data.forEach(t => {
                    html += `<div class="list-row"><span>📍 <b>${t.name}</b> (${t.lat.toFixed(3)}, ${t.lng.toFixed(3)})</span><button class="btn-danger" onclick="deleteTarget('${t.id}')">×</button></div>`;
                });
            }
            document.getElementById('targetList').innerHTML = html || '<div style="font-size:0.75rem; text-align:center; color:#555;">未設定固定地點</div>';
        }

        async function addStaticTarget() {
            const name = document.getElementById('tName').value.trim();
            if(!name || !currentPosition) { showToast('⚠️ 請先啟動掃描取得定位', 'error'); return; }
            await window.dbClient.from('static_targets').insert({ user_id: currentUser.id, name, lat: currentPosition.lat, lng: currentPosition.lng });
            document.getElementById('tName').value = ''; loadStaticTargets(); refreshRadarMarkers();
        }

        async function deleteTarget(id) { await window.dbClient.from('static_targets').delete().eq('id', id); loadStaticTargets(); refreshRadarMarkers(); }
        async function addFriend() {
            const email = document.getElementById('fEmail').value.trim(); if(!email) return;
            const { data: p } = await window.dbClient.from('profiles').select('nickname').eq('email', email).single();
            await window.dbClient.from('friendships').insert({ user_id: currentUser.id, friend_email: email, friend_nickname: p?p.nickname:email, alert_radius: 500 });
            document.getElementById('fEmail').value = ''; showToast('✅ 成功綁定同好組員！', 'success'); refreshRadarMarkers();
        }
        async function deleteFriend(id) { await window.dbClient.from('friendships').delete().eq('id', id); refreshRadarMarkers(); }

        // ======= 📊 歷史軌跡與數據分析 =======
        async function queryHistoryLogs() {
            if(!historyMap) {
                historyMap = L.map('historyMap', { attributionControl: false }).setView([25.0451, 121.4525], 13);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(historyMap);
            }
            historyMarkers.forEach(m => historyMap.removeLayer(m)); historyMarkers = [];
            if(historyPolyline) { historyMap.removeLayer(historyPolyline); historyPolyline = null; }

            const start = document.getElementById('dateStart').value + 'T00:00:00Z';
            const end = document.getElementById('dateEnd').value + 'T23:59:59Z';
            const { data: logs } = await window.dbClient.from('location_logs').select('*').eq('user_id', currentUser.id).gte('created_at', start).lte('created_at', end).order('created_at', { ascending: true });

            if(!logs || logs.length === 0) { showToast('📭 該區間無軌跡數據', 'error'); return; }

            let latlngs = [], totalDist = 0;
            logs.forEach((log, i) => {
                latlngs.push([log.lat, log.lng]);
                if(i > 0) totalDist += calcDistance(logs[i-1].lat, logs[i-1].lng, log.lat, log.lng);
                const m = L.circleMarker([log.lat, log.lng], { radius: 4, color: 'var(--accent)' }).addTo(historyMap);
                historyMarkers.push(m);
            });

            historyPolyline = L.polyline(latlngs, { color: 'var(--accent)', weight: 3 }).addTo(historyMap);
            historyMap.fitBounds(historyPolyline.getBounds());
            document.getElementById('statDistance').textContent = (totalDist / 1000).toFixed(2) + ' km';
            document.getElementById('statTopPlace').textContent = '新北市 (出沒核心)';
        }

        // ======= ⚙️ 系統初始化與訂閱監聽 =======
        async function handleLogout() { if(tracking) toggleTracking(); await window.dbClient.auth.signOut(); location.reload(); }
        
        function enterMainApp() { 
            document.getElementById('authPage').classList.add('hidden'); 
            document.getElementById('mainApp').classList.remove('hidden'); 
            loadProfileData(); loadStaticTargets();
            setTimeout(() => { initRadarMap(25.0451, 121.4525); }, 300); 

            // ⚡ 啟動動態資料實時監聽 (每 5 秒主動校對)
            setInterval(() => { if(tracking) refreshRadarMarkers(); if(activeChatUserId) loadChatMessages(); }, 5000);
        }

        window.onload = async function() {
            try {
                const { data } = await window.dbClient.auth.getSession();
                if(data?.session?.user) { currentUser = data.session.user; enterMainApp(); }
                else { document.getElementById('connStatus').textContent = '🟢 雷達主機就緒，請登入'; }
            } catch(e) { document.getElementById('connStatus').textContent = '🔴 連線異常'; }
        };
    </script>
</body>
</html>
