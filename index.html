<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TribeRadar 隊伍對話頻道</title>
    <!-- 引入 Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --border-color: #333;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .chat-container {
            width: 100%;
            max-width: 500px;
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            height: 85vh;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }
        .chat-header {
            padding: 15px;
            background: #252525;
            border-bottom: 1px solid var(--border-color);
            font-weight: bold;
            text-align: center;
            font-size: 1.1rem;
        }
        .chat-box {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #161616;
        }
        /* 訊息對話框基本樣式 */
        .msg-line {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 12px;
            word-wrap: break-word;
            word-break: break-all;
            animation: fadeIn 0.2s ease-in-out;
        }
        .msg-me {
            align-self: flex-end;
            background-color: #007aff;
            color: #fff;
            border-bottom-right-radius: 2px;
        }
        .msg-other {
            align-self: flex-start;
            background-color: #2c2c2e;
            color: #fff;
            border-bottom-left-radius: 2px;
        }
        .chat-input-area {
            padding: 12px;
            background: #252525;
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 8px;
        }
        .chat-input {
            flex: 1;
            background: #3a3a3c;
            border: none;
            border-radius: 20px;
            padding: 10px 16px;
            color: #fff;
            outline: none;
            font-size: 0.95rem;
        }
        .chat-submit {
            background: #007aff;
            color: white;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            transition: background 0.2s;
        }
        .chat-submit:hover { background: #0056b3; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header" id="chatHeader">頻道載入中...</div>
    <div class="chat-box" id="partyChatBox">初始化連線中...</div>
    <div class="chat-input-area">
        <input type="text" id="chatInputField" class="chat-input" placeholder="請輸入訊息..." autocomplete="off">
        <button id="sendChatBtn" class="chat-submit">➔</button>
    </div>
</div>

<script>
    // -----------------------------------------------------------------
    // 🎛️ 1. SUPABASE 初始化設定 (請確實填入您的專案認證)
    // -----------------------------------------------------------------
    const SUPABASE_URL = "https://您的Supabase專案ID.supabase.co"; 
    const SUPABASE_ANON_KEY = "您的Supabase匿名Key";

    if (!window.dbClient) {
        window.dbClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    }

    // 模擬當前登入的使用者資訊（實作中應由 Auth 機制或全域狀態取得）
    // 💡 測試時請確保此 id 在您的 profiles 表格中存在
    let currentUser = null; 

    // -----------------------------------------------------------------
    // 🔐 2. 身分驗證與初始化鎖定
    // -----------------------------------------------------------------
    async function initChatSystem() {
        console.log("[TribeRadar] 正在檢查使用者登入狀態...");
        
        // 優先嘗試獲取真實登入 Session
        const { data: { session } } = await window.dbClient.auth.getSession();
        
        if (session && session.user) {
            currentUser = session.user;
            console.log("[TribeRadar] 成功取得 Auth 登入狀態：", currentUser.id);
        } else {
            // 🔍 備份測試機制：如果沒偵測到 Auth 登入，自動抓取 profiles 第一筆資料作為模擬帳號
            console.warn("[TribeRadar] 未偵測到 active session，啟用防錯備份機制...");
            const { data: localUsers } = await window.dbClient.from('profiles').select('id').limit(1);
            if (localUsers && localUsers.length > 0) {
                currentUser = { id: localUsers[0].id };
                console.log("[TribeRadar] 已自動綁定測試帳號 ID:", currentUser.id);
            } else {
                document.getElementById('partyChatBox').innerHTML = `<div style="text-align:center;color:#aaa;padding:20px;">⚠️ 系統無法識別使用者，請先登入。</div>`;
                return;
            }
        }

        // 啟動資料抓取與即時監聽器
        await loadPartyChatMessages();
        subscribeToChatChannels();
    }

    // -----------------------------------------------------------------
    // 🔊 3. V6.9 終極對話抓取防錯與日誌偵錯引擎
    // -----------------------------------------------------------------
    async function loadPartyChatMessages() {
        if (!currentUser) {
            console.warn("[TribeRadar Chat] 當前尚未登入，跳過讀取對話。");
            return;
        }
        
        // 1. 取得當前使用者所屬的隊伍 ID
        const myRes = await window.dbClient.from('profiles').select('current_team_id').eq('id', currentUser.id).single();
        const tId = myRes.data?.current_team_id; 
        
        const chatBox = document.getElementById('partyChatBox');
        const chatHeader = document.getElementById('chatHeader');
        
        if (!tId) { 
            chatHeader.innerText = "未加入隊伍";
            chatBox.innerHTML = `<div style="font-size:0.8rem; color:#888; text-align:center; padding:10px;">目前不在任何隊伍中，無法啟用頻道。</div>`; 
            return; 
        }

        chatHeader.innerText = `隊伍頻道 (${tId})`;
        console.log(`[TribeRadar Chat] 開始抓取隊伍 [${tId}] 的對話紀錄...`);

        // 2. 獲取該隊伍的所有歷史訊息 (分步解法，完全不使用 join)
        const msgRes = await window.dbClient.from('team_messages').select('*').eq('team_id', tId).order('created_at', { ascending: true });
        
        if (msgRes.error) {
            console.error("[TribeRadar Chat] 資料庫讀取失敗！請檢查 RLS 政策或欄位名稱是否存在。錯誤訊息：", msgRes.error);
            chatBox.innerHTML = `<div style="font-size:0.8rem; color:#e74c3c; text-align:center; padding:10px;">⚠️ 對話讀取失敗 (請檢查 RLS 政策)</div>`;
            return;
        }

        const messages = msgRes.data || [];
        console.log(`[TribeRadar Chat] 成功從資料庫撈出 ${messages.length} 條原始訊息。`, messages);

        if (messages.length === 0) {
            chatBox.innerHTML = `<div style="font-size:0.75rem; color:#666; text-align:center; padding:12px;">🔇 頻道靜音中，尚無任何歷史發言。</div>`;
            return;
        }

        // 3. 安全獲取所有使用者暱稱做為對照字典
        const profRes = await window.dbClient.from('profiles').select('id, nickname');
        const profs = profRes.data || [];
        const nameMap = {}; 
        profs.forEach(p => { nameMap[p.id] = p.nickname; });

        // 4. 渲染 HTML，並加入欄位防空保護
        let html = ''; 
        messages.forEach(m => {
            const isMe = (m.sender_id === currentUser.id);
            const senderName = nameMap[m.sender_id] || m.sender_name || '未知組員';
            
            // 💡 自動多欄位解析相容，完美防止資料庫結構型混淆導致的文字空白
            const messageText = m.message || m.content || m.text || (typeof m === 'object' ? JSON.stringify(m) : '');
            
            // 解析與格式化時間
            let timeStr = '未知時間';
            if (m.created_at) {
                const d = new Date(m.created_at);
                const month = String(d.getMonth() + 1).padStart(2, '0');
                const date = String(d.getDate()).padStart(2, '0');
                const hours = String(d.getHours()).padStart(2, '0');
                const minutes = String(d.getMinutes()).padStart(2, '0');
                timeStr = `${month}/${date} ${hours}:${minutes}`;
            }

            html += `
            <div class="msg-line ${isMe ? 'msg-me' : 'msg-other'}">
                <div style="font-size: 0.68rem; opacity: 0.7; margin-bottom: 3px; display: flex; justify-content: space-between; gap: 10px; font-weight: bold;">
                    <span style="color: ${isMe ? '#fff' : '#2ecc71'};">${senderName}</span>
                    <span>${timeStr}</span>
                </div>
                <div style="font-size: 0.82rem; line-height: 1.3;">${messageText}</div>
            </div>`; 
        });

        chatBox.innerHTML = html;
        chatBox.scrollTop = chatBox.scrollHeight; 
    }

    // -----------------------------------------------------------------
    // ✉️ 4. 訊息發送模組
    // -----------------------------------------------------------------
    async function sendChatMessage() {
        const inputField = document.getElementById('chatInputField');
        const text = inputField.value.trim();
        if (!text || !currentUser) return;

        // 重新確認使用者的當前隊伍
        const myRes = await window.dbClient.from('profiles').select('current_team_id').eq('id', currentUser.id).single();
        const tId = myRes.data?.current_team_id;

        if (!tId) {
            alert("發送失敗：您目前未加入任何隊伍！");
            return;
        }

        // 寫入資料庫
        const { error } = await window.dbClient.from('team_messages').insert([{
            team_id: tId,
            sender_id: currentUser.id,
            message: text,  // 預設發送到 message 欄位
            created_at: new Date().toISOString()
        }]);

        if (error) {
            console.error("[TribeRadar] 訊息發送失敗:", error);
            alert("傳送失敗，請確認資料庫權限或欄位名稱！");
        } else {
            inputField.value = '';
            await loadPartyChatMessages(); // 成功後即時刷新
        }
    }

    // -----------------------------------------------------------------
    // 🔄 5. Realtime 即時推播監聽
    // -----------------------------------------------------------------
    function subscribeToChatChannels() {
        console.log("[TribeRadar] 正在建立長連接監聽頻道...");
        window.dbClient
            .channel('schema-db-changes')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'team_messages' }, payload => {
                console.log("[TribeRadar] 偵測到新訊息入庫，同步更新畫面...", payload);
                loadPartyChatMessages();
            })
            .subscribe();
    }

    // -----------------------------------------------------------------
    // ⌨️ 6. 事件綁定監聽
    // -----------------------------------------------------------------
    document.getElementById('sendChatBtn').addEventListener('click', sendChatMessage);
    document.getElementById('chatInputField').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendChatMessage();
    });

    // 啟動網頁
    window.onload = initChatSystem;
</script>

</body>
</html>
