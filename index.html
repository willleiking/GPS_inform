<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TribeRadar V5.1</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root { --bg:#0b0c10; --surface:#151a21; --surface2:#1f2630; --text:#95a5a6; --accent:#2ecc71; --team:#e74c3c; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:-apple-system,sans-serif; background:var(--bg); color:var(--text); padding:8px; display:flex; flex-direction:column; align-items:center; }
        .app { width:100%; max-width:500px; display:flex; flex-direction:column; gap:10px; }
        .card { background:var(--surface); border-radius:12px; border:1px solid rgba(46,204,113,0.2); padding:14px; display:flex; flex-direction:column; gap:8px; }
        .card-title { font-size:0.9rem; font-weight:700; color:#fff; }
        .btn { padding:10px; border-radius:20px; border:none; font-weight:700; font-size:0.8rem; cursor:pointer; }
        .btn-primary { background:var(--accent); color:#000; width:100%; }
        .btn-outline { background:transparent; color:var(--accent); border:1px solid var(--accent); padding:6px 12px; font-size:0.75rem; border-radius:20px; }
        .btn-team { background:var(--team); color:#fff; padding:6px 12px; font-size:0.75rem; border-radius:20px; border:none; cursor:pointer; }
        .btn-sm { padding:4px 8px; font-size:0.65rem; border-radius:4px; border:none; cursor:pointer; font-weight:bold; }
        select,input { background:var(--surface2); border:1px solid rgba(255,255,255,0.1); border-radius:8px; padding:8px; color:#fff; font-size:0.8rem; width:100%; }
        .radar-box { position:relative; background:#070a0e; border-radius:12px; overflow:hidden; }
        .radar-box .inner { position:relative; width:100%; padding-bottom:90%; }
        #radarMap { position:absolute; top:0; left:0; width:100%; height:100%; }
        .chat-box { background:var(--surface2); border-radius:8px; height:120px; overflow-y:auto; padding:8px; display:flex; flex-direction:column; gap:4px; font-size:0.75rem; }
        .msg-me { background:var(--accent); color:#000; align-self:flex-end; padding:4px 8px; border-radius:6px; max-width:75%; }
        .msg-other { background:#2c3e50; color:#fff; align-self:flex-start; padding:4px 8px; border-radius:6px; max-width:75%; }
        .msg-sys { color:#e74c3c; text-align:center; font-size:0.7rem; }
        .row { background:var(--surface2); border-radius:8px; padding:8px; display:flex; align-items:center; justify-content:space-between; font-size:0.8rem; margin-bottom:4px; }
        .hidden { display:none!important; }
        .toast-box { position:fixed; top:16px; left:50%; transform:translateX(-50%); z-index:9999; display:flex; flex-direction:column; gap:4px; width:90%; max-width:400px; }
        .toast { padding:10px; border-radius:8px; font-size:0.75rem; text-align:center; color:#fff; font-weight:bold; }
        .toast.ok { background:#27ae60; } .toast.err { background:#c0392b; } .toast.warn { background:#e67e22; }
    </style>
</head>
<body>

    <div class="toast-box" id="toastBox"></div>

    <!-- 登入 -->
    <div class="app" id="authPage">
        <div class="card" style="text-align:center;"><h2 style="color:var(--accent);">TribeRadar</h2><p id="connStatus" style="font-size:0.7rem;">連線中...</p></div>
        <div class="card">
            <input type="email" id="authEmail" placeholder="Email">
            <input type="password" id="authPassword" placeholder="密碼(6碼以上)">
            <div class="hidden" id="nickGroup"><input type="text" id="authNickname" placeholder="暱稱"></div>
            <button class="btn btn-primary" id="authBtn" onclick="handleAuth()">登入</button>
            <button class="btn btn-outline" onclick="toggleAuthMode()">切換註冊</button>
        </div>
    </div>

    <!-- 主頁 -->
    <div class="app hidden" id="mainPage">
        <!-- 雷達 -->
        <div class="card radar-box"><div class="inner"><div id="radarMap"></div></div></div>
        <div class="card">
            <div style="display:flex; gap:6px;">
                <button class="btn btn-primary" id="trackBtn" onclick="toggleTracking()" style="flex:1;">啟動雷達</button>
                <button class="btn btn-outline" style="color:#e74c3c;border-color:#e74c3c;" onclick="handleLogout()">登出</button>
            </div>
            <div id="geoStatus" style="font-size:0.7rem;text-align:center;color:var(--accent);">雷達範圍 1500M</div>
        </div>

        <!-- 組隊 -->
        <div class="card" style="border:2px dashed var(--team);">
            <div class="card-title" style="color:var(--team);">隊伍成員</div>
            <div id="partyList"><div style="color:#888;text-align:center;">無隊伍</div></div>
        </div>
        <div class="card">
            <div class="card-title">待審核</div>
            <div id="pendingList"><div style="color:#888;text-align:center;">無</div></div>
        </div>
        <div class="card" style="border:1px solid var(--team);">
            <div class="card-title" style="color:var(--team);">組隊公頻</div>
            <div class="chat-box" id="chatBox"></div>
            <div style="display:flex; gap:4px;"><input type="text" id="chatInput" placeholder="訊息..."><button class="btn btn-team" onclick="sendChat()" style="width:auto;">發送</button></div>
        </div>
        <div class="card">
            <div class="card-title">公告欄</div>
            <div id="noticeBoard" style="max-height:140px;overflow-y:auto;"></div>
        </div>
        <div class="card">
            <input type="text" id="teamTitle" placeholder="組隊名稱">
            <select id="teamCat"><option>健身團</option><option>吃貨團</option><option>商務交流</option></select>
            <div style="display:flex; gap:6px;">
                <button class="btn btn-team" onclick="changeTeamStatus(true)" style="flex:1;">開始招募</button>
                <button class="btn btn-outline" onclick="changeTeamStatus(false)" style="flex:1;color:#e74c3c;border-color:#e74c3c;">退出/解散</button>
            </div>
            <div id="myTeamStatus" style="text-align:center;font-size:0.8rem;color:#fff;">未開啟</div>
        </div>

        <!-- 設定 -->
        <div class="card">
            <div class="card-title">⚙️ 快速設定</div>
            <input type="text" id="fEmail" placeholder="好友 Email">
            <button class="btn btn-outline" onclick="addFriend()">+ 綁定好友</button>
            <div id="friendList"></div>
        </div>
    </div>

    <script>
        // ==================== 連線 ====================
        const DB = window.supabase.createClient(
            'https://hknxdvefnuxgyepuuqra.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhrbnhkdmVmbnV4Z3llcHV1cXJhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1MzM0MDAsImV4cCI6MjA5NzEwOTQwMH0.M97OwM_9CrLCrgxbyA6kQs0MLFiRDzyYlvIiGqhBGec'
        );

        let currentUser = null, tracking = false, watchId = null, currentPos = { lat: 25.0451, lng: 121.4525 };
        let radarMap = null, myMarker = null, radarCircle = null, mapMarkers = [], isRegister = false;

        function toast(msg, type) { const t = document.createElement('div'); t.className = 'toast ' + type; t.textContent = msg;
            document.getElementById('toastBox').appendChild(t);
            setTimeout(() => t.remove(), 3000); }

        function calcDist(lat1, lng1, lat2, lng2) { const R = 6371000,
                dLat = (lat2 - lat1) * Math.PI / 180,
                dLng = (lng2 - lng1) * Math.PI / 180; return R * 2 * Math.atan2(Math.sqrt(Math.sin(dLat / 2) ** 2 + Math.cos(
                    lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLng / 2) ** 2), Math.sqrt(1 - Math.sin(
                    dLat / 2) ** 2 - Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLng / 2) **
                2)); }

        // ==================== 認證 ====================
        function toggleAuthMode() { isRegister = !isRegister;
            document.getElementById('nickGroup').classList.toggle('hidden', !isRegister);
            document.getElementById('authBtn').textContent = isRegister ? '註冊' : '登入'; }

        async function handleAuth() {
            const email = document.getElementById('authEmail').value.trim();
            const pw = document.getElementById('authPassword').value;
            if (!email || !pw) return toast('請輸入完整', 'err');
            if (pw.length < 6) return toast('密碼至少6碼', 'err');
            try {
                if (isRegister) {
                    const nick = document.getElementById('authNickname').value.trim() || email.split('@')[0];
                    const { error } = await DB.auth.signUp({ email, password: pw, options: { data: { nickname: nick } } });
                    if (error) throw error;
                    toast('註冊成功！請重新登入', 'ok');
                    toggleAuthMode();
                } else {
                    const { data, error } = await DB.auth.signInWithPassword({ email, password: pw });
                    if (error) throw error;
                    currentUser = data.user;
                    await DB.from('profiles').upsert({ id: currentUser.id, email, is_online: true }, { onConflict: 'id' });
                    document.getElementById('authPage').classList.add('hidden');
                    document.getElementById('mainPage').classList.remove('hidden');
                    loadProfile();
                    initRadarMap(currentPos.lat, currentPos.lng);
                    setInterval(() => { if (tracking && currentUser) { refreshRadar();
                            uploadTrail(); } }, 30000);
                }
            } catch (e) { toast(e.message, 'err'); }
        }

        async function handleLogout() { if (tracking) stopTracking(); if (currentUser) await DB.from('profiles').update({
                is_online: false }).eq('id', currentUser.id); await DB.auth.signOut();
            currentUser = null;
            document.getElementById('mainPage').classList.add('hidden');
            document.getElementById('authPage').classList.remove('hidden');
            toast('已登出', 'ok'); }

        // ==================== 雷達 ====================
        function initRadarMap(lat, lng) { if (radarMap) { radarMap.setView([lat, lng], 14);
                myMarker.setLatLng([lat, lng]);
                radarCircle.setLatLng([lat, lng]); return; }
            radarMap = L.map('radarMap', { zoomControl: false, attributionControl: false }).setView([lat, lng], 14);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(radarMap);
            myMarker = L.marker([lat, lng], { icon: L.divIcon({ html: '<div style="background:#fff;width:12px;height:12px;border-radius:50%;border:3px solid #2ecc71;"></div>',
                    iconSize: [12, 12] }) }).addTo(radarMap);
            radarCircle = L.circle([lat, lng], { radius: 1500, color: '#2ecc71', weight: 1, fillOpacity: 0.02 }).addTo(radarMap); }

        function toggleTracking() { if (tracking) { stopTracking(); return; } if (!navigator.geolocation) return toast('不支援GPS',
                'err');
            navigator.geolocation.getCurrentPosition(p => { currentPos = { lat: p.coords.latitude, lng: p.coords.longitude };
                initRadarMap(currentPos.lat, currentPos.lng);
                uploadTrail(); }, e => toast('GPS錯誤', 'err'), { enableHighAccuracy: true, timeout: 20000 });
            watchId = navigator.geolocation.watchPosition(p => { currentPos = { lat: p.coords.latitude, lng: p.coords
                        .longitude };
                initRadarMap(currentPos.lat, currentPos.lng); if (currentUser) DB.from('profiles').update({ current_lat: currentPos
                        .lat, current_lng: currentPos.lng, is_online: true }).eq('id', currentUser.id);
                refreshRadar();
                uploadTrail(); }, () => {}, { enableHighAccuracy: true, timeout: 15000, maximumAge: 10000 });
            tracking = true;
            document.getElementById('trackBtn').textContent = '停止雷達'; }

        function stopTracking() { if (watchId) navigator.geolocation.clearWatch(watchId);
            tracking = false;
            document.getElementById('trackBtn').textContent = '啟動雷達'; }

        async function uploadTrail() { if (!currentUser || !currentPos) return; try { await DB.from('location_history').insert({
                user_id: currentUser.id, lat: currentPos.lat, lng: currentPos.lng, recorded_at: new Date()
                    .toISOString() }); } catch (e) {} }

        async function refreshRadar() {
            if (!radarMap || !tracking || !currentUser) return;
            mapMarkers.forEach(m => radarMap.removeLayer(m));
            mapMarkers = [];
            // 查詢所有公開位置的使用者（排除自己）
            const { data: users } = await DB.from('profiles').select('*').not('current_lat', 'is', null).eq('is_shielded',
                false).neq('id', currentUser.id);
            if (!users) return;
            for (const u of users) {
                const dist = calcDist(currentPos.lat, currentPos.lng, u.current_lat, u.current_lng);
                if (dist > 1500) continue;
                const isTeam = u.is_teaming;
                const color = isTeam ? '#e74c3c' : '#f1c40f';
                const html =
                    `<div style="background:${color};width:14px;height:14px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 8px ${color};${isTeam?'display:flex;align-items:center;justify-content:center;color:#fff;font-size:8px;':''}">${isTeam?'🔥':''}</div>`;
                const marker = L.marker([u.current_lat, u.current_lng], { icon: L.divIcon({ html, iconSize: [14,
                        14] }) }).addTo(radarMap);
                marker.bindPopup(
                    `<div style="color:#333;text-align:center;"><b>${u.nickname}</b><br>${isTeam?`🔥 <b>${u.team_name||'招募中'}</b><br><button onclick="requestJoin('${u.id}','${u.nickname}')" style="background:#e74c3c;color:#fff;padding:4px 8px;border:none;border-radius:4px;cursor:pointer;">申請加入</button>`:'散人'}</div>`
                    );
                mapMarkers.push(marker);
            }
        }

        // ==================== 組隊 ====================
        async function changeTeamStatus(enable) {
            const title = document.getElementById('teamTitle').value.trim();
            const cat = document.getElementById('teamCat').value;
            if (enable && !title) return toast('請輸入組隊名稱', 'err');
            if (enable) {
                // 建立組隊：寫入自己的 current_team_id
                await DB.from('profiles').update({ is_teaming: true, team_name: title, team_category: cat,
                    current_team_id: currentUser.id }).eq('id', currentUser.id);
                document.getElementById('myTeamStatus').textContent = '🟢 招募中: ' + title;
                toast('組隊已建立！', 'ok');
            } else {
                const { data: my } = await DB.from('profiles').select('current_team_id').eq('id', currentUser.id).single();
                if (my && my.current_team_id === currentUser.id) {
                    await DB.from('profiles').update({ current_team_id: null, is_teaming: false, team_name: null }).eq(
                        'current_team_id', currentUser.id);
                    toast('隊伍已解散', 'ok');
                } else {
                    await DB.from('profiles').update({ current_team_id: null }).eq('id', currentUser.id);
                    toast('已退出', 'ok');
                }
                document.getElementById('myTeamStatus').textContent = '未開啟';
            }
            refreshParty();
            refreshNoticeBoard();
        }

        async function requestJoin(leaderId, name) {
            if (!currentUser) return;
            const { data: exist } = await DB.from('team_requests').select('*').eq('team_leader_id', leaderId).eq('applicant_id',
                currentUser.id).single();
            if (exist) return toast('已送出申請', 'warn');
            await DB.from('team_requests').insert({ team_leader_id: leaderId, applicant_id: currentUser.id, status: 'pending' });
            toast('已向 ' + name + ' 送出申請！', 'warn');
        }

        async function loadPending() {
            if (!currentUser) return;
            const { data: reqs } = await DB.from('team_requests').select('id,applicant_id').eq('team_leader_id', currentUser.id)
                .eq('status', 'pending');
            const container = document.getElementById('pendingList');
            if (!reqs || !reqs.length) { container.innerHTML =
            '<div style="color:#888;text-align:center;">無</div>'; return; }
            const { data: profiles } = await DB.from('profiles').select('id,nickname');
            container.innerHTML = reqs.map(r => {
                const app = (profiles || []).find(p => p.id === r.applicant_id);
                return `<div class="row"><span>${app?app.nickname:'未知'}</span><div><button class="btn-sm" style="background:#27ae60;color:#fff;" onclick="handleReq('${r.id}','approved')">同意</button><button class="btn-sm" style="background:#c0392b;color:#fff;" onclick="handleReq('${r.id}','rejected')">拒絕</button></div></div>`;
            }).join('');
        }

        async function handleReq(reqId, status) {
            const { data: req } = await DB.from('team_requests').select('*').eq('id', reqId).single();
            if (!req) return;
            await DB.from('team_requests').update({ status }).eq('id', reqId);
            if (status === 'approved') {
                await DB.from('profiles').update({ current_team_id: req.team_leader_id }).eq('id', req.applicant_id);
                toast('已同意加入！', 'ok');
            }
            loadPending();
            refreshParty();
        }

        async function refreshParty() {
            if (!currentUser) return;
            const { data: my } = await DB.from('profiles').select('current_team_id').eq('id', currentUser.id).single();
            const tId = my ? my.current_team_id : null;
            const container = document.getElementById('partyList');
            if (!tId) { container.innerHTML = '<div style="color:#888;text-align:center;">無隊伍</div>'; return; }
            const { data: members } = await DB.from('profiles').select('id,nickname,is_online').eq('current_team_id', tId);
            if (!members || !members.length) { container.innerHTML =
            '<div style="color:#888;text-align:center;">無隊員</div>'; return; }
            const isLeader = (tId === currentUser.id);
            container.innerHTML = members.map(m => `
                <div class="row" style="border-left:3px solid ${m.id===tId?'#e74c3c':'#3498db'};">
                    <span>${m.is_online?'🟢':'⚪'} ${m.id===tId?'[隊長]':'[隊員]'} ${m.nickname}${m.id===currentUser.id?'(我)':''}</span>
                    ${isLeader && m.id!==currentUser.id?`<button class="btn-sm" style="background:#c0392b;color:#fff;" onclick="kickMember('${m.id}')">踢除</button>`:''}
                </div>
            `).join('');
        }

        async function kickMember(uid) { await DB.from('profiles').update({ current_team_id: null }).eq('id', uid);
            refreshParty(); }

        async function loadChat() {
            if (!currentUser) return;
            const { data: my } = await DB.from('profiles').select('current_team_id').eq('id', currentUser.id).single();
            const tId = my ? my.current_team_id : null;
            const box = document.getElementById('chatBox');
            if (!tId) { box.innerHTML = '<div class="msg-sys">請先加入組隊</div>'; return; }
            const { data: msgs } = await DB.from('friend_messages').select('*').eq('receiver_id', tId).order('created_at', {
                ascending: true }).limit(30);
            const { data: profiles } = await DB.from('profiles').select('id,nickname');
            box.innerHTML = (msgs || []).map(m => {
                const s = (profiles || []).find(p => p.id === m.sender_id);
                return `<div class="${m.sender_id===currentUser.id?'msg-me':'msg-other'}"><b>${s?s.nickname:'未知'}:</b> ${m.message}</div>`;
            }).join('') || '<div class="msg-sys">尚無訊息</div>';
            box.scrollTop = box.scrollHeight;
        }

        async function sendChat() {
            const text = document.getElementById('chatInput').value.trim();
            if (!text) return;
            const { data: my } = await DB.from('profiles').select('current_team_id').eq('id', currentUser.id).single();
            const tId = my ? my.current_team_id : null;
            if (!tId) return toast('不屬於任何隊伍', 'err');
            await DB.from('friend_messages').insert({ sender_id: currentUser.id, receiver_id: tId, message: text });
            document.getElementById('chatInput').value = '';
            loadChat();
        }

        async function refreshNoticeBoard() {
            // 查詢所有正在招募的隊伍（排除自己）
            const { data: teams } = await DB.from('profiles').select('*').eq('is_teaming', true).neq('id', currentUser?.id || '');
            const container = document.getElementById('noticeBoard');
            if (!teams || !teams.length) { container.innerHTML =
            '<div style="color:#888;text-align:center;">附近無組隊</div>'; return; }
            container.innerHTML = teams.map(t => {
                const dist = calcDist(currentPos.lat, currentPos.lng, t.current_lat || 25, t.current_lng || 121);
                return `<div class="row"><span>🔥 <b>${t.team_name||'未命名'}</b> (${(dist/1000).toFixed(1)}km)</span><button class="btn btn-sm" style="background:var(--team);color:#fff;" onclick="requestJoin('${t.id}','${t.nickname}')">申請</button></div>`;
            }).join('');
        }

        // ==================== 設定 ====================
        async function loadProfile() {
            const { data } = await DB.from('profiles').select('*').eq('id', currentUser.id).single();
            if (!data) return;
            if (data.is_teaming) document.getElementById('myTeamStatus').textContent = '🟢 招募中: ' + data.team_name;
            document.getElementById('teamTitle').value = data.team_name || '';
            refreshParty();
            loadChat();
            loadPending();
            refreshNoticeBoard();
            loadFriends();
        }

        async function addFriend() {
            const email = document.getElementById('fEmail').value.trim();
            if (!email) return;
            await DB.from('friendships').insert({ user_id: currentUser.id, friend_email: email, friend_nickname: email });
            document.getElementById('fEmail').value = '';
            toast('已綁定', 'ok');
            loadFriends();
        }

        async function loadFriends() {
            const { data } = await DB.from('friendships').select('*').eq('user_id', currentUser.id);
            document.getElementById('friendList').innerHTML = (data || []).map(f => `<div class="row"><span>${f.friend_nickname}</span><button class="btn-sm" style="background:#c0392b;color:#fff;" onclick="DB.from('friendships').delete().eq('id','${f.id}').then(()=>loadFriends())">✕</button></div>`).join('') || '<div style="color:#888;">無好友</div>';
        }

        // ==================== 初始化 ====================
        window.onload = async function() {
            const statusEl = document.getElementById('connStatus');
            try {
                const { data: session } = await DB.auth.getSession();
                if (session?.session?.user) {
                    currentUser = session.session.user;
                    statusEl.textContent = '已連線，進入中...';
                    document.getElementById('authPage').classList.add('hidden');
                    document.getElementById('mainPage').classList.remove('hidden');
                    loadProfile();
                    initRadarMap(currentPos.lat, currentPos.lng);
                    setInterval(() => { if (tracking && currentUser) { refreshRadar();
                            uploadTrail(); } }, 30000);
                } else {
                    statusEl.textContent = '主機就緒，請登入';
                    statusEl.style.color = '#2ecc71';
                }
            } catch (e) {
                statusEl.textContent = '連線失敗';
                statusEl.style.color = '#e74c3c';
            }
        };
    </script>
</body>
</html>
