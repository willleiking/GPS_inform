<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover, maximum-scale=1.0">
    <title>📍 社群位置監控 + 歷史軌跡分析</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js">
    </script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
    </script>
    <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js">
    </script>

    <style>
        :root {
            --bg: #0a0a10;
            --surface: #161622;
            --surface2: #1e1e2e;
            --border: #2a2a3e;
            --text: #e8e8f0;
            --text2: #9898b0;
            --accent: #5b9cf5;
            --success: #4ade80;
            --warning: #facc15;
            --danger: #f87171;
            --radius: 14px;
            --radius-sm: 10px;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang TC', 'Noto Sans TC', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            padding-bottom: 50px;
        }
        .app-container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .card {
            background: var(--surface);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .card-title {
            font-size: 0.9rem;
            font-weight: 700;
        }
        .btn {
            padding: 10px 16px;
            border-radius: 25px;
            border: none;
            font-weight: 700;
            font-size: 0.8rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            font-family: inherit;
        }
        .btn:active {
            transform: scale(0.95);
        }
        .btn-primary {
            background: var(--accent);
            color: #000;
            width: 100%;
        }
        .btn-outline {
            background: transparent;
            color: var(--accent);
            border: 2px solid var(--accent);
        }
        .btn-sm {
            padding: 6px 12px;
            font-size: 0.7rem;
        }
        .btn-danger {
            background: transparent;
            color: var(--danger);
            border: 2px solid var(--danger);
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .input-group label {
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--text2);
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .input-group input {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 8px 12px;
            color: var(--text);
            font-size: 0.8rem;
            font-family: inherit;
            outline: none;
        }
        .input-group input:focus {
            border-color: var(--accent);
        }
        .tab-nav {
            display: flex;
            gap: 6px;
            background: var(--surface);
            border-radius: var(--radius);
            padding: 4px;
            border: 1px solid var(--border);
        }
        .tab-btn {
            flex: 1;
            padding: 10px;
            border-radius: var(--radius-sm);
            background: transparent;
            color: var(--text2);
            font-weight: 700;
            font-size: 0.8rem;
            text-align: center;
            cursor: pointer;
            border: none;
        }
        .tab-btn.active {
            background: var(--accent);
            color: #000;
        }
        .map-container {
            height: 280px;
            border-radius: var(--radius-sm);
            overflow: hidden;
            border: 1px solid var(--border);
        }
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .stat-item {
            background: var(--surface2);
            border-radius: var(--radius-sm);
            padding: 12px;
            text-align: center;
        }
        .stat-value {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--accent);
        }
        .stat-label {
            font-size: 0.65rem;
            color: var(--text2);
        }
        .chart-container {
            height: 200px;
        }
        .list-item {
            background: var(--surface2);
            border-radius: var(--radius-sm);
            padding: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.75rem;
            margin-bottom: 4px;
        }
        .toast-container {
            position: fixed;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 6px;
            pointer-events: none;
            width: 90%;
            max-width: 420px;
        }
        .toast {
            padding: 10px 16px;
            border-radius: 22px;
            font-weight: 600;
            font-size: 0.8rem;
            text-align: center;
            animation: toastIn 0.3s, toastOut 0.3s 2.7s forwards;
            pointer-events: auto;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
        }
        .toast.success {
            background: #1a3a2a;
            color: var(--success);
            border: 1px solid #2a5a3a;
        }
        .toast.error {
            background: #3a1a1a;
            color: var(--danger);
            border: 1px solid #5a2a2a;
        }
        .toast.info {
            background: #1a2a3a;
            color: var(--accent);
            border: 1px solid #2a3a5a;
        }
        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes toastOut {
            from {
                opacity: 1;
            }
            to {
                opacity: 0;
                transform: translateY(-15px);
            }
        }
        .hidden {
            display: none !important;
        }
        .toggle-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 24px;
        }
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider-toggle {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #444;
            transition: .3s;
            border-radius: 24px;
        }
