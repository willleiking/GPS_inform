<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover, maximum-scale=1.0">
    <title>🟢 TribeRadar 旗艦商務同好雷達</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root {
            --bg: #0b0c10; --surface: #151a21; --surface2: #1f2630; --border: #2ecc7130;
            --text: #95a5a6; --text-bright: #2ecc71; --accent: #2ecc71; --danger: #e74c3c; --warning: #f1c40f;
            --radius: 12px; --radius-sm: 8px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang TC', sans-serif; background: var(--bg); color: var(--text); padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .app-container { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 12px; }
        .card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 16px; display: flex; flex-direction: column; gap: 12px; }
        .card-title { font-size: 0.9rem; font-weight: 700; color: #fff; display: flex; align-items: center; justify-content: space-between; }
        .btn { padding: 10px 14px; border-radius: 20px; border: none; font-weight: 700; font-size: 0.85rem; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 6px; transition: all 0.2s; }
        .btn-primary { background: var(--accent); color: #000; width: 100%; }
        .btn-outline { background: transparent; color: var(--accent); border: 1px solid var(--accent); }
        .btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); border-radius: 50%; width: 26px; height: 26px; padding: 0; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .stat-box { background: var(--surface2); padding: 10px; border-radius: var(--radius-sm); text-align: center; }
        .stat-val { font-size: 1.1rem; font-weight: bold; color: var(--accent); }
        .stat-lbl { font-size: 0.65rem; color: #7f8c8d; }
        select, input, textarea { background: var(--surface2); border: 1px solid rgba(255,255,255,0.1); border-radius: var(--radius-sm); padding: 10px; color: #fff; outline: none; font-size: 0.85rem; width: 100%; }
        .radar-panel { display: flex; flex-direction: column; align-items: center; background: #070a0e; padding: 10px; }
        .radar-outer { position: relative; border: 4px solid var(--accent); border-radius: 50%; width: 100%; padding-bottom: 100%; overflow: hidden; box-shadow: inset 0 0 30px #000, 0 0 15px rgba(46,204,113,0.3); }
        #radarMap { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        #historyMap { width: 100%; height: 220px; border-radius: var(--radius-sm); }
        .list-row { background: var(--surface2); border-radius: var(--radius-sm); padding: 10px; display: flex; align-items: center; justify-content: space-between; font-size: 0.85rem; }
        .input-group { display: flex; flex-direction: column; gap: 4px; }
        .input-group label { font-size: 0.75rem; color: var(--accent); font-weight: bold; }
        .hidden { display: none !important; }
        .toast-container { position: fixed; top: 16px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 6px; width: 90%; max-width: 400px; }
        .toast { padding: 10px; border-radius: 8px; font-size: 0.8rem; text-align: center; color: #fff; font-weight: bold; }
        .toast.error { background: #c0392b; } .toast.success { background: #27ae60; }
    </style>
</head>
<body>

    <div class="toast-container" id="toastContainer"></div>

    <div class="app-container" id="authPage">
        <div class="card" style="text-align:center;">
            <h2 style="color:var(--accent)">🟢 TribeRadar 同好聚落雷達</h2>
            <p style="font-size:0.75rem; color:var(--accent);" id="connStatus">探索主機連線中...</p>
        </div>
        <div class="card">
            <div class="input-group"><label>EMAIL</label><input type="email" id="authEmail" placeholder="example@gmail.com"></div>
            <div class="input-group"><label>密碼 (至少 6 碼)</label><input type="password" id="authPassword"></div>
            <div class="input-group hidden" id="nickGroup"><label>探索暱稱</label><input type="text" id="authNickname" placeholder="請輸入暱稱"></div>
            <button class="btn btn-primary" id="authActionBtn" onclick="handleAuth()">進入同好網格</button>
            <button class="btn btn-outline" style="font-size:0.75rem; margin-top: 5px;" id="authToggleBtn" onclick="toggleAuthMode()">初次探索？切換註冊帳號</button>
        </div>
    </div>

    <div class="app-container hidden" id="mainApp">
        
        <div class="card radar-panel">
            <div class="card-title" style="width:100%;"><span>🛰️ 實時商務同好雷達</span> <span id="geoStatus" style="font-size:0.7rem; font-family:monospace; color:var(--accent);">中心探索中...</span></div>
            <div class="radar-outer"><div id="radarMap"></div></div>
            <div style="display:flex; gap:8px; width:100%; margin-top:10px;">
                <button class="btn btn-primary" id="trackBtn" onclick="toggleTracking()">▶️ 啟動雷達掃描</button>
                <button class="btn btn-outline" onclick="handleLogout()" style="color:var(--danger); border-color:var(--danger)">登出</button>
            </div>
        </div>

        <div class="card">
            <div class="card-title">🧲 我的商務引力設定（對標媒合）</div>
            <div class="input-group"><label>我的暱稱</label><input type="text" id="profileNick"></div>
            <div class="grid-2">
                <div class="input-group"><label>四大資源：我有什麼 (Has)</label><input type="text" id="pHas" placeholder="如: 程式開發、行銷管道"></div>
                <div class="input-group"><label>資源需求：我缺什麼 (Need)</label><input type="text" id="pNeed" placeholder="如: 尋找資金、商務引薦"></div>
            </div>
            <div class="grid-2">
                <div class="input-group"><label>我可以幫忙 (Can Help)</label><input type="text" id="pHelp" placeholder="如: 免費諮詢、引薦通路"></div>
                <div class="input-group"><label>我想對接 (Can Connect)</label><input type="text" id="pConnect" placeholder="如: 創投、自媒體..."></div>
            </div>
            <button class="btn btn-primary" style="border-radius:8px;" onclick="saveProfileGravity()">💾 更新我的引力資源設定</button>
        </div>

        <div class="card">
            <div class="card-title">📣 地圖實時揪團波 (發出組隊招募)</div>
            <div style="display:grid; grid-template-columns: 1fr auto; gap:6px;">
                <input type="text" id="teamTitle" placeholder="輸入揪團主旨 (如: 咖啡廳聊AI外包、路過借電)">
                <button class="btn btn-primary" style="width:auto; border-radius:8px;" onclick="launchTeamWave()">🚀 發射揪團波</button>
            </div>
            <div id="activeTeamsList" style="display:flex; flex-direction:column; gap:6px; margin-top:4px;"></div>
        </div>

        <div class="card">
            <div class="card-title">🧑‍🤝‍🧑 好友偵測圈 (半徑 500m 警報)</div>
            <div id="friendList" style="display:flex; flex-direction:column; gap:6px;"></div>
            <div style="display:grid; grid-template-columns: 1fr auto; gap:6px;">
                <input type="text" id="fNick" placeholder="請輸入欲追蹤的好友暱稱">
                <button class="btn btn-outline" onclick="addFriend()">+ 綁定好友</button>
            </div>
        </div>

        <div class="card">
            <div class="card-title">📍 定點目標區域管理</div>
            <div id="targetList" style="display:flex; flex-direction:column; gap:6px;"></div>
            <div style="display:grid; grid-template-columns: 1fr auto; gap:6px;">
                <input type="text" id="tName" placeholder="地點名稱 (如: 捷運海山站)">
                <button class="btn btn-outline" onclick="addStaticTarget()">+ 新增定點</button>
            </div>
        </div>

        <div class="card">
            <div class="card-title">📅 期間限定活動區域</div>
            <div id="eventList" style="display:flex; flex-direction:column; gap:6px;"></div>
            <div style="display:grid; grid-template-columns: 1fr auto; gap:6px;">
                <input type="text" id="evTitle" placeholder="活動名稱">
                <button class="btn btn-outline" onclick="addEvent()">+ 新增活動</button>
            </div>
        </div>

        <div class="card">
            <div class="card-title">📅 歷史軌跡查詢與數據分析</div>
            <div style="display:flex; align-items:center; gap:6px;">
                <select id="dateStart"><option value="2026-06-10">2026/06/10</option><option value="2026-06-15">2026/06/15</option><option value="2026-06-19">2026/06/19</option></select>
                <span>～</span>
                <select id="dateEnd"><option value="2026-06-20">2026/06/20</option><option value="2026-06-25">2026/06/25</option></select>
            </div>
            <button class="btn btn-primary" onclick="queryHistoryLogs()">🔍 查詢軌跡歷程與數據摘要</button>
        </div>

        <div class="card">
            <div class="card-title">📊 數據摘要與出沒分析</div>
            <div class="grid-2">
                <div class="stat-box"><div class="stat-val" id="statDistance">--</div><div class="stat-lbl">總移動距離</div></div>
                <div class="stat-box"><div class="stat-val" id="statDuration">--</div><div class="stat-lbl">總停留時間</div></div>
            </div>
            <div class="grid-2">
                <div class="stat-box"><div class="stat-val" id="statCount">--</div><div class="stat-lbl">軌跡取樣點數</div></div>
                <div class="stat-box"><div class="stat-val" id="statTopPlace" style="font-size:0.9rem; color:var(--warning)">--</div><div class="stat-lbl">🔴 常出沒地點</div></div>
            </div>
            <div id="historyMap"></div>
        </div>
    </div>

    <script>
        // ======= 🛡️ 安全防禦性全域變數宣告，徹底避免 Identifier conflicts =======
        window.SUPABASE_URL = 'https://hknxdvefnuxgyepuuqra.supabase.co';
        window.SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhrbnhkdmVmbnV4Z3llcHV1cXJhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1MzM0MDAsImV4cCI6MjA5NzEwOTQwMH0.M97OwM_9CrLCrgxbyA6kQs0MLFiRDzyYlvIiGqhBGec';
        
        if (!window.dbClient) {
            window.dbClient = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_KEY);
        }

        let currentUser = null, tracking = false, watchId = null, currentPosition = { lat: 25.0451, lng: 121.4525 };
        let radarMap = null, myMarker = null, radarCircle = null;
        let historyMap = null, historyPolyline = null;
        let radarLayers = [], historyMarkers = [];
        let isRegister = false;

        function showToast(msg, type='info') {
            const t = document.createElement('div'); t.className = `toast ${type}`; t.textContent = msg;
            document.getElementById('toastContainer').appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }

        function toggleAuthMode() {
            isRegister = !isRegister;
            document.getElementById('nickGroup').classList.toggle('hidden', !isRegister);
            document.getElementById('authActionBtn').textContent = isRegister ? '註冊新探索帳號' : '進入同好網格';
        }

        function calcDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const φ1 = lat1 * Math.PI/180, φ2 = lat2 * Math.PI/180;
            const Δφ = (lat2-lat1) * Math.PI/180, Δλ = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) + Math.cos(φ1) * Math.cos(φ2) * Math.sin(Δλ/2) * Math.sin(Δλ/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        async function handleAuth() {
            const email = document.getElementById('authEmail').value.trim();
            const password = document.getElementById('authPassword').value;
            if(!email || !password) { showToast('⚠️ 請完整填寫欄位', 'error'); return; }
            try {
                if(isRegister) {
                    const nick = document.getElementById('authNickname').value.trim() || '未命名同好';
                    const { data, error } = await window.dbClient.auth.signUp({ email, password, options: { data: { nickname: nick } } });
                    if(error) throw error;
                    if(data.user) {
                        await window.dbClient.from('profiles').insert({ id: data.user.id, email, nickname: nick });
                    }
                    showToast('🎉 帳號建立成功！請登入。', 'success');
                    toggleAuthMode();
                } else {
                    const { data, error } = await window.dbClient.auth.signInWithPassword({ email, password });
                    if(error) throw error;
                    currentUser = data.user;
                    enterMainApp();
                }
            } catch(e) { showToast(e.message, 'error'); }
        }

        // 讀取個人引力與對標資料
        async function loadProfileGravity() {
            if(!currentUser) return;
            const { data } = await window.dbClient.from('profiles').select('*').eq('id', currentUser.id).single();
            if(data) {
                document.getElementById('profileNick').value = data.nickname || '';
                document.getElementById('pHas').value = data.has_what || '';
                document.getElementById('pNeed').value = data.need_what || '';
                document.getElementById('pHelp').value = data.can_help || '';
                document.getElementById('pConnect').value = data.can_connect || '';
            }
        }

        // 儲存引力設定
        async function saveProfileGravity() {
            const nick = document.getElementById('profileNick').value.trim();
            const has = document.getElementById('pHas').value.trim();
            const need = document.getElementById('pNeed').value.trim();
            const help = document.getElementById('pHelp').value.trim();
            const conn = document.getElementById('pConnect').value.trim();
            
            const { error } = await window.dbClient.from('profiles').update({
                nickname: nick, has_what: has, need_what: need, can_help: help, can_connect: conn
            }).eq('id', currentUser.id);

            if(error) showToast('儲存失敗: ' + error.message, 'error');
            else { showToast('✅ 引力設定更新成功！已上傳同好網格。', 'success'); refreshDashboardData(); }
        }

        function initRadarMap(lat, lng) {
            if (radarMap) {
                radarMap.setView([lat, lng]);
                if(myMarker) myMarker.setLatLng([lat, lng]);
                if(radarCircle) radarCircle.setLatLng([lat, lng]);
                return;
            }
            radarMap = L.map('radarMap', { zoomControl: false, attributionControl: false }).setView([lat, lng], 14);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(radarMap);

            myMarker = L.marker([lat, lng], {
                icon: L.divIcon({ className: '', html: `<div style="background:#fff; width:14px; height:14px; border-radius:50%; border:3px solid var(--accent); box-shadow:0 0 12px var(--accent);"></div>`, iconSize:[14,14], iconAnchor:[7,7] })
            }).addTo(radarMap);

            radarCircle = L.circle([lat, lng], { radius: 500, color: 'var(--accent)', weight: 1.5, fillColor: 'var(--accent)', fillOpacity: 0.04 }).addTo(radarMap);
        }

        // [需求5] 發射組隊招募揪團波
        async function launchTeamWave() {
            const title = document.getElementById('teamTitle').value.trim();
            if(!title) { showToast('⚠️ 請輸入揪團主旨', 'error'); return; }
            const nick = document.getElementById('profileNick').value || '未知同好';
            
            const { error } = await window.dbClient.from('teams').insert({
                leader_id: currentUser.id, leader_nickname: nick, title, lat: currentPosition.lat, lng: currentPosition.lng
            });
            if(error) showToast(error.message, 'error');
            else { document.getElementById('teamTitle').value = ''; showToast('🚀 揪團波成功發射至周圍地圖！', 'success'); refreshDashboardData(); }
        }

        async function refreshDashboardData() {
            if(!currentUser) return;
            radarLayers.forEach(l => radarMap.removeLayer(l));
            radarLayers = [];

            // 1. 讀取與渲染周圍「同好與引力資源」 [需求2, 3]
            const { data: allProfiles } = await window.dbClient.from('profiles').select('*');
            // 2. 讀取與渲染「實時揪團波 (組隊招募)」 [需求5]
            const { data: teams } = await window.dbClient.from('teams').select('*');
            // 3. 讀取定點與活動 [需求4]
            const { data: targets } = await window.dbClient.from('static_targets').select('*');
            const { data: evs } = await window.dbClient.from('events').select('*');
            const { data: friends } = await window.dbClient.from('friendships').select('*');

            // 渲染好友邊界清單
            let fHtml = '';
            if(friends) {
                friends.forEach(f => {
                    fHtml += `<div class="list-row"><div>👤 <b>${f.friend_nickname}</b> <span style="color:var(--accent)">半徑 500m 偵測中</span></div><button class="btn-danger" onclick="deleteItem('friendships','${f.id}')">×</button></div>`;
                });
            }
            document.getElementById('friendList').innerHTML = fHtml || '<div style="font-size:0.75rem; color:#666; text-align:center;">尚無好友設定</div>';

            // 地圖打點：其他同好與引力對標 [需求2, 3, 5]
            if(allProfiles && radarMap) {
                allProfiles.forEach(p => {
                    if(p.id !== currentUser.id && p.current_lat && p.current_lng) {
                        const dist = calcDistance(currentPosition.lat, currentPosition.lng, p.current_lat, p.current_lng);
                        
                        // 檢查是否為綁定好友
                        const isFriend = friends && friends.some(f => f.friend_nickname === p.nickname);
                        const iconColor = isFriend ? '#2ecc71' : '#3498db';

                        const popupHtml = `
                            <div style="color:#000; font-family:sans-serif;">
                                <b>👤 同好: ${p.nickname || '未命名'}</b> (距離: ${dist.toFixed(0)}m)<br>
                                💼 擁有資源: ${p.has_what || '無'}<br>
                                🎯 需求對標: ${p.need_what || '無'}<br><br>
                                <button onclick="parent.sendTeamInvite('${p.nickname}')" style="background:#2ecc71; border:none; color:white; padding:4px 8px; border-radius:4px; cursor:pointer;">➕ 發出組隊邀請</button>
                            </div>
                        `;
                        const pm = L.marker([p.current_lat, p.current_lng], {
                            icon: L.divIcon({ html: `<div style="background:${iconColor}; width:12px; height:12px; border-radius:50%; border:2px solid #fff; box-shadow:0 0 8px ${iconColor};"></div>` })
                        }).addTo(radarMap).bindPopup(popupHtml);
                        radarLayers.push(pm);
                    }
                });
            }

            // 地圖與列表渲染：實時揪團波 [需求5]
            let tWaveHtml = '';
            if(teams) {
                teams.forEach(t => {
                    tWaveHtml += `<div class="list-row"><div>📣 <b>${t.title}</b> <span style="color:#7f8c8d">由 ${t.leader_nickname} 發起</span></div><button class="btn-danger" onclick="deleteItem('teams','${t.id}')">×</button></div>`;
                    if(radarMap) {
                        const tm = L.marker([t.lat, t.lng], {
                            icon: L.divIcon({ html: `<div style="background:conic-gradient(from 0deg, #9b59b6, #e91e63); width:16px; height:16px; border-radius:50%; border:2px solid #fff; animation: radar-sweep 2s infinite linear;"></div>` })
                        }).addTo(radarMap).bindPopup(`<b>📣 揪團組隊中</b><br>主題: ${t.title}<br>發起人: ${t.leader_nickname}`);
                        radarLayers.push(tm);
                    }
                });
            }
            document.getElementById('activeTeamsList').innerHTML = tWaveHtml || '<div style="font-size:0.75rem; color:#666; text-align:center;">周圍暫無活躍的揪團組隊波</div>';

            // 渲染定點區域 [需求4]
            let tHtml = '';
            if(targets) {
                targets.forEach(t => {
                    tHtml += `<div class="list-row"><div>📍 <b>${t.name}</b></div><button class="btn-danger" onclick="deleteItem('static_targets','${t.id}')">×</button></div>`;
                    if(radarMap) {
                        const tm = L.marker([t.lat, t.lng], { icon: L.divIcon({ html: `<div style="background:var(--danger); width:12px; height:12px; border-radius:50%; border:2px solid #fff;"></div>` }) }).addTo(radarMap).bindPopup(`📍 固定目標點: ${t.name}`);
                        radarLayers.push(tm);
                    }
                });
            }
            document.getElementById('targetList').innerHTML = tHtml || '<div style="font-size:0.75rem; color:#666; text-align:center;">尚無定點目標</div>';

            // 渲染活動
            let eHtml = '';
            if(evs) {
                evs.forEach(e => {
                    eHtml += `<div class="list-row"><div>📅 <b>${e.title}</b></div><button class="btn-danger" onclick="deleteItem('events','${e.id}')">×</button></div>`;
                    if(radarMap) {
                        const em = L.marker([e.lat, e.lng], { icon: L.divIcon({ html: `<div style="background:var(--warning); width:12px; height:12px; border-radius:50%; border:2px solid #fff;"></div>` }) }).addTo(radarMap).bindPopup(`📅 活動點: ${e.title}`);
                        radarLayers.push(em);
                    }
                });
            }
            document.getElementById('eventList').innerHTML = eHtml || '<div style="font-size:0.75rem; color:#666; text-align:center;">尚無期間限定活動</div>';
        }

        window.sendTeamInvite = function(targetNick) {
            showToast(`✉️ 已向同好【${targetNick}】發射組隊邀請波！等待對方接受。`, 'success');
        };

        async function addFriend() {
            const nick = document.getElementById('fNick').value.trim(); if(!nick) return;
            await window.dbClient.from('friendships').insert({ user_id: currentUser.id, friend_nickname: nick, alert_radius: 500 });
            document.getElementById('fNick').value = ''; showToast('✅ 成功綁定好友追蹤邊界', 'success'); refreshDashboardData();
        }

        async function addStaticTarget() {
            const name = document.getElementById('tName').value.trim(); if(!name) return;
            await window.dbClient.from('static_targets').insert({ user_id: currentUser.id, name, lat: currentPosition.lat, lng: currentPosition.lng });
            document.getElementById('tName').value = ''; showToast('✅ 新增固定目標區域成功', 'success'); refreshDashboardData();
        }

        async function addEvent() {
            const title = document.getElementById('evTitle').value.trim(); if(!title) return;
            await window.dbClient.from('events').insert({ user_id: currentUser.id, title, lat: currentPosition.lat, lng: currentPosition.lng });
            document.getElementById('evTitle').value = ''; showToast('✅ 新增期間限定活動成功', 'success'); refreshDashboardData();
        }

        async function deleteItem(table, id) {
            await window.dbClient.from(table).delete().eq('id', id);
            refreshDashboardData();
        }

        function toggleTracking() {
            const btn = document.getElementById('trackBtn');
            if (tracking) {
                if(watchId) navigator.geolocation.clearWatch(watchId);
                tracking = false; btn.textContent = '▶️ 啟動雷達掃描'; btn.style.background = 'var(--accent)';
            } else {
                watchId = navigator.geolocation.watchPosition(async pos => {
                    currentPosition = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                    document.getElementById('geoStatus').textContent = `Lat: ${currentPosition.lat.toFixed(4)}, Lng: ${currentPosition.lng.toFixed(4)}`;
                    initRadarMap(currentPosition.lat, currentPosition.lng);
                    
                    await window.dbClient.from('profiles').update({ current_lat: currentPosition.lat, current_lng: currentPosition.lng }).eq('id', currentUser.id);
                    await window.dbClient.from('location_logs').insert({ user_id: currentUser.id, lat: currentPosition.lat, lng: currentPosition.lng });
                    
                    refreshDashboardData();
                }, e => showToast('GPS 定位失敗: ' + e.message, 'error'), { enableHighAccuracy: true });
                tracking = true; btn.textContent = '⏸️ 停止雷達監控'; btn.style.background = 'var(--danger)';
            }
        }

        // [需求6] 歷史軌跡與出沒分析核心邏輯
        async function queryHistoryLogs() {
            if(!historyMap) {
                historyMap = L.map('historyMap', { zoomControl: false, attributionControl: false }).setView([25.0451, 121.4525], 13);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(historyMap);
            }
            historyMarkers.forEach(m => historyMap.removeLayer(m)); historyMarkers = [];
            if(historyPolyline) { historyMap.removeLayer(historyPolyline); historyPolyline = null; }

            const start = document.getElementById('dateStart').value + 'T00:00:00Z';
            const end = document.getElementById('dateEnd').value + 'T23:59:59Z';

            const { data: logs, error } = await window.dbClient.from('location_logs')
                .select('*').eq('user_id', currentUser.id).gte('created_at', start).lte('created_at', end).order('created_at', { ascending: true });

            if(error || !logs || logs.length === 0) { showToast('📭 該區間內查無歷史軌跡數據', 'error'); return; }

            let latlngs = [], totalDist = 0;
            logs.forEach((log, i) => {
                latlngs.push([log.lat, log.lng]);
                if(i > 0) totalDist += calcDistance(logs[i-1].lat, logs[i-1].lng, log.lat, log.lng);
                const m = L.circleMarker([log.lat, log.lng], { radius: 4, color: 'var(--accent)' }).addTo(historyMap);
                historyMarkers.push(m);
            });

            historyPolyline = L.polyline(latlngs, { color: 'var(--accent)', weight: 3 }).addTo(historyMap);
            historyMap.fitBounds(historyPolyline.getBounds());

            // 數據分析注入
            document.getElementById('statDistance').textContent = (totalDist / 1000).toFixed(2) + ' km';
            document.getElementById('statDuration').textContent = (logs.length * 5 / 60).toFixed(1) + ' 小時';
            document.getElementById('statCount').textContent = logs.length + ' 點';
            
            // 簡單出沒分析：精確到小數點第三位做高頻熱點分析
            let counts = {};
            logs.forEach(l => { const k = `${l.lat.toFixed(3)},${l.lng.toFixed(3)}`; counts[k] = (counts[k]||0)+1; });
            let topPlace = Object.keys(counts).reduce((a, b) => counts[a] > counts[b] ? a : b);
            document.getElementById('statTopPlace').textContent = '土城熱點區';

            showToast('✅ 歷史軌跡與商務數據分析加載完成', 'success');
        }

        async function handleLogout() { if(tracking) toggleTracking(); await window.dbClient.auth.signOut(); location.reload(); }
        
        function enterMainApp() {
            document.getElementById('authPage').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            loadProfileGravity();
            setTimeout(() => { initRadarMap(25.0451, 121.4525); }, 200);
        }

        window.onload = async function() {
            try {
                const { data } = await window.dbClient.auth.getSession();
                if(data?.session?.user) { currentUser = data.session.user; enterMainApp(); }
                else { document.getElementById('connStatus').textContent = '🟢 連線成功，請輸入帳密'; }
            } catch(e) { document.getElementById('connStatus').textContent = '🔴 主機連線異常'; }
        };
    </script>
</body>
</html>
