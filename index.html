<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover, maximum-scale=1.0">
    <title>🟢 TribeRadar 同好聚落雷達 - 資源適配版</title>
 
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root {
            --bg: #0b0c10;
            --surface: #151a21;
            --surface2: #1f2630;
            --border: #2ecc7130;
            --text: #95a5a6;
            --text-bright: #2ecc71;
            --accent: #2ecc71; 
            --danger: #e74c3c;
            --warning: #f1c40f;
            --radius: 12px;
            --radius-sm: 8px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang TC', sans-serif;
            background: var(--bg); color: var(--text); padding: 10px; display: flex; flex-direction: column; align-items: center;
        }
        .app-container { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 12px; }
        .card {
            background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border);
            padding: 16px; display: flex; flex-direction: column; gap: 12px;
        }
        .card-title { font-size: 0.9rem; font-weight: 700; color: #fff; display: flex; align-items: center; gap: 6px; }
        
        .btn {
            padding: 12px; border-radius: 20px; border: none; font-weight: 700; font-size: 0.85rem;
            cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 6px; transition: all 0.2s;
        }
        .btn-primary { background: var(--accent); color: #000; width: 100%; }
        .btn-outline { background: transparent; color: var(--accent); border: 1px solid var(--accent); border-radius: 20px; }
        .btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); border-radius: 50%; width: 28px; height: 28px; padding: 0; display: inline-flex; align-items: center; justify-content: center; }
        
        .tab-nav { display: flex; gap: 6px; background: rgba(0,0,0,0.4); border-radius: var(--radius); padding: 4px; }
        .tab-btn { flex: 1; padding: 10px; border-radius: var(--radius-sm); background: transparent; color: var(--text); border: none; font-weight: bold; cursor: pointer; }
        .tab-btn.active { background: var(--accent); color: #000; }

        /* 🟢 TribeRadar 圓盤掃描 */
        .radar-panel { display: flex; flex-direction: column; align-items: center; background: #070a0e; padding: 10px; }
        .radar-outer {
            position: relative; border: 4px solid var(--accent); border-radius: 50%; width: 100%; padding-bottom: 100%;
            overflow: hidden; box-shadow: inset 0 0 30px rgba(0,0,0,1), 0 0 15px rgba(46,204,113,0.3);
        }
        #radarMap { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .radar-sweeper {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 999; pointer-events: none; border-radius: 50%;
            background: conic-gradient(from 0deg, rgba(46,204,113,0.3) 0deg, rgba(46,204,113,0) 90deg, transparent 360deg);
            animation: radar-sweep 4s infinite linear;
        }
        @keyframes radar-sweep { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .list-row { background: var(--surface2); border-radius: var(--radius-sm); padding: 12px; display: flex; align-items: center; justify-content: space-between; font-size: 0.85rem; }
        
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        .input-group label { font-size: 0.75rem; color: var(--accent); font-weight: bold; }
        .input-group input, .input-group textarea { background: var(--surface2); border: 1px solid rgba(255,255,255,0.1); border-radius: var(--radius-sm); padding: 10px; color: #fff; outline: none; font-family: inherit; }
        .input-group textarea { resize: none; height: 60px; font-size: 0.85rem; }

        .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:10000; display:flex; align-items:center; justify-content:center; padding:20px; }
        .modal-content { background:var(--surface); border:2px solid var(--warning); border-radius:var(--radius); padding:20px; width:100%; max-width:420px; text-align:left; box-shadow:0 0 25px rgba(241,196,15,0.4); max-height: 85vh; overflow-y: auto; }

        .hidden { display: none !important; }
        .toast-container { position: fixed; top: 16px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 6px; width: 90%; max-width: 400px; }
        .toast { padding: 12px; border-radius: 8px; font-size: 0.8rem; text-align: center; color: #fff; font-weight: bold; }
        .toast.error { background: #c0392b; }
        .toast.success { background: #27ae60; }
        
        .resource-tag { background: rgba(241,196,15,0.1); border: 1px solid var(--warning); color: var(--warning); padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; }
    </style>
</head>
<body>

    <div class="toast-container" id="toastContainer"></div>

    <div class="modal-overlay hidden" id="alertModal">
        <div class="modal-content">
            <h3 style="color:var(--warning); text-align:center; margin-bottom: 15px;">⚡ 附近有你的適配者!! ⚡</h3>
            <div id="modalMsg" style="color: #fff; font-size: 0.9rem; display:flex; flex-direction:column; gap:10px;"></div>
            <button class="btn btn-primary" style="margin-top:20px; background:var(--warning);" onclick="closeAlertModal()">收到！立即前往建立連結</button>
        </div>
    </div>

    <div class="app-container" id="authPage">
        <div class="card" style="text-align:center;">
            <h2 style="color:var(--accent)">🟢 TribeRadar 同好聚落雷達</h2>
            <p style="font-size:0.75rem; color:var(--accent);" id="connStatus">探索主機連線中...</p>
        </div>
        <div class="card">
            <div class="input-group"><label>EMAIL</label><input type="email" id="authEmail" placeholder="example@gmail.com"></div>
            <div class="input-group"><label>密碼 (至少 6 碼)</label><input type="password" id="authPassword"></div>
            <div class="input-group hidden" id="nickGroup"><label>探索暱稱</label><input type="text" id="authNickname" placeholder="Sunny"></div>
            <button class="btn btn-primary" id="authActionBtn" onclick="handleAuth()">進入同好網格</button>
            <button class="btn btn-outline" style="font-size:0.75rem;" id="authToggleBtn" onclick="toggleAuthMode()">初次探索？切換註冊帳號</button>
        </div>
    </div>

    <div class="app-container hidden" id="mainApp">
        <div class="tab-nav">
            <button class="tab-btn active" id="tabBtnRadar" onclick="switchTab('radar')">📡 聚落引力雷達</button>
            <button class="tab-btn" id="tabBtnProfile" onclick="switchTab('profile')">💼 我的資源與需求</button>
        </div>

        <div id="radarTab">
            <div class="card radar-panel">
                <div class="radar-outer">
                    <div id="radarMap"></div>
                    <div class="radar-sweeper"></div>
                </div>
                <div id="geoStatus" style="font-size:0.7rem; font-family:monospace; margin-top:8px; color:var(--accent);">中心探索中...</div>
            </div>

            <div class="card">
                <div class="card-title">🛰️ 雷達控制台</div>
                <div style="display:flex; gap:8px;">
                    <button class="btn btn-primary" id="trackBtn" onclick="toggleTracking()">▶️ 啟動雷達掃描</button>
                    <button class="btn btn-outline" onclick="handleLogout()" style="color:var(--danger); border-color:var(--danger)">中斷連線</button>
                </div>
            </div>

            <div class="card">
                <div class="card-title">🧑‍🤝‍🧑 附近雷達感應圈 (1000m 內同好)</div>
                <div id="nearUserList" style="display:flex; flex-direction:column; gap:6px; font-size:0.85rem;">
                    開啟雷達掃描後，將自動捕獲附近商務資源...
                </div>
            </div>
        </div>

        <div id="profileTab" class="hidden">
            <div class="card" style="border: 1px solid var(--warning);">
                <div class="card-title" style="color:var(--warning)">🎯 我的即時需求 (配對核心)</div>
                <div class="input-group">
                    <label>我目前在尋找什麼資源 / 協助？</label>
                    <input type="text" id="pNeedWhat" placeholder="例如：尋找前端工程師、需要場地合作、找行銷資源...">
                </div>
            </div>

            <div class="card">
                <div class="card-title">✨ 我的自介引力場 (我有什麼資源)</div>
                <div class="input-group">
                    <label>(1) 我擁有什麼</label>
                    <textarea id="pHasWhat" placeholder="例如：我有 5 年後端開發經驗、在新北有實體店面空間..."></textarea>
                </div>
                <div class="input-group">
                    <label>(2) 我可以幫到你什麼</label>
                    <textarea id="pCanHelp" placeholder="例如：幫忙架設雲端資料庫、優化產品商業模式..."></textarea>
                </div>
                <div class="input-group">
                    <label>(3) 我可以如何幫你曝光</label>
                    <textarea id="pCanExpose" placeholder="例如：在我的 萬人電子報 幫忙下廣告、FB粉專轉發..."></textarea>
                </div>
                <div class="input-group">
                    <label>(4) 我可以幫你串聯什麼資源</label>
                    <textarea id="pCanConnect" placeholder="例如：可以對接天使投資人、對接原廠供應鏈廠商..."></textarea>
                </div>
                <button class="btn btn-primary" onclick="saveProfile資源()">💾 儲存並更新我的引力磁場</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://hknxdvefnuxgyepuuqra.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhrbnhkdmVmbnV4Z3llcHV1cXJhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1MzM0MDAsImV4cCI6MjA5NzEwOTQwMH0.M97OwM_9CrLCrgxbyA6kQs0MLFiRDzyYlvIiGqhBGec';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = null, tracking = false, watchId = null, currentPosition = null;
        let radarMap = null, myMarker = null, radarCircle = null;
        let elementsLayers = [];
        let isRegister = false, matchAlertedSet = new Set();
        let myProfileData = null;

        function showToast(msg, type='info') {
            const t = document.createElement('div'); t.className = `toast ${type}`; t.textContent = msg;
            document.getElementById('toastContainer').appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }

        function toggleAuthMode() {
            isRegister = !isRegister;
            document.getElementById('nickGroup').classList.toggle('hidden', !isRegister);
            document.getElementById('authActionBtn').textContent = isRegister ? '註冊新探索帳號' : '進入同好網格';
            document.getElementById('authToggleBtn').textContent = isRegister ? '已有帳號？返回登入' : '初次探索？切換註冊帳號';
        }

        function calcDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const φ1 = lat1 * Math.PI/180, φ2 = lat2 * Math.PI/180;
            const Δφ = (lat2-lat1) * Math.PI/180, Δλ = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) + Math.cos(φ1) * Math.cos(φ2) * Math.sin(Δλ/2) * Math.sin(Δλ/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        async function handleAuth() {
            const email = document.getElementById('authEmail').value.trim();
            const password = document.getElementById('authPassword').value;
            if(!email || !password) { showToast('⚠️ 請完整填寫欄位', 'error'); return; }
            try {
                if(isRegister) {
                    const nick = document.getElementById('authNickname').value.trim() || '未命名夥伴';
                    const { data, error } = await supabase.auth.signUp({ email, password });
                    if(error) throw error;
                    if(data.user) {
                        await supabase.from('profiles').insert({ id: data.user.id, email: email, nickname: nick });
                    }
                    showToast('🎉 帳號建立成功！請登入。', 'success');
                    toggleAuthMode();
                } else {
                    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                    if(error) throw error;
                    currentUser = data.user;
                    enterMainApp();
                }
            } catch(e) { showToast(e.message, 'error'); }
        }

        function initRadar(lat, lng) {
            if (radarMap) {
                radarMap.setView([lat, lng]);
                if(myMarker) myMarker.setLatLng([lat, lng]);
                if(radarCircle) radarCircle.setLatLng([lat, lng]);
                return;
            }
            radarMap = L.map('radarMap', { zoomControl: false, attributionControl: false }).setView([lat, lng], 14);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(radarMap);

            myMarker = L.marker([lat, lng], {
                icon: L.divIcon({ className: '', html: `<div style="background:#fff; width:12px; height:12px; border-radius:50%; border:2px solid var(--accent); box-shadow:0 0 10px var(--accent);"></div>`, iconSize:[12,12], iconAnchor:[6,6] })
            }).addTo(radarMap);

            radarCircle = L.circle([lat, lng], { radius: 1000, color: 'var(--accent)', weight: 1, fillColor: 'var(--accent)', fillOpacity: 0.01 }).addTo(radarMap);
        }

        async function loadMyProfile() {
            const { data } = await supabase.from('profiles').select('*').eq('id', currentUser.id).single();
            if(data) {
                myProfileData = data;
                document.getElementById('pNeedWhat').value = data.need_what || '';
                document.getElementById('pHasWhat').value = data.has_what || '';
                document.getElementById('pCanHelp').value = data.can_help || '';
                document.getElementById('pCanExpose').value = data.can_expose || '';
                document.getElementById('pCanConnect').value = data.can_connect || '';
            }
        }

        async function saveProfile資源() {
            const upd = {
                need_what: document.getElementById('pNeedWhat').value.trim(),
                has_what: document.getElementById('pHasWhat').value.trim(),
                can_help: document.getElementById('pCanHelp').value.trim(),
                can_expose: document.getElementById('pCanExpose').value.trim(),
                can_connect: document.getElementById('pCanConnect').value.trim()
            };
            await supabase.from('profiles').update(upd).eq('id', currentUser.id);
            myProfileData = { ...myProfileData, ...upd };
            showToast('✅ 引力場資源與需求更新完成！', 'success');
            if(currentPosition) scanNearby適配者();
        }

        function triggerMatchAlert(user) {
            if(matchAlertedSet.has(user.id)) return;
            matchAlertedSet.add(user.id);

            const msgHtml = `
                <div>👤 <b>適配對象：</b>${user.nickname || '神祕同好'}</div>
                <div style="color:var(--accent)">🎯 <b>對方的現階段需求：</b>${user.need_what || '未填寫'}</div>
                <hr style="border:0; border-top:1px solid #333; margin:5px 0;">
                <div>💡 <b>(1) 擁有資源：</b>${user.has_what || '無'}</div>
                <div>🤝 <b>(2) 願意協助：</b>${user.can_help || '無'}</div>
                <div>📢 <b>(3) 曝光管道：</b>${user.can_expose || '無'}</div>
                <div>🔗 <b>(4) 串聯資源：</b>${user.can_connect || '無'}</div>
            `;
            document.getElementById('modalMsg').innerHTML = msgHtml;
            document.getElementById('alertModal').classList.remove('hidden');
        }
        function closeAlertModal() { document.getElementById('alertModal').classList.add('hidden'); }

        async function scanNearby適配者() {
            if(!currentPosition || !currentUser) return;
            elementsLayers.forEach(l => radarMap.removeLayer(l));
            elementsLayers = [];

            const { data: allUsers } = await supabase.from('profiles').select('*').not('id', 'eq', currentUser.id);
            if(!allUsers) return;

            let listHtml = '';
            const myNeed = (myProfileData?.need_what || '').toLowerCase();

            allUsers.forEach(u => {
                if(!u.current_lat || !u.current_lng) return;
                const dist = calcDistance(currentPosition.lat, currentPosition.lng, u.current_lat, u.current_lng);

                if(dist <= 1000) {
                    let isMatch = false;
                    if(myNeed && (
                        (u.has_what && u.has_what.toLowerCase().includes(myNeed)) ||
                        (u.can_help && u.can_help.toLowerCase().includes(myNeed)) ||
                        (u.can_connect && u.can_connect.toLowerCase().includes(myNeed))
                    )) { isMatch = true; }

                    if(isMatch || (myNeed !== "" && u.has_what)) {
                        triggerMatchAlert(u);
                    }

                    const dotColor = (isMatch || u.has_what) ? 'var(--warning)' : 'var(--accent)';
                    const m = L.marker([u.current_lat, u.current_lng], {
                        icon: L.divIcon({ html: `<div style="background:${dotColor}; width:12px; height:12px; border-radius:50%; border:2px solid #fff; box-shadow:0 0 10px ${dotColor};"></div>` })
                    }).addTo(radarMap).bindPopup(`
                        <b>👤 ${u.nickname || '神祕同好'}</b> (${Math.round(dist)}m)<br>
                        🎯 需求: ${u.need_what || '未填寫'}<br>
                        📦 擁有: ${u.has_what || '未填寫'}
                    `);
                    elementsLayers.push(m);

                    listHtml += `
                        <div class="list-row" style="${u.has_what ? 'border-left: 3px solid var(--warning);' : ''}">
                            <div style="display:flex; flex-direction:column; gap:3px; width:85%;">
                                <div>👤 <b>${u.nickname || '路人'}</b> <span style="color:#7f8c8d; font-size:0.7rem;">(${Math.round(dist)}m)</span></div>
                                <div style="font-size:0.75rem; color:#fff;"><span class="resource-tag">求</span> ${u.need_what || '無'}</div>
                                ${u.has_what ? `<div style="font-size:0.75rem; color:var(--warning);"><span class="resource-tag" style="background:rgba(46,204,113,0.1); border-color:var(--accent); color:var(--accent)">供</span> ${u.has_what}</div>` : ''}
                            </div>
                        </div>
                    `;
                }
            });

            document.getElementById('nearUserList').innerHTML = listHtml || '<div style="text-align:center; padding:10px; font-size:0.75rem;">🛰️ 方圓一公里內暫無其他同好訊號</div>';
        }

        function toggleTracking() {
            const btn = document.getElementById('trackBtn');
            if (tracking) {
                if(watchId) navigator.geolocation.clearWatch(watchId);
                tracking = false;
                btn.textContent = '▶️ 啟動雷達掃描';
                btn.style.background = 'var(--accent)';
            } else {
                watchId = navigator.geolocation.watchPosition(async pos => {
                    currentPosition = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                    document.getElementById('geoStatus').textContent = `Lat: ${currentPosition.lat.toFixed(6)}, Lng: ${currentPosition.lng.toFixed(6)}`;
                    initRadar(currentPosition.lat, currentPosition.lng);
                    
                    await supabase.from('profiles').update({ current_lat: currentPosition.lat, current_lng: currentPosition.lng }).eq('id', currentUser.id);
                    
                    // 同步寫入歷史足跡 logs 表
                    supabase.from('location_logs').insert({ user_id: currentUser.id, lat: currentPosition.lat, lng: currentPosition.lng });
                    
                    scanNearby適配者();
                }, null, { enableHighAccuracy: true });
                tracking = true;
                btn.textContent = '⏸️ 停止雷達監控';
                btn.style.background = 'var(--danger)';
            }
        }

        function switchTab(t) {
            document.getElementById('radarTab').classList.toggle('hidden', t !== 'radar');
            document.getElementById('profileTab').classList.toggle('hidden', t !== 'profile');
            document.getElementById('tabBtnRadar').classList.toggle('active', t === 'radar');
            document.getElementById('tabBtnProfile').classList.toggle('active', t === 'profile');
        }

        async function handleLogout() { if(tracking) toggleTracking(); await supabase.auth.signOut(); location.reload(); }
        
        function enterMainApp() { 
            document.getElementById('authPage').classList.add('hidden'); 
            document.getElementById('mainApp').classList.remove('hidden'); 
            loadMyProfile();
            setTimeout(() => initRadar(25.0451, 121.4525), 200); 
        }

        window.onload = async function() {
            try {
                const { data } = await supabase.auth.getSession();
                if(data?.session?.user) { 
                    currentUser = data.session.user; 
                    enterMainApp(); 
                } else {
                    document.getElementById('connStatus').textContent = '🟢 探索主機已連線';
                }
            } catch(e) { document.getElementById('connStatus').textContent = '🔴 連線異常'; }
        };
    </script>
</body>
</html>
