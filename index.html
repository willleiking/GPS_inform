<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover, maximum-scale=1.0">
    <title>📍 社群位置監控 + 歷史軌跡分析</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>

    <style>
        :root {
            --bg: #0a0a10;
            --surface: #161622;
            --surface2: #1e1e2e;
            --border: #2a2a3e;
            --text: #e8e8f0;
            --text2: #9898b0;
            --accent: #5b9cf5;
            --success: #4ade80;
            --warning: #facc15;
            --danger: #f87171;
            --radius: 14px;
            --radius-sm: 10px;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang TC', 'Noto Sans TC', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            padding-bottom: 50px;
        }
        .app-container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .card {
            background: var(--surface);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .card-title {
            font-size: 0.9rem;
            font-weight: 700;
        }
        .btn {
            padding: 10px 16px;
            border-radius: 25px;
            border: none;
            font-weight: 700;
            font-size: 0.8rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            font-family: inherit;
        }
        .btn:active {
            transform: scale(0.95);
        }
        .btn-primary {
            background: var(--accent);
            color: #000;
            width: 100%;
        }
        .btn-outline {
            background: transparent;
            color: var(--accent);
            border: 2px solid var(--accent);
        }
        .btn-sm {
            padding: 6px 12px;
            font-size: 0.7rem;
        }
        .btn-danger {
            background: transparent;
            color: var(--danger);
            border: 2px solid var(--danger);
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .input-group label {
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--text2);
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .input-group input {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 8px 12px;
            color: var(--text);
            font-size: 0.8rem;
            font-family: inherit;
            outline: none;
        }
        .input-group input:focus {
            border-color: var(--accent);
        }
        .tab-nav {
            display: flex;
            gap: 6px;
            background: var(--surface);
            border-radius: var(--radius);
            padding: 4px;
            border: 1px solid var(--border);
        }
        .tab-btn {
            flex: 1;
            padding: 10px;
            border-radius: var(--radius-sm);
            background: transparent;
            color: var(--text2);
            font-weight: 700;
            font-size: 0.8rem;
            text-align: center;
            cursor: pointer;
            border: none;
        }
        .tab-btn.active {
            background: var(--accent);
            color: #000;
        }
        .map-container {
            height: 280px;
            border-radius: var(--radius-sm);
            overflow: hidden;
            border: 1px solid var(--border);
        }
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .stat-item {
            background: var(--surface2);
            border-radius: var(--radius-sm);
            padding: 12px;
            text-align: center;
        }
        .stat-value {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--accent);
        }
        .stat-label {
            font-size: 0.65rem;
            color: var(--text2);
        }
        .chart-container {
            height: 200px;
        }
        .list-item {
            background: var(--surface2);
            border-radius: var(--radius-sm);
            padding: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.75rem;
            margin-bottom: 4px;
        }
        .toast-container {
            position: fixed;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 6px;
            pointer-events: none;
            width: 90%;
            max-width: 420px;
        }
        .toast {
            padding: 10px 16px;
            border-radius: 22px;
            font-weight: 600;
            font-size: 0.8rem;
            text-align: center;
            animation: toastIn 0.3s, toastOut 0.3s 2.7s forwards;
            pointer-events: auto;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
        }
        .toast.success {
            background: #1a3a2a;
            color: var(--success);
            border: 1px solid #2a5a3a;
        }
        .toast.error {
            background: #3a1a1a;
            color: var(--danger);
            border: 1px solid #5a2a2a;
        }
        .toast.info {
            background: #1a2a3a;
            color: var(--accent);
            border: 1px solid #2a3a5a;
        }
        @keyframes toastIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes toastOut {
            from { opacity: 1; }
            to { opacity: 0; transform: translateY(-15px); }
        }
        .hidden { display: none !important; }
        @media print {
            body * { visibility: hidden; }
            #printArea, #printArea * { visibility: visible; }
            #printArea { position: absolute; left: 0; top: 0; width: 100%; }
            .no-print { display: none !important; }
        }
    </style>
</head>
<body>

    <div class="toast-container" id="toastContainer"></div>

    <div class="app-container" id="authPage">
        <div class="card" style="text-align:center; padding:30px;">
            <h2 style="background:linear-gradient(135deg,#5b9cf5,#c084fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">📍 社群位置監控</h2>
            <p style="color:var(--text2);font-size:0.8rem;">分享位置、綁定好友、到訪通知、歷史軌跡分析</p>
            <p style="font-size:0.7rem;" id="connectionStatus">🔄 正在連線...</p>
        </div>
        <div class="card" id="loginCard">
            <div class="card-title">🔐 登入 / 註冊</div>
            <div class="input-group">
                <label>Email</label>
                <input type="email" id="authEmail" placeholder="you@example.com">
            </div>
            <div class="input-group">
                <label>密碼（至少 6 碼）</label>
                <input type="password" id="authPassword" placeholder="••••••">
            </div>
            <div class="input-group hidden" id="nicknameGroup">
                <label>顯示名稱</label>
                <input type="text" id="authNickname" placeholder="你的暱稱">
            </div>
            <button class="btn btn-primary" id="authActionBtn" onclick="handleAuthAction()">登入</button>
            <button class="btn btn-sm btn-outline" id="authToggleBtn" onclick="toggleAuthMode()">還沒有帳號？註冊</button>
            <div style="font-size:0.65rem;color:var(--text2);text-align:center;">💡 首次使用請先註冊帳號</div>
        </div>
    </div>

    <div class="app-container hidden" id="mainApp">
        <div class="tab-nav no-print">
            <button class="tab-btn active" onclick="switchTab('monitor')">📍 即時監控</button>
            <button class="tab-btn" onclick="switchTab('history')">📊 歷史分析</button>
        </div>

        <div id="monitorTab">
            <div class="card">
                <div class="card-title">🗺️ 即時監控地圖</div>
                <div class="map-container" id="liveMap"></div>
            </div>

            <div class="card">
                <div class="card-title">🛰️ 我的位置</div>
                <div id="currentLocation" style="font-family:monospace; font-size:0.75rem;">--</div>
                <div style="display:flex; gap:8px;">
                    <button class="btn btn-primary" id="trackingBtn" onclick="toggleTracking()" style="flex:1;">▶️ 開始監控</button>
                    <button class="btn btn-sm btn-danger" onclick="handleLogout()">登出</button>
                </div>
            </div>

            <div class="card">
                <div class="card-title">🧑‍🤝‍🧑 好友位置</div>
                <div id="friendList" style="max-height:200px; overflow-y:auto;">
                    <div style="text-align:center;color:var(--text2);padding:20px;">👥 尚未綁定好友</div>
                </div>
                <button class="btn btn-sm btn-outline" onclick="showAddFriendModal()">＋ 綁定好友</button>
            </div>

            <div class="card">
                <div class="card-title">📍 定點目標</div>
                <div id="staticTargetList" style="max-height:200px; overflow-y:auto;">
                    <div style="text-align:center;color:var(--text2);padding:20px;">📋 尚無定點目標</div>
                </div>
                <button class="btn btn-sm btn-outline" onclick="showAddStaticTargetModal()">＋ 新增定點（使用當前位置）</button>
            </div>

            <div class="card">
                <div class="card-title">📅 期間限定活動</div>
                <div id="eventList" style="max-height:200px; overflow-y:auto;">
                    <div style="text-align:center;color:var(--text2);padding:20px;">📋 尚無活動</div>
                </div>
                <button class="btn btn-sm btn-outline" onclick="showAddEventModal()">＋ 新增活動（使用當前位置）</button>
            </div>
        </div>

        <div id="historyTab" class="hidden">
            <div id="printArea">
                <div class="card no-print">
                    <div class="card-title">📆 時間區間</div>
                    <div style="display:flex; gap:10px; align-items:center;">
                        <input type="date" id="startDate" style="flex:1;">
                        <span>～</span>
                        <input type="date" id="endDate" style="flex:1;">
                    </div>
                    <button class="btn btn-primary" onclick="loadHistory()">🔍 查詢軌跡</button>
                </div>
                <div class="card">
                    <div class="card-title">📊 摘要儀表板</div>
                    <div class="stats-grid">
                        <div class="stat-item"><div class="stat-value" id="totalDistance">--</div><div class="stat-label">總移動距離</div></div>
                        <div class="stat-item"><div class="stat-value" id="totalStayTime">--</div><div class="stat-label">總停留時間</div></div>
                        <div class="stat-item"><div class="stat-value" id="totalStops">--</div><div class="stat-label">停留次數</div></div>
                        <div class="stat-item"><div class="stat-value" id="topPlace">--</div><div class="stat-label">最常停留點</div></div>
                    </div>
                </div>
                <div class="card">
                    <div class="card-title">🗺️ 軌跡地圖</div>
                    <div class="map-container" id="historyMap"></div>
                </div>
                <div class="card">
                    <div class="card-title">📈 每日移動距離</div>
                    <div class="chart-container"><canvas id="distanceChart"></canvas></div>
                </div>
                <div class="card">
                    <div class="card-title">⏱️ 停留明細</div>
                    <div id="stayTable" style="max-height:200px; overflow-y:auto;"></div>
                </div>
            </div>
            <div class="card no-print">
                <button class="btn btn-outline" onclick="exportCSV()">📥 匯出 CSV</button>
                <button class="btn btn-outline" onclick="printReport()">🖨️ 列印報表</button>
            </div>
        </div>

        <div class="card no-print">
            <div class="card-title" onclick="toggleEmailSettings()" style="cursor:pointer;">⚙️ 郵件設定 ▼</div>
            <div id="emailSettingsPanel" class="hidden">
                <div class="input-group"><label>EmailJS Public Key</label><input id="emailjsPublicKey" placeholder="abc123..."></div>
                <div class="input-group"><label>Service ID</label><input id="emailjsServiceId" placeholder="service_xxx"></div>
                <div class="input-group"><label>Template ID</label><input id="emailjsTemplateId" placeholder="template_xxx"></div>
                <div class="input-group"><label>預設收件人</label><input id="defaultRecipient" placeholder="me@example.com"></div>
                <button class="btn btn-sm btn-outline" onclick="saveEmailSettings()">💾 儲存</button>
                <button class="btn btn-sm btn-outline" onclick="testEmailConfig()">🧪 測試郵件</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== Supabase 連線 ====================
        const SUPABASE_URL = 'https://hknxdvefnuxgyepuuqra.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhrbnhkdmVmbnV4Z3llcHV1cXJhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1MzM0MDAsImV4cCI6MjA5NzEwOTQwMH0.M97OwM_9CrLCrgxbyA6kQs0MLFiRDzyYlvIiGqhBGec';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // ==================== 全域變數 ====================
        let currentUser = null;
        let tracking = false;
        let watchId = null;
        let uploadIntervalId = null;
        let currentPosition = null;
        
        let liveMap = null;
        let liveMarker = null;
        let historyMap = null;
        let distanceChart = null;
        let currentHistoryData = null;
        let isRegisterMode = false;
        
        // 快取記憶體以供圍籬計算
        let cachedTargets = [];
        let cachedEvents = [];
        
        const RECORD_INTERVAL = 30000; // 30秒上傳紀錄並判定一次

        // ==================== Toast 通知 ====================
        function showToast(msg, type = 'info') {
            const t = document.createElement('div');
            t.className = `toast ${type}`;
            t.textContent = msg;
            document.getElementById('toastContainer').appendChild(t);
            setTimeout(() => { if (t.parentNode) t.remove(); }, 3500);
        }

        // ==================== 認證 ====================
        function toggleAuthMode() {
            isRegisterMode = !isRegisterMode;
            document.getElementById('nicknameGroup').classList.toggle('hidden', !isRegisterMode);
            document.getElementById('authActionBtn').textContent = isRegisterMode ? '註冊' : '登入';
            document.getElementById('authToggleBtn').textContent = isRegisterMode ? '已經有帳號？登入' : '還沒有帳號？註冊';
        }

        async function handleAuthAction() {
            const email = document.getElementById('authEmail').value.trim();
            const password = document.getElementById('authPassword').value;

            if (!email || !password) { showToast('⚠️ 請填寫 Email 和密碼', 'error'); return; }
            if (password.length < 6) { showToast('⚠️ 密碼至少 6 碼', 'error'); return; }

            const btn = document.getElementById('authActionBtn');
            btn.textContent = '處理中...';
            btn.disabled = true;

            try {
                if (isRegisterMode) {
                    const nickname = document.getElementById('authNickname').value.trim();
                    if (!nickname) { 
                        showToast('⚠️ 請填寫顯示名稱', 'error');
                        btn.textContent = '註冊';
                        btn.disabled = false; 
                        return; 
                    }

                    const { data, error } = await supabase.auth.signUp({
                        email,
                        password,
                        options: { data: { nickname } }
                    });

                    if (error) throw error;

                    if (data.user) {
                        showToast('✅ 註冊成功！請重新登入', 'success');
                        isRegisterMode = true;
                        toggleAuthMode();
                    }
                } else {
                    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                    if (error) throw error;

                    currentUser = data.user;
                    showMainApp();
                    showToast('✅ 登入成功！', 'success');
                }
            } catch (e) {
                console.error('認證錯誤:', e);
                showToast('❌ ' + (e.message || '認證失敗'), 'error');
            }
            btn.textContent = isRegisterMode ? '註冊' : '登入';
            btn.disabled = false;
        }

        async function handleLogout() {
            if (tracking) stopTracking();
            await supabase.auth.signOut();
            currentUser = null;
            document.getElementById('mainApp').classList.add('hidden');
            document.getElementById('authPage').classList.remove('hidden');
            document.getElementById('authEmail').value = '';
            document.getElementById('authPassword').value = '';
            if (liveMap) { liveMap.remove(); liveMap = null; liveMarker = null; }
            showToast('👋 已登出', 'info');
        }

        function showMainApp() {
            document.getElementById('authPage').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            setTimeout(initLiveMap, 200);
            loadAllData();
            loadEmailSettingsFromStorage();
        }

        // ==================== 初始化即時地圖 ====================
        function initLiveMap() {
            const el = document.getElementById('liveMap');
            if (!el || liveMap) return;
            liveMap = L.map('liveMap').setView([25.033, 121.565], 15);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { 
                attribution: '© OpenStreetMap' 
            }).addTo(liveMap);
        }

        // ==================== 資料載入與渲染 ====================
        async function loadAllData() {
            if (!currentUser) return;
            try {
                const [fRes, tRes, eRes] = await Promise.all([
                    supabase.from('friendships').select('*').eq('user_id', currentUser.id),
                    supabase.from('static_targets').select('*').eq('user_id', currentUser.id),
                    supabase.from('events').select('*').eq('user_id', currentUser.id).eq('is_expired', false)
                ]);
                
                cachedTargets = tRes.data || [];
                cachedEvents = eRes.data || [];

                renderList('friendList', fRes.data || [], '👥 尚未綁定好友', '🧑', '好友', 'alert_radius', 'm');
                renderList('staticTargetList', cachedTargets, '📋 尚無定點目標', '📍', '地點', 'alert_radius', 'm');
                renderList('eventList', cachedEvents, '📅 尚無活動', '📅', '活動', null, null, 'end_date');
                
                updateLiveMapMarkers();
            } catch (e) {
                console.warn('載入資料失敗（資料表或 RLS 設定可能有誤）:', e.message);
                ['friendList', 'staticTargetList', 'eventList'].forEach(id => {
                    document.getElementById(id).innerHTML = '<div style="text-align:center;color:var(--warning);padding:20px;">⚠️ 請先建立資料表與 RLS 政策</div>';
                });
            }
        }

        function renderList(elementId, data, emptyMsg, icon, label, radiusField, radiusUnit, dateField) {
            const el = document.getElementById(elementId);
            if (!data.length) {
                el.innerHTML = `<div style="text-align:center;color:var(--text2);padding:20px;">${emptyMsg}</div>`;
                return;
            }
            el.innerHTML = data.map(item => {
                let detail = '';
                if (radiusField && item[radiusField]) detail = `半徑 ${item[radiusField]}${radiusUnit||''}`;
                if (dateField && item[dateField]) detail = item[dateField];
                const name = item.name || item.friend_nickname || label;
                return `<div class="list-item" style="justify-content:space-between;">
                    <span>${icon} <strong>${name}</strong></span>
                    <span style="color:var(--text2); margin-left: auto; margin-right: 10px;">${detail}</span>
                    <button class="btn btn-sm btn-danger" onclick="deleteItem('${elementId}', '${item.id}')">✕</button>
                </div>`;
            }).join('');
        }

        function updateLiveMapMarkers() {
            if (!liveMap) return;
            // 清除現有非 Tile 的 Marker 與 Circle
            liveMap.eachLayer(layer => {
                if (layer instanceof L.Marker && layer !== liveMarker) liveMap.removeLayer(layer);
                if (layer instanceof L.Circle) liveMap.removeLayer(layer);
            });

            // 繪製定點目標
            cachedTargets.forEach(t => {
                if(t.lat && t.lng) {
                    L.marker([t.lat, t.lng]).addTo(liveMap).bindPopup(`📍 地點: ${t.name}`);
                    if(t.alert_radius) {
                        L.circle([t.lat, t.lng], { radius: t.alert_radius, color: '#3b82f6', fillOpacity: 0.1 }).addTo(liveMap);
                    }
                }
            });

            // 繪製限定活動
            cachedEvents.forEach(e => {
                if(e.lat && e.lng) {
                    L.marker([e.lat, e.lng]).addTo(liveMap).bindPopup(`📅 活動: ${e.name}`);
                    if(e.alert_radius) {
                        L.circle([e.lat, e.lng], { radius: e.alert_radius, color: '#ec4899', fillOpacity: 0.1 }).addTo(liveMap);
                    }
                }
            });
        }

        async function deleteItem(listId, id) {
            let table;
            if (listId === 'friendList') table = 'friendships';
            else if (listId === 'staticTargetList') table = 'static_targets';
            else if (listId === 'eventList') table = 'events';

            if (table === 'events') {
                await supabase.from(table).update({ is_expired: true }).eq('id', id);
            } else {
                await supabase.from(table).delete().eq('id', id);
            }
            loadAllData();
            showToast('🗑️ 已成功刪除項目', 'info');
        }

        // ==================== 新增模態框（進化自動定位版） ====================
        function showAddFriendModal() {
            const email = prompt('請輸入好友的註冊 Email：');
            if (!email) return;
            const nickname = prompt('請輸入好友暱稱：');
            if (!nickname) return;
            const radius = prompt('提醒防護半徑（公尺）：', '2000');
            addItem('friendships', {
                user_id: currentUser.id,
                friend_nickname: nickname,
                alert_radius: parseInt(radius) || 2000,
                alert_enabled: true
            }, '好友');
        }

        function showAddStaticTargetModal() {
            const name = prompt('請輸入定點名稱：');
            if (!name) return;
            
            let lat = currentPosition ? currentPosition.lat : null;
            let lng = currentPosition ? currentPosition.lng : null;
            
            if (!lat || !lng) {
                showToast('⚠️ 未偵測到目前 GPS，請手動輸入經緯度', 'warning');
                lat = parseFloat(prompt('請輸入緯度 (Latitude)：'));
                lng = parseFloat(prompt('請輸入經度 (Longitude)：'));
            }
            if (!lat || !lng) { showToast('❌ 欄位無效，新增取消', 'error'); return; }

            const radius = prompt('防護偵測半徑（公尺）：', '500');
            addItem('static_targets', {
                user_id: currentUser.id,
                name,
                lat,
                lng,
                alert_radius: parseInt(radius) || 500
            }, '定點目標');
        }

        function showAddEventModal() {
            const name = prompt('請輸入期間限定活動名稱：');
            if (!name) return;
            
            let lat = currentPosition ? currentPosition.lat : null;
            let lng = currentPosition ? currentPosition.lng : null;
            
            if (!lat || !lng) {
                showToast('⚠️ 未偵測到目前 GPS，請手動輸入經緯度', 'warning');
                lat = parseFloat(prompt('請輸入活動緯度：'));
                lng = parseFloat(prompt('請輸入活動經度：'));
            }
            if (!lat || !lng) { showToast('❌ 欄位無效，新增取消', 'error'); return; }

            const endDate = prompt('結束日期 (格式: YYYY-MM-DD)：', new Date(Date.now() + 7 * 86400000).toISOString().split('T')[0]);
            if (!endDate) return;

            addItem('events', {
                user_id: currentUser.id,
                name,
                lat,
                lng,
                alert_radius: 500,
                start_date: new Date().toISOString().split('T')[0],
                end_date: endDate
            }, '活動');
        }

        async function addItem(table, data, label) {
            const { error } = await supabase.from(table).insert(data);
            if (error) { showToast('❌ 新增失敗：' + error.message, 'error'); return; }
            showToast(`✅ 已成功建立${label}`, 'success');
            loadAllData();
        }

        // ==================== Tab 切換 ====================
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            if (tab === 'monitor') {
                document.querySelector('.tab-btn:nth-child(1)').classList.add('active');
                document.getElementById('monitorTab').classList.remove('hidden');
                document.getElementById('historyTab').classList.add('hidden');
                if (liveMap) setTimeout(() => liveMap.invalidateSize(), 200);
            } else {
                document.querySelector('.tab-btn:nth-child(2)').classList.add('active');
                document.getElementById('monitorTab').classList.add('hidden');
                document.getElementById('historyTab').classList.remove('hidden');
                const now = new Date();
                document.getElementById('endDate').value = now.toISOString().split('T')[0];
                document.getElementById('startDate').value = new Date(now - 7 * 86400000).toISOString().split('T')[0];
                setTimeout(initHistoryMap, 300);
            }
        }

        // ==================== GPS 實時監控 ====================
        function toggleTracking() { tracking ? stopTracking() : startTracking(); }

        function startTracking() {
            if (!navigator.geolocation) { showToast('❌ 您的裝置或瀏覽器不支援 GPS 定位', 'error'); return; }
            showToast('🔍 正在嘗試與 GPS 衛星進行連線定位...', 'info');

            navigator.geolocation.getCurrentPosition(
                pos => { handleGpsUpdate(pos.coords.latitude, pos.coords.longitude); },
                err => showToast('❌ GPS 初次定位失敗：' + err.message, 'error'),
                { enableHighAccuracy: true, timeout: 20000 }
            );

            watchId = navigator.geolocation.watchPosition(
                pos => { handleGpsUpdate(pos.coords.latitude, pos.coords.longitude); },
                err => console.error('連續監聽錯誤:', err),
                { enableHighAccuracy: true, timeout: 15000, maximumAge: 10000 }
            );

            uploadIntervalId = setInterval(() => {
                if (tracking && currentPosition) { uploadTrailPoint(); }
            }, RECORD_INTERVAL);

            tracking = true;
            document.getElementById('trackingBtn').textContent = '⏸️ 停止監控';
            document.getElementById('trackingBtn').style.background = '#e05858';
            showToast('✅ GPS 防護監控系統已成功啟動', 'success');
        }

        function stopTracking() {
            if (watchId) navigator.geolocation.clearWatch(watchId);
            if (uploadIntervalId) clearInterval(uploadIntervalId);
            watchId = null;
            uploadIntervalId = null;
            tracking = false;
            document.getElementById('trackingBtn').textContent = '▶️ 開始監控';
            document.getElementById('trackingBtn').style.background = 'var(--accent)';
            showToast('⏸️ 監控系統已安全終止停止', 'info');
        }

        function handleGpsUpdate(lat, lng) {
            currentPosition = { lat, lng };
            document.getElementById('currentLocation').textContent = `Lat: ${lat.toFixed(6)}, Lng: ${lng.toFixed(6)}`;
            
            if (liveMap) {
                if (!liveMarker) {
                    liveMarker = L.marker([lat, lng], {
                        icon: L.divIcon({
                            className: 'custom-div-icon',
                            html: "<div style='background-color:#5b9cf5;width:14px;height:14px;border-radius:50%;border:2px solid white;box-shadow:0 0 8px rgba(0,0,0,0.5);'></div>",
                            iconSize: [14, 14],
                            iconAnchor: [7, 7]
                        })
                    }).addTo(liveMap).bindPopup("🙋 我在這裡").openPopup();
                } else {
                    liveMarker.setLatLng([lat, lng]);
                }
                liveMap.panTo([lat, lng]);
            }
        }

        // ==================== 上傳點位與電子圍籬觸發判定 ====================
        async function uploadTrailPoint() {
            if (!currentUser || !currentPosition) return;
            
            // 1. 寫入 location_history
            try {
                await supabase.from('location_history').insert({
                    user_id: currentUser.id,
                    lat: currentPosition.lat,
                    lng: currentPosition.lng,
                    recorded_at: new Date().toISOString()
                });
            } catch (e) {
                console.warn('上傳軌跡失敗（可能資料表遭限制或不存在）:', e.message);
            }

            // 2. 同步更新 Profile 的最新座標
            try {
                await supabase.from('profiles').update({
                    current_lat: currentPosition.lat,
                    current_lng: currentPosition.lng,
                    last_gps_update: new Date().toISOString()
                }).eq('id', currentUser.id);
            } catch(e) { console.error(e); }

            // 3. 實時電子地理圍籬判斷（定點目標與活動）
            checkGeofencing();
        }

        function checkGeofencing() {
            if (!currentPosition) return;

            // 檢測定點目標
            cachedTargets.forEach(async (target) => {
                const distance = haversine(currentPosition.lat, currentPosition.lng, target.lat, target.lng);
                if (distance <= target.alert_radius) {
                    // 檢查冷卻時間避免重複洗通知
                    const now = new Date();
                    const lastTrigger = target.last_triggered_at ? new Date(target.last_triggered_at) : new Date(0);
                    const cooldownMs = (target.cooldown_minutes || 30) * 60 * 1000;

                    if ((now - lastTrigger) > cooldownMs) {
                        showToast(`🚨 觸發警報！進入定點範圍: ${target.name}`, 'warning');
                        
                        // 寫入日誌表 trigger_logs
                        await supabase.from('trigger_logs').insert({
                            user_id: currentUser.id,
                            type: 'STATIC_TARGET',
                            target_name: target.name,
                            distance_m: distance,
                            action_taken: 'SYSTEM_ALERT_LOGGED'
                        });

                        // 更新該定點的最後觸發時間
                        await supabase.from('static_targets').update({ last_triggered_at: now.toISOString() }).eq('id', target.id);
                        target.last_triggered_at = now.toISOString();

                        // 發送 EmailJS 郵件
                        triggerEmailNotification(target.name, distance, target.recipient_email);
                    }
                }
            });
        }

        function triggerEmailNotification(targetName, distance, overrideEmail) {
            const s = JSON.parse(localStorage.getItem('emailjs_settings') || '{}');
            const recipient = overrideEmail || s.defaultRecipient;
            
            if (!s.publicKey || !s.serviceId || !s.templateId || !recipient) return; // 沒設定好就不發

            window.emailjs.init(s.publicKey);
            window.emailjs.send(s.serviceId, s.templateId, {
                to_email: recipient,
                location_name: targetName,
                arrival_time: new Date().toLocaleString(),
                distance_m: `${Math.round(distance)} 公尺`
            }).then(() => console.log('📧 圍籬地理通知信已發送'))
              .catch(err => console.error('郵件發送失敗:', err));
        }

        // ==================== 歷史核心演算法與分析 ====================
        function haversine(lat1, lng1, lat2, lng2) {
            const R = 6371000, toRad = d => d * Math.PI / 180;
            const dLat = toRad(lat2 - lat1), dLng = toRad(lng2 - lng1);
            const a = Math.sin(dLat / 2) ** 2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng / 2) ** 2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }

        function initHistoryMap() {
            const el = document.getElementById('historyMap');
            if (!el || el.offsetHeight === 0) return;
            if (historyMap) { historyMap.invalidateSize(); return; }
            historyMap = L.map('historyMap').setView([25.033, 121.565], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(historyMap);
        }

        async function loadHistory() {
            if (!currentUser) { showToast('⚠️ 請先登入系統', 'error'); return; }
            const start = document.getElementById('startDate').value + 'T00:00:00';
            const end = document.getElementById('endDate').value + 'T23:59:59';

            const { data, error } = await supabase
                .from('location_history')
                .select('*')
                .eq('user_id', currentUser.id)
                .gte('recorded_at', start)
                .lte('recorded_at', end)
                .order('recorded_at', { ascending: true });

            if (error) { showToast('❌ 查詢失敗：' + error.message, 'error'); return; }
            if (!data || data.length === 0) { showToast('⚠️ 此時間區間尚無任何軌跡歷史紀錄', 'error'); return; }

            currentHistoryData = data;
            initHistoryMap();
            if (!historyMap) return;

            historyMap.eachLayer(layer => { if (!(layer instanceof L.TileLayer)) historyMap.removeLayer(layer); });
            const latlngs = data.map(p => [p.lat, p.lng]);
            L.polyline(latlngs, { color: '#4da6ff', weight: 4 }).addTo(historyMap);
            if (window.L.heatLayer) L.heatLayer(latlngs, { radius: 22, blur: 15 }).addTo(historyMap);

            const stops = detectStops(data);
            analyzeAndDisplay(stops, data);
            drawStopsOnMap(stops);
            drawDistanceChart(data);
            historyMap.fitBounds(L.polyline(latlngs).getBounds().pad(0.2));
            showToast(`✅ 已成功解析並載入 ${data.length} 個歷史軌跡點`, 'success');
        }

        function detectStops(points) {
            const stops = [];
            let start = 0;
            for (let i = 1; i < points.length; i++) {
                const d = haversine(points[i - 1].lat, points[i - 1].lng, points[i].lat, points[i].lng);
                const timeDiff = (new Date(points[i].recorded_at) - new Date(points[i - 1].recorded_at)) / 1000;
                if (d < 50 && timeDiff < 300 && i - start > 3) {
                    if (stops.length && start - stops[stops.length - 1].endIdx < 3) stops[stops.length - 1].endIdx = i;
                    else stops.push({ startIdx: start, endIdx: i });
                } else start = i;
            }
            return stops.map(s => ({
                start: points[s.startIdx].recorded_at,
                end: points[s.endIdx].recorded_at,
                lat: points[s.startIdx].lat,
                lng: points[s.startIdx].lng,
                duration: (new Date(points[s.endIdx].recorded_at) - new Date(points[s.startIdx].recorded_at)) / 60000
            }));
        }

        function analyzeAndDisplay(stops, points) {
            let totalDist = 0;
            for (let i = 1; i < points.length; i++) totalDist += haversine(points[i - 1].lat, points[i - 1].lng, points[i].lat, points[i].lng);
            document.getElementById('totalDistance').textContent = (totalDist / 1000).toFixed(2) + ' km';
            const totalStay = stops.reduce((a, b) => a + b.duration, 0);
            document.getElementById('totalStayTime').textContent = Math.floor(totalStay / 60) + 'h ' + Math.round(totalStay % 60) + 'm';
            document.getElementById('totalStops').textContent = stops.length;
            document.getElementById('topPlace').textContent = stops.length ? Object.entries(stops.reduce((acc, s) => { 
                const k = s.lat.toFixed(4) + ',' + s.lng.toFixed(4);
                acc[k] = (acc[k] || 0) + 1; return acc; 
            }, {})).sort((a, b) => b[1] - a[1])[0][0] : '無';
            
            document.getElementById('stayTable').innerHTML = stops.slice(0, 20).map(s =>
                `<div class="list-item"><span>⏱️ ${new Date(s.start).toLocaleTimeString()} - ${new Date(s.end).toLocaleTimeString()}</span><span><strong>${Math.round(s.duration)} 分鐘</strong></span><span style="font-size:0.65rem;color:var(--text2);">(${s.lat.toFixed(5)},${s.lng.toFixed(5)})</span></div>`
            ).join('') || '此區間無明顯停留紀錄';
        }

        function drawStopsOnMap(stops) {
            stops.forEach(s => L.circleMarker([s.lat, s.lng], { radius: 10, color: '#f59e0b', fillOpacity: 0.6 })
                .bindPopup(`⏳ 停留點: ${Math.round(s.duration)} 分鐘`).addTo(historyMap));
        }

        function drawDistanceChart(points) {
            const daily = {};
            for (let i = 1; i < points.length; i++) {
                const date = points[i].recorded_at.split('T')[0];
                daily[date] = (daily[date] || 0) + haversine(points[i - 1].lat, points[i - 1].lng, points[i].lat, points[i].lng);
            }
            const labels = Object.keys(daily).sort();
            const data = labels.map(d => (daily[d] / 1000).toFixed(2));
            if (distanceChart) distanceChart.destroy();
            const ctx = document.getElementById('distanceChart')?.getContext('2d');
            if (ctx) distanceChart = new Chart(ctx, {
                type: 'bar',
                data: { labels, datasets: [{ label: '每日移動距離 (km)', data, backgroundColor: '#4da6ff' }] },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }

        function exportCSV() {
            if (!currentHistoryData) { showToast('⚠️ 請先查詢歷史軌跡資料', 'error'); return; }
            const stops = detectStops(currentHistoryData);
            let csv = '\uFEFF時間,緯度,經度\n';
            currentHistoryData.forEach(p => csv += `${p.recorded_at},${p.lat},${p.lng}\n`);
            csv += '\n停留明細\n開始時間,結束時間,緯度,經度,停留分鐘\n';
            stops.forEach(s => csv += `${s.start},${s.end},${s.lat.toFixed(6)},${s.lng.toFixed(6)},${Math.round(s.duration)}\n`);
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = '軌跡數據報表_' + new Date().toISOString().split('T')[0] + '.csv';
            a.click();
            showToast('✅ CSV 報表檔案已成功下載', 'success');
        }

        function printReport() { window.print(); }

        // ==================== 郵件設定 ====================
        function toggleEmailSettings() { document.getElementById('emailSettingsPanel').classList.toggle('hidden'); }

        function loadEmailSettingsFromStorage() {
            const s = JSON.parse(localStorage.getItem('emailjs_settings') || '{}');
            if (s.publicKey) document.getElementById('emailjsPublicKey').value = s.publicKey;
            if (s.serviceId) document.getElementById('emailjsServiceId').value = s.serviceId;
            if (s.templateId) document.getElementById('emailjsTemplateId').value = s.templateId;
            if (s.defaultRecipient) document.getElementById('defaultRecipient').value = s.defaultRecipient;
            if (s.publicKey && window.emailjs) window.emailjs.init(s.publicKey);
        }

        function saveEmailSettings() {
            const s = {
                publicKey: document.getElementById('emailjsPublicKey').value.trim(),
                serviceId: document.getElementById('emailjsServiceId').value.trim(),
                templateId: document.getElementById('emailjsTemplateId').value.trim(),
                defaultRecipient: document.getElementById('defaultRecipient').value.trim()
            };
            localStorage.setItem('emailjs_settings', JSON.stringify(s));
            if (s.publicKey) window.emailjs.init(s.publicKey);
            showToast('💾 郵件設定服務已成功儲存', 'success');
        }

        function testEmailConfig() {
            const pk = document.getElementById('emailjsPublicKey').value.trim();
            const sid = document.getElementById('emailjsServiceId').value.trim();
            const tid = document.getElementById('emailjsTemplateId').value.trim();
            const rec = document.getElementById('defaultRecipient').value.trim();
            if (!pk || !sid || !tid || !rec) { showToast('⚠️ 請完整填寫 EmailJS 設定區塊欄位', 'error'); return; }
            window.emailjs.init(pk);
            window.emailjs.send(sid, tid, { to_email: rec, location_name: '測試地理電子圍籬', arrival_time: new Date().toLocaleString(), distance_m: '30 公尺' })
                .then(() => showToast('🚀 測試郵件已成功發送，請檢查信箱', 'success'))
                .catch(e => showToast('❌ 發送失敗：' + e.message, 'error'));
        }

        // ==================== 系統初始化 ====================
        window.onload = async function() {
            try {
                const { data, error } = await supabase.auth.getSession();
                if (error) throw error;

                document.getElementById('connectionStatus').textContent = '🟢 Supabase 資料庫連線正常';
                document.getElementById('connectionStatus').style.color = 'var(--success)';

                if (data.session?.user) {
                    currentUser = data.session.user;
                    showMainApp();
                } else {
                    document.getElementById('authPage').classList.remove('hidden');
                }
            } catch (e) {
                console.error('連線失敗:', e);
                document.getElementById('connectionStatus').textContent = '🔴 連線失敗：' + e.message;
                document.getElementById('connectionStatus').style.color = 'var(--danger)';
                document.getElementById('authPage').classList.remove('hidden');
            }
        };
    </script>
</body>
