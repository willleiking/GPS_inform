<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TribeRadar V5.0</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyACxMPE_nMWpxsNNB_fW2TplflJJSI6sOs&libraries=places&language=zh-TW"></script>

    <style>
        :root {
            --bg: #0b0c10; --surface: #151a21; --surface2: #1f2630; --border: #2ecc7130;
            --text: #95a5a6; --accent: #2ecc71; --team-color: #e74c3c; --stranger-color: #f1c40f;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:-apple-system,sans-serif; background:var(--bg); color:var(--text); padding:10px; display:flex; flex-direction:column; align-items:center; }
        .app-container { width:100%; max-width:500px; display:flex; flex-direction:column; gap:12px; }
        .card { background:var(--surface); border-radius:12px; border:1px solid var(--border); padding:16px; display:flex; flex-direction:column; gap:12px; }
        .card-title { font-size:0.95rem; font-weight:700; color:#fff; }
        .btn { padding:12px; border-radius:20px; border:none; font-weight:700; font-size:0.85rem; cursor:pointer; }
        .btn-primary { background:var(--accent); color:#000; width:100%; }
        .btn-outline { background:transparent; color:var(--accent); border:1px solid var(--accent); padding:6px 12px; font-size:0.8rem; border-radius:20px; }
        .btn-game { padding:2px 6px; font-size:0.7rem; border-radius:4px; border:none; cursor:pointer; font-weight:bold; margin-left:4px; }
        select,input,textarea { background:var(--surface2); border:1px solid rgba(255,255,255,0.1); border-radius:8px; padding:10px; color:#fff; outline:none; font-size:0.85rem; width:100%; }
        textarea { resize:none; height:60px; }
        .tab-nav { display:flex; gap:6px; background:var(--surface); border-radius:12px; padding:4px; border:1px solid var(--border); }
        .tab-btn { flex:1; padding:8px; border-radius:8px; background:transparent; color:var(--text); font-weight:700; font-size:0.7rem; text-align:center; cursor:pointer; border:none; }
        .tab-btn.active { background:var(--accent); color:#000; }
        .radar-panel { position:relative; background:#070a0e; overflow:hidden; border-radius:12px; border:1px solid var(--border); }
        .radar-outer { position:relative; width:100%; padding-bottom:100%; }
        #radarMap { position:absolute; top:0; left:0; width:100%; height:100%; z-index:1; }
        .radar-sweeper { position:absolute; top:0; left:0; width:100%; height:100%; z-index:2; pointer-events:none; border-radius:50%; background:conic-gradient(from 0deg, rgba(46,204,113,0.12) 0deg, rgba(46,204,113,0) 90deg, transparent 360deg); animation:radar-sweep 4s infinite linear; display:none; }
        @keyframes radar-sweep { from{transform:rotate(0deg);} to{transform:rotate(360deg);} }
        .chat-box { background:var(--surface2); border-radius:8px; height:140px; overflow-y:auto; padding:10px; display:flex; flex-direction:column; gap:6px; }
        .msg-line { padding:6px 10px; border-radius:6px; max-width:80%; word-break:break-all; font-size:0.8rem; }
        .msg-me { background:var(--accent); color:#000; align-self:flex-end; }
        .msg-other { background:#2c3e50; color:#fff; align-self:flex-start; }
        .msg-system { background:rgba(231,76,60,0.1); color:#e74c3c; align-self:center; text-align:center; width:100%; font-size:0.75rem; border:1px dashed rgba(231,76,60,0.3); }
        .list-row { background:var(--surface2); border-radius:8px; padding:10px; display:flex; align-items:center; justify-content:space-between; font-size:0.85rem; }
        .party-member-row { display:flex; align-items:center; justify-content:space-between; background:rgba(255,255,255,0.03); border-left:4px solid var(--team-color); padding:8px; border-radius:4px; margin-bottom:4px; font-size:0.8rem; }
        .hidden { display:none!important; }
        .toast-container { position:fixed; top:16px; left:50%; transform:translateX(-50%); z-index:9999; display:flex; flex-direction:column; gap:6px; width:90%; max-width:400px; }
        .toast { padding:12px; border-radius:8px; font-size:0.8rem; text-align:center; color:#fff; font-weight:bold; }
        .toast.success { background:#27ae60; }
        .toast.error { background:#c0392b; }
        .toast.match { background:#e67e22; }
        .grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
        .avatar-preview { width:55px; height:55px; border-radius:50%; object-fit:cover; border:2px solid var(--accent); margin:0 auto; display:block; background:#222; }
        .map-container { height:280px; border-radius:8px; overflow:hidden; border:1px solid var(--border); }
        .stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
        .stat-item { background:var(--surface2); border-radius:8px; padding:12px; text-align:center; }
        .stat-value { font-size:1.4rem; font-weight:700; color:var(--accent); }
        .stat-label { font-size:0.65rem; color:var(--text); }
        .chart-container { height:200px; }
        .input-group { display:flex; flex-direction:column; gap:4px; }
        .input-group label { font-size:0.7rem; font-weight:700; color:var(--text); text-transform:uppercase; }
        @media print { body * { visibility:hidden; } #printArea,#printArea * { visibility:visible; } #printArea { position:absolute; left:0; top:0; width:100%; } .no-print { display:none!important; } }
    </style>
</head>
<body>

    <div class="toast-container" id="toastContainer"></div>

    <!-- 登入頁面 -->
    <div class="app-container" id="authPage">
        <div class="card" style="text-align:center;">
            <h2 style="color:var(--accent)">TribeRadar V5.0</h2>
            <p id="connStatus" style="font-size:0.75rem; color:var(--accent);">正在連線...</p>
        </div>
        <div class="card">
            <input type="email" id="authEmail" placeholder="Email">
            <input type="password" id="authPassword" placeholder="密碼(6碼以上)">
            <div class="hidden" id="nickGroup"><input type="text" id="authNickname" placeholder="暱稱"></div>
            <button class="btn btn-primary" id="authActionBtn" onclick="handleAuth()">登入</button>
            <button class="btn btn-outline" id="authToggleBtn" onclick="toggleAuthMode()">切換註冊</button>
        </div>
    </div>

    <!-- 主面板 -->
    <div class="app-container hidden" id="mainApp">
        <div class="tab-nav no-print">
            <button class="tab-btn active" onclick="switchTab('radar')">雷達</button>
            <button class="tab-btn" onclick="switchTab('team')">組隊</button>
            <button class="tab-btn" onclick="switchTab('history')">歷史</button>
            <button class="tab-btn" onclick="switchTab('settings')">設定</button>
        </div>

        <div id="radarTab">
            <div class="card radar-panel"><div class="radar-outer"><div id="radarMap"></div><div class="radar-sweeper" id="sweeperEl"></div></div></div>
            <div class="card">
                <button class="btn btn-primary" id="trackBtn" onclick="toggleTracking()">啟動雷達</button>
                <button class="btn btn-outline" style="color:#e74c3c;border-color:#e74c3c;" onclick="handleLogout()">登出</button>
            </div>
        </div>

        <div id="teamTab" class="hidden">
            <div class="card" style="border:2px dashed var(--team-color);"><div class="card-title" style="color:var(--team-color);">隊伍成員</div><div id="partyMemberList"><div style="color:#888;text-align:center;">無隊伍</div></div></div>
            <div class="card"><div class="card-title">待審核請求</div><div id="pendingRequests"><div style="color:#888;text-align:center;">無請求</div></div></div>
            <div class="card" style="border:1px solid var(--team-color);"><div class="card-title" style="color:var(--team-color);">組隊公頻</div><div class="chat-box" id="partyChatBox"></div><div style="display:grid;grid-template-columns:1fr auto;gap:6px;"><input type="text" id="partyChatInput" placeholder="訊息..."><button class="btn btn-primary" style="padding:6px 12px;background:var(--team-color);" onclick="sendPartyChatMessage()">發送</button></div></div>
            <div class="card"><div class="card-title">公告欄</div><div id="teamNoticeBoard" style="max-height:140px;overflow-y:auto;"></div></div>
            <div class="card"><input type="text" id="teamTitle" placeholder="組隊名稱"><select id="teamCategory"><option>健身團</option><option>吃貨團</option><option>商務交流</option></select><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;"><button class="btn" style="background:var(--team-color);color:#fff;" onclick="changeTeamStatus(true)">開始招募</button><button class="btn" style="background:var(--surface2);color:#fff;" onclick="changeTeamStatus(false)">退出/解散</button></div><div id="myActiveTeamStatus" style="text-align:center;color:#fff;">未開啟</div></div>
        </div>

        <div id="historyTab" class="hidden">
            <div id="printArea">
                <div class="card no-print"><div style="display:flex;gap:10px;"><input type="date" id="startDate" style="flex:1;"><span>～</span><input type="date" id="endDate" style="flex:1;"></div><button class="btn btn-primary" onclick="loadHistory()">查詢軌跡</button></div>
                <div class="card"><div class="stats-grid"><div class="stat-item"><div class="stat-value" id="totalDistance">--</div><div class="stat-label">總移動距離</div></div><div class="stat-item"><div class="stat-value" id="totalStayTime">--</div><div class="stat-label">總停留時間</div></div><div class="stat-item"><div class="stat-value" id="totalStops">--</div><div class="stat-label">停留次數</div></div><div class="stat-item"><div class="stat-value" id="topPlace">--</div><div class="stat-label">最常停留點</div></div></div></div>
                <div class="card"><div class="card-title">軌跡地圖</div><div class="map-container" id="historyMap"></div></div>
                <div class="card"><div class="card-title">每日距離</div><div class="chart-container"><canvas id="distanceChart"></canvas></div></div>
                <div class="card"><div class="card-title">停留明細</div><div id="stayTable" style="max-height:200px;overflow-y:auto;"></div></div>
            </div>
            <div class="card no-print"><button class="btn btn-outline" onclick="exportCSV()">匯出CSV</button><button class="btn btn-outline" onclick="printReport()">列印報表</button></div>
        </div>

        <div id="settingsTab" class="hidden">
            <div class="card"><img id="myAvatarDisplay" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" class="avatar-preview"><input type="text" id="avatarUrlInput" placeholder="大頭貼網址" onchange="document.getElementById('myAvatarDisplay').src=this.value"><textarea id="myHasWhat" placeholder="我的資源"></textarea><textarea id="myMatchDemand" placeholder="配對需求"></textarea><button class="btn btn-primary" onclick="saveProfile()">儲存</button></div>
            <div class="card"><div id="friendContainer"></div><input type="text" id="fEmail" placeholder="好友Email"><button class="btn btn-outline" onclick="addFriend()">+綁定</button></div>
            <div class="card"><div id="targetList"></div><input type="text" id="geoSearchInput" placeholder="搜尋地點"><input type="text" id="tName" placeholder="地點名稱"><button class="btn btn-primary" onclick="addStaticTarget()">+存入</button></div>
            <div class="card"><div class="input-group"><label>EmailJS Public Key</label><input id="emailjsPublicKey"></div><div class="input-group"><label>Service ID</label><input id="emailjsServiceId"></div><div class="input-group"><label>Template ID</label><input id="emailjsTemplateId"></div><div class="input-group"><label>收件人</label><input id="defaultRecipient"></div><button class="btn btn-outline" onclick="saveEmailSettings()">儲存</button><button class="btn btn-outline" onclick="testEmailConfig()">測試</button></div>
        </div>
    </div>

    <script>
        // ==================== 唯一宣告區 ====================
        const SUPABASE_URL = 'https://hknxdvefnuxgyepuuqra.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhrbnhkdmVmbnV4Z3llcHV1cXJhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1MzM0MDAsImV4cCI6MjA5NzEwOTQwMH0.M97OwM_9CrLCrgxbyA6kQs0MLFiRDzyYlvIiGqhBGec';
        const DB = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = null, tracking = false, watchId = null, currentPosition = { lat: 25.0451, lng: 121.4525 };
        let radarMap = null, myMarker = null, radarCircle = null;
        let historyMap = null, distanceChart = null, currentHistoryData = null;
        let mapElements = [], isRegister = false;

        function showToast(msg, type) { const t = document.createElement('div'); t.className = 'toast ' + type; t.textContent = msg;
            document.getElementById('toastContainer').appendChild(t);
            setTimeout(function() { t.remove(); }, 4000); }

        function calcDistance(lat1, lon1, lat2, lon2) { const R = 6371000,
                dLat = (lat2 - lat1) * Math.PI / 180,
                dLon = (lon2 - lon1) * Math.PI / 180; const a = Math.sin(dLat / 2) ** 2 + Math.cos(lat1 * Math.PI / 180) *
                Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) ** 2; return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(
                1 - a)); }

        function switchTab(tab) { document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove(
                    'active'); });
            document.getElementById('radarTab').classList.add('hidden');
            document.getElementById('teamTab').classList.add('hidden');
            document.getElementById('historyTab').classList.add('hidden');
            document.getElementById('settingsTab').classList.add('hidden'); if (tab === 'radar') { document.querySelector(
                    '.tab-btn:nth-child(1)').classList.add('active');
                document.getElementById('radarTab').classList.remove('hidden'); } else if (tab === 'team') { document
                    .querySelector('.tab-btn:nth-child(2)').classList.add('active');
                document.getElementById('teamTab').classList.remove('hidden');
                refreshPartyWindow();
                loadPartyChatMessages();
                loadPendingRequests();
                loadTeamNoticeBoard(); } else if (tab === 'history') { document.querySelector('.tab-btn:nth-child(3)')
                    .classList.add('active');
                document.getElementById('historyTab').classList.remove('hidden'); var now = new Date();
                document.getElementById('endDate').value = now.toISOString().split('T')[0];
                document.getElementById('startDate').value = new Date(now - 7 * 86400000).toISOString().split('T')[0];
                setTimeout(initHistoryMap, 300); } else if (tab === 'settings') { document.querySelector(
                    '.tab-btn:nth-child(4)').classList.add('active');
                document.getElementById('settingsTab').classList.remove('hidden');
                loadSettingsData(); } }

        function toggleAuthMode() { isRegister = !isRegister;
            document.getElementById('nickGroup').classList.toggle('hidden', !isRegister);
            document.getElementById('authActionBtn').textContent = isRegister ? '註冊' : '登入';
            document.getElementById('authToggleBtn').textContent = isRegister ? '切換登入' : '切換註冊'; }

        async function handleAuth() { var email = document.getElementById('authEmail').value.trim(); var password = document
                .getElementById('authPassword').value; if (!email || !password) { showToast('請輸入完整', 'error'); return; } if (
                password.length < 6) { showToast('密碼至少6碼', 'error'); return; } try { if (isRegister) { var nick = document
                        .getElementById('authNickname').value.trim() || email.split('@')[0]; var result = await DB.auth.signUp(
                        { email: email, password: password, options: { data: { nickname: nick } } }); if (result.error)
                        throw result.error;
                    showToast('註冊成功！請重新登入', 'success');
                    toggleAuthMode(); } else { var result2 = await DB.auth.signInWithPassword({ email: email, password: password });
                    if (result2.error) throw result2.error;
                    currentUser = result2.data.user; await DB.from('profiles').upsert({ id: currentUser.id, email: email,
                        is_online: true }, { onConflict: 'id' });
                    enterMainApp(); } } catch (e) { showToast(e.message, 'error'); } }

        async function handleLogout() { if (tracking) stopTracking(); if (currentUser) { await DB.from('profiles').update({
                is_online: false }).eq('id', currentUser.id); } await DB.auth.signOut();
            currentUser = null;
            document.getElementById('mainApp').classList.add('hidden');
            document.getElementById('authPage').classList.remove('hidden');
            showToast('已登出', 'info'); }

        async function enterMainApp() { document.getElementById('authPage').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            loadProfileData();
            initRadarMap(currentPosition.lat, currentPosition.lng);
            initGoogleAutocomplete();
            setInterval(function() { if (tracking && currentUser) { refreshRadarMarkers();
                    uploadTrailPoint(); } }, 30000); }

        function initRadarMap(lat, lng) { if (radarMap) { radarMap.setView([lat, lng], 14);
                myMarker.setLatLng([lat, lng]);
                radarCircle.setLatLng([lat, lng]); return; }
            radarMap = L.map('radarMap', { zoomControl: false, attributionControl: false }).setView([lat, lng], 14);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(radarMap);
            myMarker = L.marker([lat, lng], { icon: L.divIcon({ html: '<div style="background:#fff;width:14px;height:14px;border-radius:50%;border:3px solid #2ecc71;box-shadow:0 0 12px #2ecc71;"></div>',
                    iconSize: [14, 14] }) }).addTo(radarMap);
            radarCircle = L.circle([lat, lng], { radius: 1500, color: '#2ecc71', weight: 1, fillOpacity: 0.02 }).addTo(
            radarMap); }

        function toggleTracking() { if (tracking) { stopTracking(); return; } if (!navigator.geolocation) { showToast(
                    '不支援GPS', 'error'); return; }
            showToast('搜尋GPS...', 'info');
            navigator.geolocation.getCurrentPosition(function(pos) { currentPosition = { lat: pos.coords.latitude, lng: pos
                        .coords.longitude };
                initRadarMap(currentPosition.lat, currentPosition.lng);
                uploadTrailPoint(); }, function(e) { showToast('GPS錯誤', 'error'); }, { enableHighAccuracy: true,
                timeout: 20000 });
            watchId = navigator.geolocation.watchPosition(function(pos) { currentPosition = { lat: pos.coords.latitude,
                    lng: pos.coords.longitude };
                initRadarMap(currentPosition.lat, currentPosition.lng); if (currentUser) DB.from('profiles').update({
                    current_lat: currentPosition.lat, current_lng: currentPosition.lng, is_online: true }).eq('id',
                    currentUser.id);
                refreshRadarMarkers();
                uploadTrailPoint(); }, function() {}, { enableHighAccuracy: true, timeout: 15000, maximumAge: 10000 });
            tracking = true;
            document.getElementById('trackBtn').textContent = '停止雷達';
            document.getElementById('sweeperEl').style.display = 'block'; }

        function stopTracking() { if (watchId) navigator.geolocation.clearWatch(watchId);
            tracking = false;
            document.getElementById('trackBtn').textContent = '啟動雷達';
            document.getElementById('sweeperEl').style.display = 'none'; }

        async function uploadTrailPoint() { if (!currentUser || !currentPosition) return; try { await DB.from(
                    'location_history').insert({ user_id: currentUser.id, lat: currentPosition.lat, lng: currentPosition
                    .lng, recorded_at: new Date().toISOString() }); } catch (e) {} }

        async function refreshRadarMarkers() { if (!radarMap || !tracking || !currentUser) return;
            mapElements.forEach(function(el) { radarMap.removeLayer(el); });
            mapElements = []; var result = await DB.from('profiles').select('*').not('current_lat', 'is', null).eq(
                'is_shielded', false); if (!result.data) return;
            result.data.forEach(function(u) { if (u.id === currentUser.id) return; var dist = calcDistance(currentPosition
                    .lat, currentPosition.lng, u.current_lat, u.current_lng); if (dist > 1500) return; var color = u
                    .is_teaming ? '#e74c3c' : '#f1c40f'; var html = '<div style="background:' + color +
                    ';width:14px;height:14px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 10px ' + color +
                    ';"></div>'; var marker = L.marker([u.current_lat, u.current_lng], { icon: L.divIcon({ html: html,
                        iconSize: [16, 16] }) }).addTo(radarMap);
                marker.bindPopup('<div style="color:#333;text-align:center;"><b>' + u.nickname + '</b><br>' + (u.is_teaming ?
                    '招募中<br><button onclick="requestJoinTeam(\'' + u.id + '\',\'' + u.nickname +
                    '\')" style="background:#e74c3c;color:#fff;padding:4px 8px;border:none;border-radius:4px;cursor:pointer;">申請加入</button>' :
                    '散人') + '</div>');
                mapElements.push(marker); }); }

        async function changeTeamStatus(enable) { var title = document.getElementById('teamTitle').value.trim(); if (enable &&
                !title) { showToast('請輸入組隊名稱', 'error'); return; } if (enable) { await DB.from('profiles').update({
                is_teaming: true, team_name: title, team_category: document.getElementById('teamCategory').value,
                current_team_id: currentUser.id }).eq('id', currentUser.id);
            document.getElementById('myActiveTeamStatus').textContent = '招募中: ' + title;
                showToast('組隊已建立！', 'success'); } else { var my = await DB.from('profiles').select('current_team_id').eq(
                    'id', currentUser.id).single(); if (my.data && my.data.current_team_id === currentUser.id) { await DB.from(
                        'profiles').update({ current_team_id: null, is_teaming: false, team_name: null }).eq(
                    'current_team_id', currentUser.id);
                showToast('隊伍已解散', 'info'); } else { await DB.from('profiles').update({ current_team_id: null }).eq('id',
                    currentUser.id);
                showToast('已退出隊伍', 'info'); }
            document.getElementById('myActiveTeamStatus').textContent = '未開啟'; }
            refreshPartyWindow(); }

        async function requestJoinTeam(leaderId, leaderName) { if (!currentUser) return; var exist = await DB.from(
                'team_requests').select('*').eq('team_leader_id', leaderId).eq('applicant_id', currentUser.id).single(); if (
                exist.data) { showToast('已送出申請', 'error'); return; } await DB.from('team_requests').insert({
                team_leader_id: leaderId, applicant_id: currentUser.id, status: 'pending' });
            showToast('已向 ' + leaderName + ' 送出申請！', 'match'); }

        async function loadPendingRequests() { if (!currentUser) return; var reqs = await DB.from('team_requests').select(
                'id,applicant_id').eq('team_leader_id', currentUser.id).eq('status', 'pending'); var container = document
                .getElementById('pendingRequests'); if (!reqs.data || !reqs.data.length) { container.innerHTML =
                    '<div style="color:#888;text-align:center;">無請求</div>'; return; } var profiles = await DB.from(
                'profiles').select('id,nickname');
            container.innerHTML = reqs.data.map(function(r) { var app = (profiles.data || []).find(function(p) { return p
                        .id === r.applicant_id; }); return '<div class="list-row"><span>' + (app ? app.nickname :
                        '未知') +
                    '</span><div><button class="btn-game" style="background:#27ae60;color:#fff;" onclick="handleTeamRequest(\'' +
                    r.id + '\',\'approved\')">同意</button><button class="btn-game" style="background:#c0392b;color:#fff;" onclick="handleTeamRequest(\'' +
                    r.id + '\',\'rejected\')">拒絕</button></div></div>'; }).join(''); }

        async function handleTeamRequest(requestId, status) { var req = await DB.from('team_requests').select('*').eq('id',
                requestId).single(); if (!req.data) return; await DB.from('team_requests').update({ status: status }).eq('id',
                requestId); if (status === 'approved') { await DB.from('profiles').update({ current_team_id: req.data
                    .team_leader_id }).eq('id', req.data.applicant_id);
                showToast('已同意加入！', 'success'); } else { showToast('已拒絕', 'info'); }
            loadPendingRequests();
            refreshPartyWindow(); }

        async function refreshPartyWindow() { if (!currentUser) return; var my = await DB.from('profiles').select(
                'current_team_id').eq('id', currentUser.id).single(); var tId = my.data ? my.data.current_team_id : null; var
                container = document.getElementById('partyMemberList'); if (!tId) { container.innerHTML =
                    '<div style="color:#888;text-align:center;">無隊伍</div>'; return; } var members = await DB.from('profiles')
                .select('id,nickname,is_online').eq('current_team_id', tId); if (!members.data || !members.data.length) { container
                    .innerHTML = '<div style="color:#888;text-align:center;">無隊員</div>'; return; } var isMeLeader = (tId ===
                currentUser.id);
            container.innerHTML = members.data.map(function(m) { return '<div class="party-member-row"><span>' + (m.is_online ?
                        '🟢' : '⚪') + ' ' + (m.id === tId ? '[隊長]' : '[隊員]') + ' ' + m.nickname + (m.id ===
                    currentUser.id ? '(我)' : '') + '</span>' + (isMeLeader && m.id !== currentUser.id ?
                    '<button class="btn-game" style="background:#c0392b;color:#fff;" onclick="kickMember(\'' + m.id +
                    '\')">踢除</button>' : '') + '</div>'; }).join(''); }

        async function kickMember(userId) { await DB.from('profiles').update({ current_team_id: null }).eq('id', userId);
            showToast('已踢除', 'info');
            refreshPartyWindow(); }

        async function loadPartyChatMessages() { if (!currentUser) return; var my = await DB.from('profiles').select(
                'current_team_id').eq('id', currentUser.id).single(); var tId = my.data ? my.data.current_team_id : null; var
                box = document.getElementById('partyChatBox'); if (!tId) { box.innerHTML =
                    '<div class="msg-line msg-system">請先加入組隊</div>'; return; } var msgs = await DB.from('friend_messages')
                .select('*').eq('receiver_id', tId).order('created_at', { ascending: true }).limit(50); var profiles =
            await DB.from('profiles').select('id,nickname');
            box.innerHTML = (msgs.data || []).map(function(m) { var sender = (profiles.data || []).find(function(p) { return p
                        .id === m.sender_id; }); return '<div class="msg-line ' + (m.sender_id === currentUser.id ?
                        'msg-me' : 'msg-other') + '"><b>' + (sender ? sender.nickname : '未知') + ':</b> ' + m.message +
                    '</div>'; }).join('') || '<div class="msg-line msg-system">尚無訊息</div>';
            box.scrollTop = box.scrollHeight; }

        async function sendPartyChatMessage() { var text = document.getElementById('partyChatInput').value.trim(); if (!text)
                return; var my = await DB.from('profiles').select('current_team_id').eq('id', currentUser.id).single(); var
                tId = my.data ? my.data.current_team_id : null; if (!tId) { showToast('不屬於任何隊伍', 'error'); return; }
            await DB.from('friend_messages').insert({ sender_id: currentUser.id, receiver_id: tId, message: text });
            document.getElementById('partyChatInput').value = '';
            loadPartyChatMessages(); }

        async function loadTeamNoticeBoard() { var teams = await DB.from('profiles').select('*').eq('is_teaming', true); var
                container = document.getElementById('teamNoticeBoard'); if (!teams.data || !teams.data.length) { container
                    .innerHTML = '<div style="color:#888;text-align:center;">附近無組隊</div>'; return; }
            container.innerHTML = teams.data.map(function(t) { var dist = calcDistance(currentPosition.lat, currentPosition
                    .lng, t.current_lat || 25, t.current_lng || 121); return '<div class="list-row"><span>' + t.team_name +
                    ' (' + (dist / 1000).toFixed(1) +
                    'km)</span><button class="btn btn-outline" style="padding:4px 8px;" onclick="requestJoinTeam(\'' + t
                    .id + '\',\'' + t.nickname + '\')">申請</button></div>'; }).join(''); }

        async function loadProfileData() { var result = await DB.from('profiles').select('*').eq('id', currentUser.id)
                .single(); if (!result.data) return;
            document.getElementById('avatarUrlInput').value = result.data.avatar_url || '';
            document.getElementById('myAvatarDisplay').src = result.data.avatar_url ||
                'https://cdn-icons-png.flaticon.com/512/3135/3135715.png';
            document.getElementById('myHasWhat').value = result.data.has_what || '';
            document.getElementById('myMatchDemand').value = result.data.need_what || ''; if (result.data.is_teaming) document
                .getElementById('myActiveTeamStatus').textContent = '招募中: ' + result.data.team_name; }

        async function saveProfile() { await DB.from('profiles').update({ avatar_url: document.getElementById('avatarUrlInput')
                    .value, has_what: document.getElementById('myHasWhat').value, need_what: document.getElementById(
                    'myMatchDemand').value }).eq('id', currentUser.id);
            showToast('已儲存', 'success'); }

        async function addFriend() { var email = document.getElementById('fEmail').value.trim(); if (!email) return; await DB
                .from('friendships').insert({ user_id: currentUser.id, friend_email: email, friend_nickname: email });
            document.getElementById('fEmail').value = '';
            showToast('已綁定', 'success');
            loadSettingsData(); }

        async function addStaticTarget() { var name = document.getElementById('tName').value.trim(); if (!name) return; await DB
                .from('static_targets').insert({ user_id: currentUser.id, name: name, lat: currentPosition.lat, lng: currentPosition
                    .lng });
            showToast('已存入', 'success');
            loadSettingsData(); }

        async function loadSettingsData() { var friends = await DB.from('friendships').select('*').eq('user_id', currentUser
                .id);
            document.getElementById('friendContainer').innerHTML = (friends.data || []).map(function(f) { return '<div class="list-row"><span>' +
                    f.friend_nickname +
                    '</span><button class="btn-game" style="background:#c0392b;color:#fff;" onclick="DB.from(\'friendships\').delete().eq(\'id\',\'' +
                    f.id + '\').then(function(){loadSettingsData();})">✕</button></div>'; }).join('') ||
                '<div style="color:#888;">無好友</div>'; var targets = await DB.from('static_targets').select('*').eq('user_id',
                    currentUser.id);
            document.getElementById('targetList').innerHTML = (targets.data || []).map(function(t) { return '<div class="list-row"><span>' +
                    t.name +
                    '</span><button class="btn-game" style="background:#c0392b;color:#fff;" onclick="DB.from(\'static_targets\').delete().eq(\'id\',\'' +
                    t.id + '\').then(function(){loadSettingsData();})">✕</button></div>'; }).join('') ||
                '<div style="color:#888;">無定點</div>';
            loadEmailSettingsFromStorage(); }

        function saveEmailSettings() { var s = { publicKey: document.getElementById('emailjsPublicKey').value, serviceId: document
                    .getElementById('emailjsServiceId').value, templateId: document.getElementById('emailjsTemplateId').value,
                defaultRecipient: document.getElementById('defaultRecipient').value };
            localStorage.setItem('emailjs_settings', JSON.stringify(s)); if (s.publicKey && window.emailjs) window.emailjs
                .init(s.publicKey);
            showToast('已儲存', 'success'); }

        function loadEmailSettingsFromStorage() { var s = JSON.parse(localStorage.getItem('emailjs_settings') || '{}'); if (s
                .publicKey) document.getElementById('emailjsPublicKey').value = s.publicKey; if (s.serviceId) document
                .getElementById('emailjsServiceId').value = s.serviceId; if (s.templateId) document.getElementById(
                'emailjsTemplateId').value = s.templateId; if (s.defaultRecipient) document.getElementById('defaultRecipient')
                .value = s.defaultRecipient; }

        function testEmailConfig() { var pk = document.getElementById('emailjsPublicKey').value; var sid = document.getElementById(
                'emailjsServiceId').value; var tid = document.getElementById('emailjsTemplateId').value; var rec = document
                .getElementById('defaultRecipient').value; if (!pk || !sid || !tid || !rec) { showToast('請完整填寫', 'error'); return; }
            window.emailjs.init(pk);
            window.emailjs.send(sid, tid, { to_email: rec, location_name: '測試', distance_m: '50m' }).then(function() { showToast(
                '已發送', 'success'); }).catch(function(e) { showToast(e.message, 'error'); }); }

        function initHistoryMap() { var el = document.getElementById('historyMap'); if (!el || el.offsetHeight === 0) return; if (
                historyMap) { historyMap.invalidateSize(); return; }
            historyMap = L.map('historyMap').setView([25.033, 121.565], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(historyMap); }

        async function loadHistory() { if (!currentUser) return; var start = document.getElementById('startDate').value +
                'T00:00:00'; var end = document.getElementById('endDate').value + 'T23:59:59'; var result = await DB.from(
                'location_history').select('*').eq('user_id', currentUser.id).gte('recorded_at', start).lte('recorded_at',
                end).order('recorded_at'); if (!result.data || !result.data.length) { showToast('無資料', 'error'); return; }
            currentHistoryData = result.data;
            initHistoryMap(); if (!historyMap) return;
            historyMap.eachLayer(function(l) { if (!(l instanceof L.TileLayer)) historyMap.removeLayer(l); }); var latlngs = result
                .data.map(function(p) { return [p.lat, p.lng]; });
            L.polyline(latlngs, { color: '#4da6ff', weight: 3 }).addTo(historyMap); if (L.heatLayer) L.heatLayer(latlngs, {
                radius: 20, blur: 15 }).addTo(historyMap); var stops = detectStops(result.data);
            analyzeAndDisplay(stops, result.data);
            stops.forEach(function(s) { L.circleMarker([s.lat, s.lng], { radius: 8, color: '#f59e0b', fillOpacity: 0.6 })
                .bindPopup('停留 ' + Math.round(s.duration) + ' 分鐘').addTo(historyMap); });
            drawDistanceChart(result.data);
            historyMap.fitBounds(L.polyline(latlngs).getBounds().pad(0.2));
            showToast('已載入 ' + result.data.length + ' 點', 'success'); }

        function detectStops(points) { var stops = []; var start = 0; for (var i = 1; i < points.length; i++) { var d = calcDistance(
                    points[i - 1].lat, points[i - 1].lng, points[i].lat, points[i].lng); var t = (new Date(points[i]
                    .recorded_at) - new Date(points[i - 1].recorded_at)) / 1000; if (d < 50 && t < 300 && i - start > 3) { if (
                    stops.length && start - stops[stops.length - 1].endIdx < 3) stops[stops.length - 1].endIdx = i; else stops
                    .push({ startIdx: start, endIdx: i }); } else start = i; } return stops.map(function(s) { return { start: points[
                        s.startIdx].recorded_at, end: points[s.endIdx].recorded_at, lat: points[s.startIdx].lat, lng: points[
                        s.startIdx].lng, duration: (new Date(points[s.endIdx].recorded_at) - new Date(points[s.startIdx]
                        .recorded_at)) / 60000 }; }); }

        function analyzeAndDisplay(stops, points) { var d = 0; for (var i = 1; i < points.length; i++) d += calcDistance(points[
                i - 1].lat, points[i - 1].lng, points[i].lat, points[i].lng);
            document.getElementById('totalDistance').textContent = (d / 1000).toFixed(2) + ' km'; var stay = stops.reduce(
                function(a, b) { return a + b.duration; }, 0);
            document.getElementById('totalStayTime').textContent = Math.floor(stay / 60) + 'h ' + Math.round(stay % 60) + 'm';
            document.getElementById('totalStops').textContent = stops.length;
            document.getElementById('topPlace').textContent = stops.length ? Object.entries(stops.reduce(function(acc, s) { var k =
                    s.lat.toFixed(4) + ',' + s.lng.toFixed(4);
                acc[k] = (acc[k] || 0) + 1; return acc; }, {})).sort(function(a, b) { return b[1] - a[1]; })[0][0] : '無';
            document.getElementById('stayTable').innerHTML = stops.slice(0, 20).map(function(s) { return '<div class="list-row"><span>' +
                    new Date(s.start).toLocaleTimeString() + '-' + new Date(s.end).toLocaleTimeString() + '</span><span>' +
                    Math.round(s.duration) + '分鐘</span></div>'; }).join('') || '無'; }

        function drawDistanceChart(points) { var daily = {}; for (var i = 1; i < points.length; i++) { var date = points[i]
                    .recorded_at.split('T')[0];
                daily[date] = (daily[date] || 0) + calcDistance(points[i - 1].lat, points[i - 1].lng, points[i].lat, points[i]
                    .lng); } var labels = Object.keys(daily).sort(); var data = labels.map(function(d) { return (daily[d] /
                    1000).toFixed(2); }); if (distanceChart) distanceChart.destroy(); var ctx = document.getElementById(
                    'distanceChart'); if (ctx) distanceChart = new Chart(ctx, { type: 'bar', data: { labels: labels,
                    datasets: [{ label: '每日距離(km)', data: data, backgroundColor: '#4da6ff' }] }, options: { responsive: true,
                    maintainAspectRatio: false } }); }

        function exportCSV() { if (!currentHistoryData) return; var stops = detectStops(currentHistoryData); var csv =
                '\uFEFF時間,緯度,經度\n';
            currentHistoryData.forEach(function(p) { csv += p.recorded_at + ',' + p.lat + ',' + p.lng + '\n'; });
            csv += '\n停留明細\n';
            stops.forEach(function(s) { csv += s.start + ',' + s.end + ',' + s.lat.toFixed(6) + ',' + s.lng.toFixed(6) + ',' +
                    Math.round(s.duration) + '\n'; }); var a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
            a.download = '軌跡_' + new Date().toISOString().split('T')[0] + '.csv';
            a.click(); }

        function printReport() { window.print(); }

        function initGoogleAutocomplete() { var input = document.getElementById('geoSearchInput'); if (typeof google ===
                'undefined' || !input) return; var autocomplete = new google.maps.places.Autocomplete(input, {
                componentRestrictions: { country: 'tw' } });
            autocomplete.addListener('place_changed', function() { var place = autocomplete.getPlace(); if (!place.geometry)
                    return;
                document.getElementById('tName').value = place.name;
                currentPosition = { lat: place.geometry.location.lat(), lng: place.geometry.location.lng() }; if (radarMap)
                    radarMap.setView([currentPosition.lat, currentPosition.lng], 16); }); }

        // ==================== 初始化 ====================
        window.onload = async function() {
            var statusEl = document.getElementById('connStatus');
            try {
                var sessionResult = await DB.auth.getSession();
                if (sessionResult.error) {
                    statusEl.textContent = '連線失敗：' + sessionResult.error.message;
                    statusEl.style.color = '#e74c3c';
                    return;
                }
                try { await DB.rpc('increment_page_view'); } catch (e) {}
                if (sessionResult.data && sessionResult.data.session && sessionResult.data.session.user) {
                    currentUser = sessionResult.data.session.user;
                    statusEl.textContent = '已連線，進入中...';
                    enterMainApp();
                } else {
                    statusEl.textContent = '主機就緒，請登入';
                    statusEl.style.color = '#2ecc71';
                }
            } catch (e) {
                statusEl.textContent = '初始化失敗：' + e.message;
                statusEl.style.color = '#e74c3c';
            }
        };
    </script>
</body>
</html>
