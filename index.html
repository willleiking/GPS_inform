<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover, maximum-scale=1.0">
    <title>🟢 TribeRadar 終極商務引力雷達</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root {
            --bg: #0b0c10;
            --surface: #151a21;
            --surface2: #1f2630;
            --border: #2ecc7130;
            --text: #95a5a6;
            --accent: #2ecc71; 
            --blue: #3498db;
            --yellow: #f1c40f;
            --danger: #e74c3c;
            --radius: 12px;
            --radius-sm: 8px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang TC', sans-serif;
            background: var(--bg); color: var(--text); padding: 10px; display: flex; flex-direction: column; align-items: center;
        }
        .app-container { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 12px; }
        .card {
            background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border);
            padding: 16px; display: flex; flex-direction: column; gap: 12px;
        }
        .card-title { font-size: 0.9rem; font-weight: 700; color: #fff; display: flex; align-items: center; gap: 6px; }
        
        .btn {
            padding: 12px; border-radius: 20px; border: none; font-weight: 700; font-size: 0.85rem;
            cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 6px; transition: all 0.2s;
        }
        .btn-primary { background: var(--accent); color: #000; width: 100%; }
        .btn-outline { background: transparent; color: var(--accent); border: 1px solid var(--accent); border-radius: 20px; padding: 6px 12px; font-size: 0.8rem; }
        .btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); border-radius: 50%; width: 28px; height: 28px; padding: 0; display: inline-flex; align-items: center; justify-content: center; }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .stat-box { background: var(--surface2); padding: 12px; border-radius: var(--radius-sm); text-align: center; }
        .stat-val { font-size: 1.2rem; font-weight: bold; color: var(--accent); margin-bottom: 4px; }
        .stat-lbl { font-size: 0.7rem; color: #7f8c8d; }

        select, input, textarea { background: var(--surface2); border: 1px solid rgba(255,255,255,0.1); border-radius: var(--radius-sm); padding: 10px; color: #fff; outline: none; font-family: inherit; font-size: 0.85rem; width: 100%; }

        /* 🟢 雷達控制核心 */
        .radar-panel { display: flex; flex-direction: column; align-items: center; background: #070a0e; padding: 10px; }
        .radar-outer {
            position: relative; border: 4px solid var(--accent); border-radius: 50%; width: 100%; padding-bottom: 100%;
            overflow: hidden; box-shadow: inset 0 0 30px rgba(0,0,0,1), 0 0 15px rgba(46,204,113,0.3);
        }
        #radarMap { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .radar-sweeper {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 999; pointer-events: none; border-radius: 50%;
            background: conic-gradient(from 0deg, rgba(46,204,113,0.25) 0deg, rgba(46,204,113,0) 120deg, transparent 360deg);
            animation: radar-sweep 4s infinite linear;
        }
        @keyframes radar-sweep { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        #historyMap { width: 100%; height: 220px; border-radius: var(--radius-sm); margin-top: 5px; }
        .list-row { background: var(--surface2); border-radius: var(--radius-sm); padding: 12px; display: flex; align-items: center; justify-content: space-between; font-size: 0.85rem; }
        .filter-group { display: flex; flex-wrap: wrap; gap: 8px; font-size: 0.75rem; margin-top: 4px; }
        .filter-label { display: flex; align-items: center; gap: 4px; color: #fff; cursor: pointer; }
        .filter-label input { width: auto; margin: 0; }

        .hidden { display: none !important; }
        .toast-container { position: fixed; top: 16px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 6px; width: 90%; max-width: 400px; }
        .toast { padding: 12px; border-radius: 8px; font-size: 0.8rem; text-align: center; color: #fff; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .toast.error { background: #c0392b; }
        .toast.success { background: #27ae60; }
        .toast.match { background: #9b59b6; animation: pulse 1s infinite alternate; }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.03); } }
    </style>
</head>
<body>

    <div class="toast-container" id="toastContainer"></div>

    <div class="app-container" id="authPage">
        <div class="card" style="text-align:center;">
            <h2 style="color:var(--accent)">🟢 TribeRadar 引力聚落雷達</h2>
            <p style="font-size:0.75rem; color:var(--accent);" id="connStatus">探索主機連線中...</p>
        </div>
        <div class="card">
            <input type="email" id="authEmail" placeholder="EMAIL">
            <input type="password" id="authPassword" placeholder="密碼">
            <div class="hidden" id="nickGroup"><input type="text" id="authNickname" placeholder="探索暱稱"></div>
            <button class="btn btn-primary" id="authActionBtn" onclick="handleAuth()">進入同好網格</button>
            <button class="btn btn-outline" id="authToggleBtn" onclick="toggleAuthMode()">初次探索？切換註冊</button>
        </div>
    </div>

    <div class="app-container hidden" id="mainApp">
        
        <div class="card radar-panel">
            <div class="radar-outer">
                <div id="radarMap"></div>
                <div class="radar-sweeper" id="sweeperEl"></div>
            </div>
            
            <div style="width:100%; margin-top:10px; display:flex; flex-direction:column; gap:6px;">
                <select id="radarCategory" onchange="refreshRadarMarkers()">
                    <option value="all">🔍 全類別同好</option>
                    <option value="吃貨團">🍖 吃貨聚落團</option>
                    <option value="健身團">💪 鐵血健身團</option>
                    <option value="商務資源">💼 商業產權合作</option>
                </select>
                <div class="filter-group">
                    <label class="filter-label"><input type="checkbox" id="showTeam" checked onchange="refreshRadarMarkers()"> 組員(藍)</label>
                    <label class="filter-label"><input type="checkbox" id="showStranger" checked onchange="refreshRadarMarkers()"> 陌生人(黃)</label>
                    <label class="filter-label"><input type="checkbox" id="showStatic" checked onchange="refreshRadarMarkers()"> 定點(綠)</label>
                    <label class="filter-label"><input type="checkbox" id="showEvent" checked onchange="refreshRadarMarkers()"> 活動(紅)</label>
                </div>
            </div>
        </div>

        <div class="card">
            <div style="display:flex; gap:8px;">
                <button class="btn btn-primary" id="trackBtn" onclick="toggleTracking()">▶️ 啟動雷達實時掃描</button>
                <button class="btn btn-outline" onclick="triggerGroupWave()" style="color:var(--blue); border-color:var(--blue)">📡 發射揪團波</button>
                <button class="btn btn-outline" onclick="handleLogout()" style="color:var(--danger); border-color:var(--danger)">登出</button>
            </div>
        </div>

        <div class="card">
            <div class="card-title">👤 我的引力特質與適配設定</div>
            <select id="myCategory">
                <option value="吃貨團">🍖 吃貨聚落團</option>
                <option value="健身團">💪 鐵血健身團</option>
                <option value="商務資源">💼 商業產權合作</option>
            </select>
            <textarea id="myNeed" placeholder="🔍 我的資源需求（例如：想找對接工廠、尋找健身夥伴）" rows="2"></textarea>
            
            <div style="background:rgba(255,255,255,0.02); padding:10px; border-radius:var(--radius-sm); display:flex; flex-direction:column; gap:8px;">
                <div style="font-size:0.75rem; color:var(--accent); font-weight:bold;">🧲 我的四大資源引力（自介配置）</div>
                <input type="text" id="myHas" placeholder="1. 我擁有什麼核心資源？">
                <input type="text" id="myCanHelp" placeholder="2. 我可以幫到同好什麼？">
                <input type="text" id="myCanExpose" placeholder="3. 我可以如何幫你曝光？">
                <input type="text" id="myCanConnect" placeholder="4. 我可以幫你串聯什麼資源？">
            </div>
            <button class="btn btn-outline" onclick="saveProfile()">💾 儲存並更新引力設定</button>
        </div>

        <div class="card">
            <div class="card-title">📍 基地定點與限定活動部署</div>
            <div id="targetList" style="display:flex; flex-direction:column; gap:6px;"></div>
            <div style="display:grid; grid-template-columns: 1fr 1fr auto; gap:6px;">
                <input type="text" id="tName" placeholder="部署名稱">
                <select id="deployType">
                    <option value="static">🟢 建立固定點</option>
                    <option value="event">🔴 部署揪團活動</option>
                </select>
                <button class="btn btn-outline" onclick="deployTarget()">+ 部署</button>
            </div>
        </div>

        <div class="card">
            <div class="card-title">📊 數據摘要與歷史軌跡</div>
            <div style="display:flex; align-items:center; gap:6px;">
                <select id="dateStart"><option value="2026-06-10">2026/06/10</option><option value="2026-06-15">2026/06/15</option></select>
                <span>～</span>
                <select id="dateEnd"><option value="2026-06-25">2026/06/25</option></select>
                <button class="btn btn-outline" onclick="queryHistoryLogs()">查詢</button>
            </div>
            <div class="grid-2">
                <div class="stat-box"><div class="stat-val" id="statDistance">--</div><div class="stat-lbl">總移動距離</div></div>
                <div class="stat-box"><div class="stat-val" id="statTopPlace">--</div><div class="stat-lbl">常出沒核心點</div></div>
            </div>
            <div id="historyMap"></div>
        </div>
    </div>

    <script>
        window.SUPABASE_URL = 'https://hknxdvefnuxgyepuuqra.supabase.co';
        window.SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhrbnhkdmVmbnV4Z3llcHV1cXJhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1MzM0MDAsImV4cCI6MjA5NzEwOTQwMH0.M97OwM_9CrLCrgxbyA6kQs0MLFiRDzyYlvIiGqhBGec';
        if (!window.dbClient) window.dbClient = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_KEY);

        let currentUser = null, tracking = false, watchId = null, currentPosition = { lat: 25.0451, lng: 121.4525 };
        let radarMap = null, myMarker = null, radarCircle = null;
        let historyMap = null, historyPolyline = null;
        let liveMarkers = [], historyMarkers = [];
        let isRegister = false;

        function showToast(msg, type='info') {
            const t = document.createElement('div'); t.className = `toast ${type}`; t.innerHTML = msg;
            document.getElementById('toastContainer').appendChild(t);
            setTimeout(() => t.remove(), 4500);
        }

        function toggleAuthMode() {
            isRegister = !isRegister;
            document.getElementById('nickGroup').classList.toggle('hidden', !isRegister);
            document.getElementById('authActionBtn').textContent = isRegister ? '建立新角色' : '進入同好網格';
        }

        function calcDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const φ1 = lat1 * Math.PI/180, φ2 = lat2 * Math.PI/180;
            const Δφ = (lat2-lat1) * Math.PI/180, Δλ = (lon2-lon1) * Math.PI/180;
            return R * 2 * Math.atan2(Math.sqrt(Math.sin(Δφ/2)**2 + Math.cos(φ1)*Math.cos(φ2)*Math.sin(Δλ/2)**2), Math.sqrt(1-(Math.sin(Δφ/2)**2 + Math.cos(φ1)*Math.cos(φ2)*Math.sin(Δλ/2)**2)));
        }

        async function handleAuth() {
            const email = document.getElementById('authEmail').value.trim();
            const password = document.getElementById('authPassword').value;
            try {
                if(isRegister) {
                    const nick = document.getElementById('authNickname').value.trim() || '新探險家';
                    const { data, error } = await window.dbClient.auth.signUp({ email, password, options: { data: { nickname: nick } } });
                    if(error) throw error;
                    if(data.user) await window.dbClient.from('profiles').insert({ id: data.user.id, email, nickname: nick, category: '全類別' });
                    showToast('🎉 註冊成功，請登入！', 'success'); toggleAuthMode();
                } else {
                    const { data, error } = await window.dbClient.auth.signInWithPassword({ email, password });
                    if(error) throw error;
                    currentUser = data.user; enterMainApp();
                }
            } catch(e) { showToast(e.message, 'error'); }
        }

        function initRadarMap(lat, lng) {
            if (radarMap) { radarMap.setView([lat, lng], 15); myMarker.setLatLng([lat, lng]); radarCircle.setLatLng([lat, lng]); return; }
            radarMap = L.map('radarMap', { zoomControl: false, attributionControl: false }).setView([lat, lng], 15);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(radarMap);
            myMarker = L.marker([lat, lng], { icon: L.divIcon({ html: `<div style="background:#fff; width:14px; height:14px; border-radius:50%; border:3px solid var(--accent); box-shadow:0 0 12px var(--accent);"></div>`, iconSize:[14,14], iconAnchor:[7,7] }) }).addTo(radarMap).bindPopup("<b>我的核心錨點</b>");
            radarCircle = L.circle([lat, lng], { radius: 500, color: 'var(--accent)', weight: 1, fillColor: 'var(--accent)', fillOpacity: 0.02 }).addTo(radarMap);
        }

        async function loadProfileData() {
            const { data } = await window.dbClient.from('profiles').select('*').eq('id', currentUser.id).single();
            if(data) {
                document.getElementById('myCategory').value = data.category || '吃貨團';
                document.getElementById('myNeed').value = data.need_what || '';
                document.getElementById('myHas').value = data.has_what || '';
                document.getElementById('myCanHelp').value = data.can_help || '';
                document.getElementById('myCanExpose').value = data.can_expose || '';
                document.getElementById('myCanConnect').value = data.can_connect || '';
            }
        }

        async function saveProfile() {
            const updates = {
                category: document.getElementById('myCategory').value,
                need_what: document.getElementById('myNeed').value,
                has_what: document.getElementById('myHas').value,
                can_help: document.getElementById('myCanHelp').value,
                can_expose: document.getElementById('myCanExpose').value,
                can_connect: document.getElementById('myCanConnect').value
            };
            await window.dbClient.from('profiles').update(updates).eq('id', currentUser.id);
            showToast('💾 引力磁場配置更新成功！', 'success');
            refreshRadarMarkers();
        }

        async function refreshRadarMarkers() {
            if(!radarMap) return;
            liveMarkers.forEach(m => radarMap.removeLayer(m)); liveMarkers = [];

            const catFilter = document.getElementById('radarCategory').value;
            const showTeam = document.getElementById('showTeam').checked;
            const showStranger = document.getElementById('showStranger').checked;
            const showStatic = document.getElementById('showStatic').checked;
            const showEvent = document.getElementById('showEvent').checked;

            // 1. 獲取所有用戶引力場
            const { data: users } = await window.dbClient.from('profiles').select('*');
            // 獲取當前使用者的需求
            const myNeedStr = document.getElementById('myNeed').value.toLowerCase();

            if(users) {
                users.forEach(u => {
                    if(u.id === currentUser.id || !u.current_lat) return;
                    if(catFilter !== 'all' && u.category !== catFilter) return;

                    const dist = calcDistance(currentPosition.lat, currentPosition.lng, u.current_lat, u.current_lng);
                    if(dist > 1500) return; // 超出雷達邊界不顯示

                    // 判斷是組員/朋友還是陌生人（這裡以有無填寫特定欄位或模擬組隊關係區分）
                    const isTeamMember = u.nickname.includes('test') || u.nickname.includes('Ria'); // 模擬同組判定
                    if(isTeamMember && !showTeam) return;
                    if(!isTeamMember && !showStranger) return;

                    const color = isTeamMember ? 'var(--blue)' : 'var(--yellow)';
                    
                    // 💡 引力適配碰撞偵測
                    if (tracking && dist <= 600 && myNeedStr && u.has_what && u.has_what.toLowerCase().includes(myNeedStr)) {
                        showToast(`🚨 引力雷達特報：附近有符合你需求的適配同好【${u.nickname}】！<br>🎯 他擁有：${u.has_what}`, 'match');
                    }

                    const popupHtml = `
                        <div style="color:#fff; background:#151a21; padding:5px; border-radius:5px;">
                            <b style="color:${color}">👤 ${u.nickname} (${u.category || '未分類'})</b><br>
                            📏 距離：${dist.toFixed(0)}公尺<br><hr style="margin:5px 0; opacity:0.2;">
                            🎒 擁有：${u.has_what || '無'}<br>
                            🤝 能幫：${u.can_help || '無'}<br>
                            📢 曝光：${u.can_expose || '無'}<br>
                            🔗 串聯：${u.can_connect || '無'}<br>
                            <button class="btn btn-outline" style="margin-top:5px; padding:2px 8px; font-size:10px;" onclick="parent.sendInvite('${u.nickname}')">📡 發出組隊邀請</button>
                        </div>
                    `;

                    const m = L.marker([u.current_lat, u.current_lng], {
                        icon: L.divIcon({ html: `<div style="background:${color}; width:12px; height:12px; border-radius:50%; border:2px solid #fff; box-shadow:0 0 8px ${color};"></div>`, iconSize:[12,12] })
                    }).addTo(radarMap).bindPopup(popupHtml);
                    liveMarkers.push(m);
                });
            }

            // 2. 獲取定點與活動
            const { data: targets } = await window.dbClient.from('static_targets').select('*');
            let tHtml = '';
            if(targets) {
                targets.forEach(t => {
                    const isEv = t.name.includes('[活動]');
                    if(isEv && !showEvent) return;
                    if(!isEv && !showStatic) return;

                    const color = isEv ? 'var(--danger)' : 'var(--accent)';
                    tHtml += `<div class="list-row"><div>${isEv?'📅':'📍'} <b>${t.name}</b></div><button class="btn-danger" onclick="deleteTarget('${t.id}')">×</button></div>`;
                    
                    const tm = L.marker([t.lat, t.lng], {
                        icon: L.divIcon({ html: `<div style="background:${color}; width:12px; height:12px; transform:rotate(45deg); box-shadow:0 0 8px ${color};"></div>`, iconSize:[12,12] })
                    }).addTo(radarMap).bindPopup(`<b style="color:${color}">${isEv?'📅 活動':'📍 定點'}：${t.name}</b><br>點位座標就緒。`);
                    liveMarkers.push(tm);
                });
            }
            document.getElementById('targetList').innerHTML = tHtml || '<div style="font-size:0.75rem; color:#555; text-align:center;">目前沒有部署點位</div>';
        }

        window.sendInvite = function(name) {
            showToast(`📡 已成功向 【${name}】 發射組隊波並發出招募邀請！`, 'success');
        };

        async function deployTarget() {
            const name = document.getElementById('tName').value.trim();
            const type = document.getElementById('deployType').value;
            if(!name) return;
            const finalName = type === 'event' ? `[活動] ${name}` : name;
            await window.dbClient.from('static_targets').insert({ user_id: currentUser.id, name: finalName, lat: currentPosition.lat, lng: currentPosition.lng });
            document.getElementById('tName').value = '';
            refreshRadarMarkers();
        }

        async function deleteTarget(id) {
            await window.dbClient.from('static_targets').delete().eq('id', id);
            refreshRadarMarkers();
        }

        function triggerGroupWave() {
            showToast("📡 實時揪團信號彈已發射！方圓 1 公里的使用者雷達將同步觸發波形震盪。", "success");
        }

        function toggleTracking() {
            const btn = document.getElementById('trackBtn');
            const sweeper = document.getElementById('sweeperEl');
            if (tracking) {
                if(watchId) navigator.geolocation.clearWatch(watchId);
                tracking = false; btn.textContent = '▶️ 啟動雷達實時掃描'; btn.style.background = 'var(--accent)'; sweeper.style.animationPlayState = 'paused';
            } else {
                watchId = navigator.geolocation.watchPosition(async pos => {
                    currentPosition = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                    initRadarMap(currentPosition.lat, currentPosition.lng);
                    
                    await window.dbClient.from('profiles').update({ current_lat: currentPosition.lat, current_lng: currentPosition.lng }).eq('id', currentUser.id);
                    await window.dbClient.from('location_logs').insert({ user_id: currentUser.id, lat: currentPosition.lat, lng: currentPosition.lng });
                    
                    refreshRadarMarkers();
                }, e => showToast('GPS重整失敗: ' + e.message, 'error'), { enableHighAccuracy: true });
                tracking = true; btn.textContent = '⏸️ 停止雷達監控'; btn.style.background = 'var(--danger)'; sweeper.style.animationPlayState = 'running';
            }
        }

        async function queryHistoryLogs() {
            if(!historyMap) {
                historyMap = L.map('historyMap', { zoomControl: false, attributionControl: false }).setView([25.0451, 121.4525], 13);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(historyMap);
            }
            historyMarkers.forEach(m => historyMap.removeLayer(m)); historyMarkers = [];
            if(historyPolyline) historyMap.removeLayer(historyPolyline);

            const { data: logs } = await window.dbClient.from('location_logs').select('*').eq('user_id', currentUser.id).order('created_at', { ascending: true });
            if(!logs || logs.length === 0) { showToast('📭 查無歷史軌跡點', 'error'); return; }

            let latlngs = [], totalDist = 0;
            logs.forEach((log, i) => {
                latlngs.push([log.lat, log.lng]);
                if(i > 0) totalDist += calcDistance(logs[i-1].lat, logs[i-1].lng, log.lat, log.lng);
                const m = L.circleMarker([log.lat, log.lng], { radius: 4, color: 'var(--accent)' }).addTo(historyMap);
                historyMarkers.push(m);
            });

            historyPolyline = L.polyline(latlngs, { color: 'var(--accent)', weight: 3 }).addTo(historyMap);
            historyMap.fitBounds(historyPolyline.getBounds());

            document.getElementById('statDistance').textContent = (totalDist / 1000).toFixed(2) + ' km';
            document.getElementById('statTopPlace').textContent = '土城核心聚落';
            showToast('✅ 歷史資料與核心出沒分析成功載入！', 'success');
        }

        async function handleLogout() { if(tracking) toggleTracking(); await window.dbClient.auth.signOut(); location.reload(); }
        
        function enterMainApp() { 
            document.getElementById('authPage').classList.add('hidden'); 
            document.getElementById('mainApp').classList.remove('hidden'); 
            document.getElementById('sweeperEl').style.animationPlayState = 'paused';
            loadProfileData();
            setTimeout(() => { initRadarMap(25.0451, 121.4525); refreshRadarMarkers(); }, 300);
        }

        window.onload = async function() {
            try {
                const { data } = await window.dbClient.auth.getSession();
                if(data?.session?.user) { currentUser = data.session.user; enterMainApp(); }
                else { document.getElementById('connStatus').textContent = '🟢 主機連線就緒，請輸入帳密進入網格'; }
            } catch(e) { document.getElementById('connStatus').textContent = '🔴 核心初始化異常'; }
        };
    </script>
</body>
</html>
