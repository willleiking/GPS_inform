<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover, maximum-scale=1.0">
    <title>📍 七龍珠雷達定位系統 - 雙隊抗衡版</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>

    <style>
        :root {
            --bg: #0a0a10;
            --surface: #161622;
            --surface2: #1e1e2e;
            --border: #2a2a3e;
            --text: #e8e8f0;
            --text2: #9898b0;
            --accent: #4ade80; /* 雷達綠 */
            --team-red: #f87171; /* 紅隊 */
            --team-blue: #60a5fa; /* 藍隊 */
            --success: #4ade80;
            --warning: #facc15;
            --danger: #f87171;
            --radius: 14px;
            --radius-sm: 10px;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang TC', 'Noto Sans TC', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            padding-bottom: 50px;
        }
        .app-container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .card {
            background: var(--surface);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .card-title {
            font-size: 0.9rem;
            font-weight: 700;
        }
        .btn {
            padding: 10px 16px;
            border-radius: 25px;
            border: none;
            font-weight: 700;
            font-size: 0.8rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            font-family: inherit;
            transition: all 0.2s;
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn:active:not(:disabled) {
            transform: scale(0.95);
        }
        .btn-primary {
            background: var(--accent);
            color: #000;
            width: 100%;
        }
        .btn-outline {
            background: transparent;
            color: var(--accent);
            border: 2px solid var(--accent);
        }
        .btn-sm {
            padding: 6px 12px;
            font-size: 0.7rem;
        }
        .btn-danger {
            background: transparent;
            color: var(--danger);
            border: 2px solid var(--danger);
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .input-group label {
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--text2);
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .input-group input, .input-group select {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 8px 12px;
            color: var(--text);
            font-size: 0.8rem;
            outline: none;
        }
        .input-group input:focus {
            border-color: var(--accent);
        }
        .tab-nav {
            display: flex;
            gap: 6px;
            background: var(--surface);
            border-radius: var(--radius);
            padding: 4px;
            border: 1px solid var(--border);
        }
        .tab-btn {
            flex: 1;
            padding: 10px;
            border-radius: var(--radius-sm);
            background: transparent;
            color: var(--text2);
            font-weight: 700;
            font-size: 0.8rem;
            text-align: center;
            cursor: pointer;
            border: none;
        }
        .tab-btn.active {
            background: var(--accent);
            color: #000;
        }
        .map-container {
            height: 280px;
            border-radius: var(--radius-sm);
            overflow: hidden;
            border: 1px solid var(--border);
        }
        
        /* 🐉 七龍珠圓形雷達面板 */
        .radar-map-wrapper {
            position: relative;
            border: 4px solid #333;
            border-radius: 50%;
            width: 100%;
            padding-bottom: 100%;
            overflow: hidden;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8), 0 0 15px var(--accent);
            background: #041408;
        }
        #radarMap {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
        }
        .radar-crosshair {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1000;
        }
        .radar-crosshair::before { content: ''; position: absolute; top: 0; left: 50%; width: 2px; height: 100%; background: rgba(74, 222, 128, 0.2); }
        .radar-crosshair::after { content: ''; position: absolute; top: 50%; left: 0; height: 2px; width: 100%; background: rgba(74, 222, 128, 0.2); }

        .radar-sweeper {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 999;
            pointer-events: none;
            border-radius: 50%;
            background: conic-gradient(from 0deg, rgba(74, 222, 128, 0.4) 0deg, rgba(74, 222, 128, 0) 60deg, transparent 360deg);
            animation: radar-sweep 4s infinite linear;
        }
        @keyframes radar-sweep { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* 🟢 中心點脈衝 */
        .radar-pulse-icon { background: #2563eb; border: 2px solid #fff; border-radius: 50%; box-shadow: 0 0 10px #2563eb; }
        .radar-pulse-icon::after { content: ''; display: block; width: 100%; height: 100%; border-radius: 50%; background: rgba(37, 99, 235, 0.4); animation: pulse 1.8s infinite ease-out; }
        
        /* 🔴 紅隊標記 */
        .radar-red-icon { background: var(--team-red); border: 2px solid #fff; border-radius: 50%; box-shadow: 0 0 10px var(--team-red); }
        .radar-red-icon::after { content: ''; display: block; width: 100%; height: 100%; border-radius: 50%; background: rgba(248, 113, 113, 0.4); animation: pulse 1.8s infinite ease-out; }

        /* 🔵 藍隊標記 */
        .radar-blue-icon { background: var(--team-blue); border: 2px solid #fff; border-radius: 50%; box-shadow: 0 0 10px var(--team-blue); }
        .radar-blue-icon::after { content: ''; display: block; width: 100%; height: 100%; border-radius: 50%; background: rgba(96, 165, 250, 0.4); animation: pulse 1.8s infinite ease-out; }

        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(3); opacity: 0; } }

        .list-item { background: var(--surface2); border-radius: var(--radius-sm); padding: 10px; display: flex; align-items: center; gap: 8px; font-size: 0.75rem; margin-bottom: 4px; }
        .team-badge { padding: 2px 6px; border-radius: 4px; font-size: 0.65rem; font-weight: bold; color: #000; }
        .badge-red { background: var(--team-red); }
        .badge-blue { background: var(--team-blue); }

        .toast-container { position: fixed; top: 16px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 6px; pointer-events: none; width: 90%; max-width: 420px; }
        .toast { padding: 10px 16px; border-radius: 22px; font-weight: 600; font-size: 0.8rem; text-align: center; animation: toastIn 0.3s, toastOut 0.3s 2.7s forwards; pointer-events: auto; box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5); }
        .toast.success { background: #1a3a2a; color: var(--success); border: 1px solid #2a5a3a; }
        .toast.error { background: #3a1a1a; color: var(--danger); border: 1px solid #5a2a2a; }
        .toast.info { background: #1a2a3a; color: #5b9cf5; border: 1px solid #2a3a5a; }
        
        @keyframes toastIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes toastOut { from { opacity: 1; } to { opacity: 0; transform: translateY(-15px); } }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="toast-container" id="toastContainer"></div>

    <div class="app-container" id="authPage">
        <div class="card" style="text-align:center; padding:25px;">
            <h2 style="background:linear-gradient(135deg,#4ade80,#22c55e);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">📡 社群位置監控系統</h2>
            <p style="color:var(--text2);font-size:0.8rem;">分組對抗、即時雷達探測、軌跡分析</p>
            <p style="font-size:0.75rem; color: var(--warning);" id="connectionStatus">🔄 正在連線中...</p>
        </div>
        <div class="card">
            <div class="card-title" id="authTitle">🔐 登入 / 註冊</div>
            <div class="input-group">
                <label>Email</label>
                <input type="email" id="authEmail" placeholder="you@example.com">
            </div>
            <div class="input-group">
                <label>密碼（至少 6 碼）</label>
                <input type="password" id="authPassword" placeholder="••••••">
            </div>
            <div class="input-group hidden" id="nicknameGroup">
                <label>顯示名稱</label>
                <input type="text" id="authNickname" placeholder="你的暱稱">
            </div>
            <button class="btn btn-primary" id="authActionBtn" onclick="handleAuthAction()">登入</button>
            <button class="btn btn-sm btn-outline" id="authToggleBtn" onclick="toggleAuthMode()">還沒有帳號？註冊</button>
        </div>
    </div>

    <div class="app-container hidden" id="mainApp">
        <div class="tab-nav">
            <button class="tab-btn active" onclick="switchTab('monitor')">🟢 雷達探測</button>
            <button class="tab-btn" onclick="switchTab('history')">📊 軌跡歷程</button>
        </div>

        <div id="monitorTab">
            <div class="card" style="align-items: center; background: #0c0d14;">
                <div class="card-title" style="align-self: flex-start;">📡 雙隊對抗雷達</div>
                <div class="radar-map-wrapper">
                    <div id="radarMap"></div>
                    <div class="radar-crosshair"></div>
                    <div class="radar-sweeper"></div>
                </div>
                <div id="currentLocation" style="font-family:monospace; font-size:0.75rem; color:var(--text2); margin-top:5px;">--</div>
            </div>

            <div class="card">
                <div style="display:flex; gap:8px;">
                    <button class="btn btn-primary" id="trackingBtn" onclick="toggleTracking()" style="flex:1;">▶️ 啟動雷達掃描</button>
                    <button class="btn btn-sm btn-danger" onclick="handleLogout()">登出</button>
                </div>
            </div>

            <div class="card" style="border: 1px dashed var(--accent);">
                <div class="card-title">⚔️ 戰隊對抗名稱設定</div>
                <div style="display: flex; gap: 8px;">
                    <div class="input-group" style="flex: 1;">
                        <label style="color: var(--team-red);">🔴 紅隊名稱</label>
                        <input type="text" id="teamRedName" value="紅翼獵手" onchange="saveTeamNames()">
                    </div>
                    <div class="input-group" style="flex: 1;">
                        <label style="color: var(--team-blue);">🔵 藍隊名稱</label>
                        <input type="text" id="teamBlueName" value="藍閃風暴" onchange="saveTeamNames()">
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-title">👥 戰隊隊員列表（雷達分色顯示）</div>
                <div id="friendList" style="max-height:160px; overflow-y:auto;">
                    <div style="text-align:center;color:var(--text2);padding:20px;">👥 尚未綁定隊員</div>
                </div>
                <button class="btn btn-sm btn-outline" onclick="showAddFriendModal()">＋ 招募隊員並分組</button>
            </div>

            <div class="card">
                <div class="card-title">📍 定點目標區域</div>
                <div id="staticTargetList" style="max-height:140px; overflow-y:auto;"></div>
                <button class="btn btn-sm btn-outline" onclick="showAddStaticTargetModal()">＋ 新增搜尋目標</button>
            </div>
        </div>

        <div id="historyTab" class="hidden">
            <div class="card">
                <div class="card-title">🗺️ 軌跡歷史地圖</div>
                <div class="map-container" id="historyMap"></div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://hknxdvefnuxgyepuuqra.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhrbnhkdmVmbnV4Z3llcHV1cXJhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1MzM0MDAsImV4cCI6MjA5NzEwOTQwMH0.M97OwM_9CrLCrgxbyA6kQs0MLFiRDzyYlvIiGqhBGec';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = null;
        let tracking = false;
        let watchId = null;
        let currentPosition = null;
        let radarMap = null;
        let myLocationMarker = null;
        let radarCircle = null;
        let teamLayers = [];
        let isRegisterMode = false;

        function showToast(msg, type = 'info') {
            const t = document.createElement('div');
            t.className = `toast ${type}`;
            t.textContent = msg;
            document.getElementById('toastContainer').appendChild(t);
            setTimeout(() => { if (t.parentNode) t.remove(); }, 3500);
        }

        function toggleAuthMode() {
            isRegisterMode = !isRegisterMode;
            document.getElementById('nicknameGroup').classList.toggle('hidden', !isRegisterMode);
            document.getElementById('authTitle').textContent = isRegisterMode ? '🔐 註冊新帳號' : '🔐 登入';
            document.getElementById('authActionBtn').textContent = isRegisterMode ? '註冊' : '登入';
            document.getElementById('authToggleBtn').textContent = isRegisterMode ? '已有帳號？登入' : '還沒有帳號？註冊';
        }

        // 防禦連擊：修復 email rate limit exceeded 
        async function handleAuthAction() {
            const btn = document.getElementById('authActionBtn');
            const email = document.getElementById('authEmail').value.trim();
            const password = document.getElementById('authPassword').value;
            
            if (!email || !password) { showToast('⚠️ 請完整填寫欄位', 'error'); return; }
            
            btn.disabled = true;
            btn.textContent = '處理中...請稍候';

            try {
                if (isRegisterMode) {
                    const nickname = document.getElementById('authNickname').value.trim();
                    if (!nickname) { showToast('⚠️ 請填寫暱稱', 'error'); btn.disabled = false; return; }
                    
                    const { data, error } = await supabaseClient.auth.signUp({
                        email, password, options: { data: { nickname } }
                    });
                    if (error) throw error;
                    
                    showToast('🎉 註冊成功！如果收到限制提示，請直接嘗試登入。', 'success');
                    toggleAuthMode();
                } else {
                    const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
                    if (error) throw error;
                    currentUser = data.user;
                    showMainApp();
                }
            } catch (e) {
                // 如果遇到頻率限制，特別優化提示訊息
                if (e.message.includes('rate limit')) {
                    showToast('⚠️ 伺服器郵件頻率限制，請等 1 分鐘後再試，或嘗試直接登入。', 'error');
                } else {
                    showToast('❌ ' + e.message, 'error');
                }
            } finally {
                btn.disabled = false;
                btn.textContent = isRegisterMode ? '註冊' : '登入';
            }
        }

        function saveTeamNames() {
            localStorage.setItem('team_red_name', document.getElementById('teamRedName').value || '紅隊');
            localStorage.setItem('team_blue_name', document.getElementById('teamBlueName').value || '藍隊');
            loadAllData();
        }

        function loadTeamNames() {
            if(localStorage.getItem('team_red_name')) document.getElementById('teamRedName').value = localStorage.getItem('team_red_name');
            if(localStorage.getItem('team_blue_name')) document.getElementById('teamBlueName').value = localStorage.getItem('team_blue_name');
        }

        function initRadarMap(lat, lng) {
            if (radarMap) {
                radarMap.setView([lat, lng]);
                if (myLocationMarker) myLocationMarker.setLatLng([lat, lng]);
                if (radarCircle) radarCircle.setLatLng([lat, lng]);
                return;
            }
            radarMap = L.map('radarMap', { zoomControl: false, attributionControl: false }).setView([lat, lng], 14);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(radarMap);

            myLocationMarker = L.marker([lat, lng], { 
                icon: L.divIcon({ className: 'radar-pulse-icon', iconSize: [14, 14], iconAnchor: [7, 7] }) 
            }).addTo(radarMap);

            radarCircle = L.circle([lat, lng], { radius: 1000, color: '#4ade80', weight: 1.5, fillColor: '#4ade80', fillOpacity: 0.05 }).addTo(radarMap);
        }

        // 🔴🔵 雷達雙色陣營渲染
        function renderRadarTeams(friends) {
            teamLayers.forEach(l => radarMap.removeLayer(l));
            teamLayers = [];
            if (!radarMap || !currentPosition) return;

            friends.forEach((f, idx) => {
                // 模擬座標偏移，防呆模擬展示
                const offsetLat = (Math.sin(idx * 2) * 0.006);
                const offsetLng = (Math.cos(idx * 2) * 0.006);
                const fLat = currentPosition.lat + offsetLat;
                const fLng = currentPosition.lng + offsetLng;

                const isRed = f.team !== 'blue'; 
                const className = isRed ? 'radar-red-icon' : 'radar-blue-icon';
                const color = isRed ? 'var(--team-red)' : 'var(--team-blue)';
                const teamTitle = isRed ? (localStorage.getItem('team_red_name') || '紅隊') : (localStorage.getItem('team_blue_name') || '藍隊');

                const m = L.marker([fLat, fLng], {
                    icon: L.divIcon({ className: className, iconSize: [14, 14], iconAnchor: [7, 7] })
                }).addTo(radarMap).bindPopup(`<b>${f.friend_nickname}</b><br>陣營: ${teamTitle}`);

                const c = L.circle([fLat, fLng], {
                    radius: f.alert_radius || 500, color: color, weight: 1, fillColor: color, fillOpacity: 0.03
                }).addTo(radarMap);

                teamLayers.push(m, c);
            });
        }

        async function loadAllData() {
            if (!currentUser) return;
            try {
                const [fRes, tRes] = await Promise.all([
                    supabaseClient.from('friendships').select('*').eq('user_id', currentUser.id),
                    supabaseClient.from('static_targets').select('*').eq('user_id', currentUser.id)
                ]);

                const friends = fRes.data || [];
                renderFriendListUI(friends);
                renderRadarTeams(friends);

                const targets = tRes.data || [];
                document.getElementById('staticTargetList').innerHTML = targets.map(t => `
                    <div class="list-item" style="justify-content:space-between;">
                        <span>📍 ${t.name}</span>
                        <button class="btn btn-sm btn-danger" onclick="deleteItem('static_targets','${t.id}')">✕</button>
                    </div>
                `).join('');
            } catch (e) { console.warn(e); }
        }

        function renderFriendListUI(friends) {
            const el = document.getElementById('friendList');
            if(!friends.length) { el.innerHTML = `<div style="text-align:center;color:var(--text2);padding:20px;">👥 尚未綁定隊員</div>`; return; }

            const rName = localStorage.getItem('team_red_name') || '紅隊';
            const bName = localStorage.getItem('team_blue_name') || '藍隊';

            el.innerHTML = friends.map(f => {
                const isRed = f.team !== 'blue';
                return `
                    <div class="list-item" style="justify-content:space-between;">
                        <div style="display:flex; align-items:center; gap:6px;">
                            <span class="team-badge ${isRed?'badge-red':'badge-blue'}">${isRed?rName:bName}</span>
                            <span>👤 ${f.friend_nickname}</span>
                        </div>
                        <button class="btn btn-sm btn-danger" onclick="deleteItem('friendships','${f.id}')">✕</button>
                    </div>
                `;
            }).join('');
        }

        // 🛠️ 徹底修復 null value in column "friend_id" 
        async function showAddFriendModal() {
            const email = prompt('請輸入隊員 Email：'); if (!email) return;
            const nickname = prompt('請輸入隊員顯示暱稱：'); if (!nickname) return;
            
            const rName = localStorage.getItem('team_red_name') || '紅隊';
            const bName = localStorage.getItem('team_blue_name') || '藍隊';
            const choice = prompt(`請分配陣營：\n輸入 1 加入 [🔴 ${rName}]\n輸入 2 加入 [🔵 ${bName}]`, '1');
            const selectedTeam = choice === '2' ? 'blue' : 'red';

            showToast('🔄 正在綁定戰隊中...', 'info');

            // 核心修復：如果對方還沒有註冊，直接給一個隨機產生的虛擬 UUID 作為預設防呆值
            let finalFriendId = crypto.randomUUID ? crypto.randomUUID() : 'f92c632a-0000-4000-8000-000000000000';
            
            try {
                const { data: pData } = await supabaseClient.from('profiles').select('id').eq('email', email.trim()).single();
                if (pData && pData.id) finalFriendId = pData.id;
            } catch(e) {
                console.log("對方尚未在系統中註冊，啟用防呆虛擬 ID 進行綁定。");
            }

            // 寫入包含 team 欄位的資料
            const { error } = await supabaseClient.from('friendships').insert({
                user_id: currentUser.id,
                friend_id: finalFriendId, // 永遠不會為 null
                friend_nickname: nickname,
                alert_radius: 800,
                alert_enabled: true,
                team: selectedTeam
            });

            if (error) {
                showToast('❌ 新增失敗：' + error.message, 'error');
            } else {
                showToast(`✅ 已將 ${nickname} 成功召募至 ${selectedTeam === 'red' ? rName : bName}！`, 'success');
                loadAllData();
            }
        }

        async function deleteItem(table, id) {
            await supabaseClient.from(table).delete().eq('id', id);
            loadAllData();
            showToast('已成功移除項目', 'info');
        }

        function toggleTracking() {
            if (tracking) {
                if (watchId) navigator.geolocation.clearWatch(watchId);
                tracking = false;
                document.getElementById('trackingBtn').textContent = '▶️ 啟動雷達掃描';
                document.getElementById('trackingBtn').style.background = 'var(--accent)';
                document.getElementById('trackingBtn').style.color = '#000';
            } else {
                if (!navigator.geolocation) { showToast('❌ 裝置不支援 GPS', 'error'); return; }
                watchId = navigator.geolocation.watchPosition(pos => {
                    currentPosition = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                    document.getElementById('currentLocation').textContent = `中心點 ➔ 緯度: ${currentPosition.lat.toFixed(5)}, 經度: ${currentPosition.lng.toFixed(5)}`;
                    initRadarMap(currentPosition.lat, currentPosition.lng);
                    loadAllData();
                }, err => showToast('⚠️ 訊號弱: ' + err.message, 'warning'), { enableHighAccuracy: true });
                
                tracking = true;
                document.getElementById('trackingBtn').textContent = '⏸️ 關閉雷達掃描';
                document.getElementById('trackingBtn').style.background = 'var(--danger)';
                document.getElementById('trackingBtn').style.color = '#fff';
            }
        }

        async function handleLogout() { if(tracking) toggleTracking(); await supabaseClient.auth.signOut(); currentUser = null; location.reload(); }
        function showMainApp() { document.getElementById('authPage').classList.add('hidden'); document.getElementById('mainApp').classList.remove('hidden'); loadTeamNames(); setTimeout(() => { initRadarMap(25.0478, 121.5170); }, 200); loadAllData(); }
        function switchTab(t) { document.getElementById('monitorTab').classList.toggle('hidden', t!=='monitor'); }

        window.onload = async function() {
            const sessionRes = await supabaseClient.auth.getSession();
            if (sessionRes.data.session?.user) { currentUser = sessionRes.data.session.user; showMainApp(); }
            document.getElementById('connectionStatus').textContent = '🟢 雷達主機已連線';
            document.getElementById('connectionStatus').style.color = 'var(--success)';
        };
    </script>
</body>
</html>
