<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🟢 TribeRadar V5.0 - 終極整合完全體</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js">
    </script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
    </script>
    <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js">
    </script>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyACxMPE_nMWpxsNNB_fW2TplflJJSI6sOs&libraries=places&language=zh-TW">
    </script>

    <style>
        :root {
            --bg: #0b0c10;
            --surface: #151a21;
            --surface2: #1f2630;
            --border: #2ecc7130;
            --text: #95a5a6;
            --accent: #2ecc71;
            --friend-color: #3498db;
            --stranger-color: #f1c40f;
            --target-color: #2ecc71;
            --team-color: #e74c3c;
            --dashboard-color: #9b59b6;
            --radius: 12px;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .app-container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .card {
            background: var(--surface);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .card-title {
            font-size: 0.95rem;
            font-weight: 700;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .btn {
            padding: 12px;
            border-radius: 20px;
            border: none;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: 0.2s;
        }
        .btn-primary {
            background: var(--accent);
            color: #000;
            width: 100%;
        }
        .btn-outline {
            background: transparent;
            color: var(--accent);
            border: 1px solid var(--accent);
            border-radius: 20px;
            padding: 6px 12px;
            font-size: 0.8rem;
        }
        .btn-danger {
            background: transparent;
            color: #e74c3c;
            border: 1px solid #e74c3c;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            cursor: pointer;
        }
        .btn-game {
            padding: 2px 6px;
            font-size: 0.7rem;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            margin-left: 4px;
        }
        select,
        input,
        textarea {
            background: var(--surface2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 10px;
            color: #fff;
            outline: none;
            font-size: 0.85rem;
            width: 100%;
        }
        textarea {
            resize: none;
            height: 60px;
        }
        .tab-nav {
            display: flex;
            gap: 6px;
            background: var(--surface);
            border-radius: var(--radius);
            padding: 4px;
            border: 1px solid var(--border);
        }
        .tab-btn {
            flex: 1;
            padding: 8px;
            border-radius: 8px;
            background: transparent;
            color: var(--text);
            font-weight: 700;
            font-size: 0.7rem;
            text-align: center;
            cursor: pointer;
            border: none;
        }
        .tab-btn.active {
            background: var(--accent);
            color: #000;
        }
        .radar-panel {
            position: relative;
            background: #070a0e;
            padding: 0;
            overflow: hidden;
            border-radius: var(--radius);
            border: 1px solid var(--border);
        }
        .radar-outer {
            position: relative;
            width: 100%;
            padding-bottom: 100%;
        }
        #radarMap {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        .radar-sweeper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
            border-radius: 50%;
            background: conic-gradient(from 0deg, rgba(46, 204, 113, 0.12) 0deg, rgba(46, 204, 113, 0) 90deg, transparent 360deg);
            animation: radar-sweep 4s infinite linear;
            display: none;
        }
        @keyframes radar-sweep {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }
        .chat-box {
            background: var(--surface2);
            border-radius: 8px;
            height: 140px;
            overflow-y: auto;
            padding: 10px;
            font-size: 0.85rem;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .msg-line {
            padding: 6px 10px;
            border-radius: 6px;
            max-width: 80%;
            word-break: break-all;
            font-size: 0.8rem;
        }
        .msg-me {
            background: var(--accent);
            color: #000;
            align-self: flex-end;
        }
        .msg-other {
            background: #2c3e50;
            color: #fff;
            align-self: flex-start;
        }
        .msg-system {
            background: rgba(231, 76, 60, 0.1);
            color: #e74c3c;
            align-self: center;
            text-align: center;
            width: 100%;
            max-width: 100%;
            font-size: 0.75rem;
            border: 1px dashed rgba(231, 76, 60, 0.3);
        }
        .list-row {
            background: var(--surface2);
            border-radius: 8px;
            padding: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 0.85rem;
        }
        .avatar-preview {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--accent);
            margin: 0 auto;
            display: block;
            background: #222;
        }
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .hidden {
            display: none !important;
        }
        .map-container {
            height: 280px;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--border);
        }
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .stat-item {
            background: var(--surface2);
            border-radius: 8px;
            padding: 12px;
            text-align: center;
        }
        .stat-value {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--accent);
        }
        .stat-label {
            font-size: 0.65rem;
            color: var(--text);
        }
        .chart-container {
            height: 200px;
        }
        .toast-container {
            position: fixed;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 6px;
            width: 90%;
            max-width: 400px;
        }
        .toast {
            padding: 12px;
            border-radius: 8px;
            font-size: 0.8rem;
            text-align: center;
            color: #fff;
            font-weight: bold;
        }
        .toast.match {
            background: #e67e22;
            box-shadow: 0 0 15px #e67e22;
            border: 2px solid #fff;
        }
        .toast.success {
            background: #27ae60;
        }
        .toast.error {
            background: #c0392b;
        }
        .party-member-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.03);
            border-left: 4px solid var(--team-color);
            padding: 8px;
            border-radius: 4px;
            margin-bottom: 4px;
            font-size: 0.8rem;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .input-group label {
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--text);
            text-transform: uppercase;
        }
        @media print {
            body * {
                visibility: hidden;
            }
            #printArea,
            #printArea * {
                visibility: visible;
            }
            #printArea {
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
            }
            .no-print {
                display: none !important;
            }
        }
    </style>
</head>
<body>

    <div class="toast-container" id="toastContainer"></div>

    <!-- ========== 登入頁面 ========== -->
    <div class="app-container" id="authPage">
        <div class="card" style="text-align:center;">
            <h2 style="color:var(--accent)">🟢 TribeRadar V5.0</h2>
            <p style="font-size:0.75rem; color:var(--accent);" id="connStatus">探索主機連線中...</p>
        </div>
        <div class="card">
            <input type="email" id="authEmail" placeholder="Email 帳號">
            <input type="password" id="authPassword" placeholder="密碼 (至少6碼)">
            <div class="hidden" id="nickGroup"><input type="text" id="authNickname" placeholder="設定暱稱"></div>
            <button class="btn btn-primary" id="authActionBtn" onclick="handleAuth()">進入引力網格</button>
            <button class="btn btn-outline" id="authToggleBtn" onclick="toggleAuthMode()">切換註冊/登入</button>
        </div>
    </div>

    <!-- ========== 主面板 ========== -->
    <div class="app-container hidden" id="mainApp">
        <div class="tab-nav no-print">
            <button class="tab-btn active" onclick="switchTab('radar')">📍 雷達</button>
            <button class="tab-btn" onclick="switchTab('team')">🛡️ 組隊</button>
            <button class="tab-btn" onclick="switchTab('history')">📊 歷史</button>
            <button class="tab-btn" onclick="switchTab('settings')">⚙️ 設定</button>
        </div>

        <!-- ===== 雷達面板 ===== -->
        <div id="radarTab">
            <div class="card radar-panel">
                <div class="radar-outer">
                    <div id="radarMap"></div>
                    <div class="radar-sweeper" id="sweeperEl"></div>
                </div>
            </div>
            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center; gap:8px;">
                    <button class="btn btn-primary" id="trackBtn" onclick="toggleTracking()" style="flex:1;">▶️ 啟動雷達</button>
                    <button class="btn btn-outline" style="color:#e74c3c; border-color:#e74c3c;" onclick="handleLogout()">🚪 登出</button>
                </div>
                <div class="grid-2">
                    <select id="filterCategory" onchange="refreshRadarMarkers()">
                        <option value="全類別">全類別</option><option value="吃貨團">吃貨團</option>
                        <option value="健身團">健身團</option><option value="商務交流">商務交流</option>
                    </select>
                    <div style="font-size:0.7rem; display:flex; flex-direction:column; gap:2px;">
                        <label><input type="checkbox" id="showStrangers" checked onchange="refreshRadarMarkers()"> 陌生人</label>
                        <label><input type="checkbox" id="showTeams" checked onchange="refreshRadarMarkers()"> ⚡ 組隊</label>
                    </div>
                </div>
                <div id="geoStatus" style="font-size:0.7rem; text-align:center; color:var(--accent);">雷達範圍：1500M</div>
            </div>
        </div>

        <!-- ===== 組隊面板 ===== -->
        <div id="teamTab" class="hidden">
            <div class="card" style="border:2px dashed var(--team-color);">
                <div class="card-title" style="color:var(--team-color);">🛡️ 當前隊伍</div>
                <div id="partyMemberList"><div style="font-size:0.8rem; color:#888; text-align:center;">無隊伍</div></div>
            </div>
            <div class="card" style="border:1px solid var(--stranger-color);">
                <div class="card-title" style="color:var(--stranger-color);">📩 待審核請求</div>
                <div id="pendingRequests"><div style="font-size:0.75rem; color:#888; text-align:center;">無請求</div></div>
            </div>
            <div class="card" style="border:1px solid var(--team-color);">
                <div class="card-title" style="color:var(--team-color);">🔊 組隊公頻</div>
                <div class="chat-box" id="partyChatBox"></div>
                <div style="display:grid; grid-template-columns:1fr auto; gap:6px;">
                    <input type="text" id="partyChatInput" placeholder="輸入訊息...">
                    <button class="btn btn-primary" style="padding:6px 12px; background:var(--team-color); color:#fff;" onclick="sendPartyChatMessage()">發送</button>
                </div>
            </div>
            <div class="card" style="border:1px solid var(--team-color);">
                <div class="card-title" style="color:var(--team-color);">📋 組隊公告欄</div>
                <div id="teamNoticeBoard" style="max-height:140px; overflow-y:auto;"></div>
            </div>
            <div class="card">
                <div class="card-title" style="color:var(--team-color);">🔥 我的組隊狀態</div>
                <input type="text" id="teamTitle" placeholder="組隊名稱">
                <select id="teamCategory"><option>健身團</option><option>吃貨團</option><option>商務交流</option></select>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px;">
                    <button class="btn" style="background:var(--team-color); color:#fff;" onclick="changeTeamStatus(true)">🟢 開始招募</button>
                    <button class="btn" style="background:var(--surface2); color:#fff;" onclick="changeTeamStatus(false)">🛑 退出/解散</button>
                </div>
                <div id="myActiveTeamStatus" style="font-size:0.8rem; text-align:center; color:#fff;">未開啟</div>
            </div>
        </div>

        <!-- ===== 歷史分析面板 ===== -->
        <div id="historyTab" class="hidden">
            <div id="printArea">
                <div class="card no-print">
                    <div class="card-title">📆 時間區間</div>
                    <div style="display:flex; gap:10px;">
                        <input type="date" id="startDate" style="flex:1;"><span>～</span>
                        <input type="date" id="endDate" style="flex:1;">
                    </div>
                    <button class="btn btn-primary" onclick="loadHistory()">🔍 查詢軌跡</button>
                </div>
                <div class="card">
                    <div class="card-title">📊 摘要</div>
                    <div class="stats-grid">
                        <div class="stat-item"><div class="stat-value" id="totalDistance">--</div><div class="stat-label">總移動距離</div></div>
                        <div class="stat-item"><div class="stat-value" id="totalStayTime">--</div><div class="stat-label">總停留時間</div></div>
                        <div class="stat-item"><div class="stat-value" id="totalStops">--</div><div class="stat-label">停留次數</div></div>
                        <div class="stat-item"><div class="stat-value" id="topPlace">--</div><div class="stat-label">最常停留點</div></div>
                    </div>
                </div>
                <div class="card"><div class="card-title">🗺️ 軌跡地圖</div><div class="map-container" id="historyMap"></div></div>
                <div class="card"><div class="card-title">📈 每日距離</div><div class="chart-container"><canvas id="distanceChart"></canvas></div></div>
                <div class="card"><div class="card-title">⏱️ 停留明細</div><div id="stayTable" style="max-height:200px; overflow-y:auto;"></div></div>
            </div>
            <div class="card no-print">
                <button class="btn btn-outline" onclick="exportCSV()">📥 匯出 CSV</button>
                <button class="btn btn-outline" onclick="printReport()">🖨️ 列印報表</button>
            </div>
        </div>

        <!-- ===== 設定面板 ===== -->
        <div id="settingsTab" class="hidden">
            <div class="card">
                <div class="card-title">🚀 個人檔案</div>
                <img id="myAvatarDisplay" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" class="avatar-preview">
                <input type="text" id="avatarUrlInput" placeholder="大頭貼網址" onchange="document.getElementById('myAvatarDisplay').src=this.value">
                <textarea id="myHasWhat" placeholder="我的資源摘要"></textarea>
                <textarea id="myMatchDemand" placeholder="配對關鍵字"></textarea>
                <button class="btn btn-primary" onclick="saveProfile()">💾 儲存</button>
            </div>
            <div class="card">
                <div class="card-title">🧑‍🤝‍🧑 好友</div>
                <div id="friendContainer"></div>
                <input type="text" id="fEmail" placeholder="好友 Email">
                <button class="btn btn-outline" onclick="addFriend()">+ 綁定</button>
            </div>
            <div class="card">
                <div class="card-title">📍 定點目標</div>
                <div id="targetList"></div>
                <input type="text" id="geoSearchInput" placeholder="搜尋地點...">
                <input type="text" id="tName" placeholder="地點名稱">
                <button class="btn btn-primary" onclick="addStaticTarget()">+ 存入</button>
            </div>
            <div class="card">
                <div class="card-title">⚙️ EmailJS 郵件</div>
                <div class="input-group"><label>Public Key</label><input id="emailjsPublicKey"></div>
                <div class="input-group"><label>Service ID</label><input id="emailjsServiceId"></div>
                <div class="input-group"><label>Template ID</label><input id="emailjsTemplateId"></div>
                <div class="input-group"><label>收件人</label><input id="defaultRecipient"></div>
                <button class="btn btn-outline" onclick="saveEmailSettings()">💾 儲存</button>
                <button class="btn btn-outline" onclick="testEmailConfig()">🧪 測試</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== Supabase 連線 ====================
        const SUPABASE_URL = 'https://hknxdvefnuxgyepuuqra.supabase.co';
        const SUPABASE_KEY =
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhrbnhkdmVmbnV4Z3llcHV1cXJhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1MzM0MDAsImV4cCI6MjA5NzEwOTQwMH0.M97OwM_9CrLCrgxbyA6kQs0MLFiRDzyYlvIiGqhBGec';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = null,
            tracking = false,
            watchId = null,
            currentPosition = { lat: 25.0451, lng: 121.4525 };
        let radarMap = null,
            myMarker = null,
            radarCircle = null;
        let historyMap = null,
            distanceChart = null,
            currentHistoryData = null;
        let mapElements = [],
            isRegister = false;
        const RECORD_INTERVAL = 30000;

        function showToast(msg, type = 'info') {
            const t = document.createElement('div');
            t.className = `toast ${type}`;
            t.textContent = msg;
            document.getElementById('toastContainer').appendChild(t);
            setTimeout(() => t.remove(), 4000);
        }

        function calcDistance(lat1, lon1, lat2, lon2) {
            const R = 6371000,
                dLat = (lat2 - lat1) * Math.PI / 180,
                dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) ** 2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(
                dLon / 2) ** 2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            ['radarTab', 'teamTab', 'historyTab', 'settingsTab'].forEach(id => document.getElementById(id).classList.add(
                'hidden'));
            if (tab === 'radar') { document.querySelector('.tab-btn:nth-child(1)').classList.add('active');
                document.getElementById('radarTab').classList.remove('hidden'); } else if (tab === 'team') { document
                    .querySelector('.tab-btn:nth-child(2)').classList.add('active');
                document.getElementById('teamTab').classList.remove('hidden');
                refreshPartyWindow();
                loadPartyChatMessages();
                loadPendingRequests();
                loadTeamNoticeBoard(); } else if (tab === 'history') { document.querySelector('.tab-btn:nth-child(3)')
                    .classList.add('active');
                document.getElementById('historyTab').classList.remove('hidden'); const now = new Date();
                document.getElementById('endDate').value = now.toISOString().split('T')[0];
                document.getElementById('startDate').value = new Date(now - 7 * 86400000).toISOString().split('T')[0];
                setTimeout(initHistoryMap, 300); } else if (tab === 'settings') { document.querySelector(
                    '.tab-btn:nth-child(4)').classList.add('active');
                document.getElementById('settingsTab').classList.remove('hidden');
                loadSettingsData(); }
        }

        // ==================== 認證 ====================
        function toggleAuthMode() {
            isRegister = !isRegister;
            document.getElementById('nickGroup').classList.toggle('hidden', !isRegister);
            document.getElementById('authActionBtn').textContent = isRegister ? '註冊' : '登入';
            document.getElementById('authToggleBtn').textContent = isRegister ? '切換登入' : '切換註冊';
        }

        async function handleAuth() {
            const email = document.getElementById('authEmail').value.trim();
            const password = document.getElementById('authPassword').value;
            if (!email || !password) { showToast('⚠️ 請輸入完整', 'error'); return; }
            if (password.length < 6) { showToast('⚠️ 密碼至少6碼', 'error'); return; }
            try {
                if (isRegister) {
                    const nick = document.getElementById('authNickname').value.trim() || email.split('@')[0];
                    const { data, error } = await supabase.auth.signUp({ email, password, options: { data: { nickname: nick } } });
                    if (error) throw error;
                    showToast('✅ 註冊成功！請重新登入', 'success');
                    toggleAuthMode();
                } else {
                    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                    if (error) throw error;
                    currentUser = data.user;
                    await supabase.from('profiles').update({ is_online: true, login_count: (await supabase.from(

        // ==================== 雷達 ====================
        function initRadarMap(lat, lng) {
            if (radarMap) { radarMap.setView([lat, lng], 14);
                myMarker.setLatLng([lat, lng]);
                radarCircle.setLatLng([lat, lng]); return; }
            radarMap = L.map('radarMap', { zoomControl: false, attributionControl: false }).setView([lat, lng], 14);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(radarMap);
            myMarker = L.marker([lat, lng], { icon: L.divIcon({ html: '<div style="background:#fff;width:14px;height:14px;border-radius:50%;border:3px solid var(--accent);box-shadow:0 0 12px var(--accent);"></div>',
                    iconSize: [14, 14] }) }).addTo(radarMap);
            radarCircle = L.circle([lat, lng], { radius: 1500, color: 'var(--accent)', weight: 1, fillOpacity: 0.02 }).addTo(
                radarMap);
        }

        function toggleTracking() {
            if (tracking) { stopTracking(); return; }
            if (!navigator.geolocation) { showToast('❌ 不支援GPS', 'error'); return; }
            showToast('🔍 搜尋GPS...', 'info');
            navigator.geolocation.getCurrentPosition(pos => {
                currentPosition = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                initRadarMap(currentPosition.lat, currentPosition.lng);
                uploadTrailPoint();
            }, e => showToast('❌ GPS錯誤', 'error'), { enableHighAccuracy: true, timeout: 20000 });
            watchId = navigator.geolocation.watchPosition(pos => {
                currentPosition = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                initRadarMap(currentPosition.lat, currentPosition.lng);
                if (currentUser) supabase.from('profiles').update({ current_lat: currentPosition.lat, current_lng: currentPosition
                        .lng, is_online: true }).eq('id', currentUser.id);
                refreshRadarMarkers();
                uploadTrailPoint();
            }, () => {}, { enableHighAccuracy: true, timeout: 15000, maximumAge: 10000 });
            tracking = true;
            document.getElementById('trackBtn').textContent = '⏸️ 停止雷達';
            document.getElementById('sweeperEl').style.display = 'block';
        }

        function stopTracking() {
            if (watchId) navigator.geolocation.clearWatch(watchId);
            tracking = false;
            document.getElementById('trackBtn').textContent = '▶️ 啟動雷達';
            document.getElementById('sweeperEl').style.display = 'none';
        }

            const { data: users } = await supabase.from('profiles').select('*').not('current_lat', 'is', null).eq(
                'is_shielded', false);

            const myTeamRes = await supabase.from('profiles').select('current_team_id').eq('id', currentUser.id).single();
            const myTeamId = myTeamRes.data?.current_team_id;

            users.forEach(u => {
                if (u.id === currentUser.id) return;
                const dist = calcDistance(currentPosition.lat, currentPosition.lng, u.current_lat, u.current_lng);
                if (dist > 1500) return;
                const isTeaming = u.is_teaming;
                const color = isTeaming ? 'var(--team-color)' : 'var(--stranger-color)';
                const html =
                    `<div style="background:${color};width:14px;height:14px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 10px ${color};${isTeaming?'display:flex;align-items:center;justify-content:center;color:#fff;font-size:9px;':''}">${isTeaming?'🔥':''}</div>`;
                const marker = L.marker([u.current_lat, u.current_lng], { icon: L.divIcon({ html, iconSize: [16,
                        16] }) }).addTo(radarMap);
                marker.bindPopup(
                    `<div style="color:#333;text-align:center;"><b>${u.nickname}</b><br>${isTeaming?`🔥 ${u.team_name||'招募中'}<br><button class="btn-action" onclick="requestJoinTeam('${u.id}','${u.nickname}')">📩 申請加入</button>`:'散人'}</div>`

        function initHistoryMap() {

        async function loadHistory() {
            if (!currentUser) return;
            const start = document.getElementById('startDate').value + 'T00:00:00';
            const end = document.getElementById('endDate').value + 'T23:59:59';
            const { data } = await supabase.from('location_history').select('*').eq('user_id', currentUser.id).gte(
                'recorded_at', start).lte('recorded_at', end).order('recorded_at');
            if (!data?.length) { showToast('⚠️ 無資料', 'error'); return; }
            currentHistoryData = data;
            initHistoryMap();
            if (!historyMap) return;
            historyMap.eachLayer(l => { if (!(l instanceof L.TileLayer)) historyMap.removeLayer(l); });
            const latlngs = data.map(p => [p.lat, p.lng]);
            L.polyline(latlngs, { color: '#4da6ff', weight: 3 }).addTo(historyMap);
            if (L.heatLayer) L.heatLayer(latlngs, { radius: 20, blur: 15 }).addTo(historyMap);
            const stops = detectStops(data);
            analyzeAndDisplay(stops, data);
            stops.forEach(s => L.circleMarker([s.lat, s.lng], { radius: 8, color: '#f59e0b', fillOpacity: 0.6 }).bindPopup(
                `停留 ${Math.round(s.duration)} 分鐘`).addTo(historyMap));
            drawDistanceChart(data);
            historyMap.fitBounds(L.polyline(latlngs).getBounds().pad(0.2));
            showToast(`✅ 已載入 ${data.length} 點`, 'success');
        }

        function detectStops(points) {
            const stops = [];
            let start = 0;
            for (let i = 1; i < points.length; i++) {
                const d = calcDistance(points[i - 1].lat, points[i - 1].lng, points[i].lat, points[i].lng);
                const t = (new Date(points[i].recorded_at) - new Date(points[i - 1].recorded_at)) / 1000;
                if (d < 50 && t < 300 && i - start > 3) {
                    if (stops.length && start - stops[stops.length - 1].endIdx < 3) stops[stops.length - 1].endIdx = i;
                    else stops.push({ startIdx: start, endIdx: i });
                } else start = i;
            }
            return stops.map(s => ({ start: points[s.startIdx].recorded_at, end: points[s.endIdx].recorded_at, lat: points[
                    s.startIdx].lat, lng: points[s.startIdx].lng, duration: (new Date(points[s.endIdx].recorded_at) -
                    new Date(points[s.startIdx].recorded_at)) / 60000 }));
        }

        function analyzeAndDisplay(stops, points) {
            let d = 0;
            for (let i = 1; i < points.length; i++) d += calcDistance(points[i - 1].lat, points[i - 1].lng, points[i].lat,
                points[i].lng);
            document.getElementById('totalDistance').textContent = (d / 1000).toFixed(2) + ' km';
            const stay = stops.reduce((a, b) => a + b.duration, 0);
            document.getElementById('totalStayTime').textContent = Math.floor(stay / 60) + 'h ' + Math.round(stay % 60) + 'm';
            document.getElementById('totalStops').textContent = stops.length;
            document.getElementById('topPlace').textContent = stops.length ? Object.entries(stops.reduce((acc, s) => { const k =
                    s.lat.toFixed(4) + ',' + s.lng.toFixed(4);
                acc[k] = (acc[k] || 0) + 1; return acc; }, {})).sort((a, b) => b[1] - a[1])[0][0] : '無';
            document.getElementById('stayTable').innerHTML = stops.slice(0, 20).map(s =>
                `<div class="list-row"><span>${new Date(s.start).toLocaleTimeString()}-${new Date(s.end).toLocaleTimeString()}</span><span>${Math.round(s.duration)}分鐘</span></div>`
            ).join('') || '無';
        }

        function drawDistanceChart(points) {
            const daily = {};
            for (let i = 1; i < points.length; i++) { const date = points[i].recorded_at.split('T')[0];
                daily[date] = (daily[date] || 0) + calcDistance(points[i - 1].lat, points[i - 1].lng, points[i].lat, points[
                    i].lng); }
            const labels = Object.keys(daily).sort(),
                data = labels.map(d => (daily[d] / 1000).toFixed(2));
            if (distanceChart) distanceChart.destroy();
            const ctx = document.getElementById('distanceChart')?.getContext('2d');
            if (ctx) distanceChart = new Chart(ctx, { type: 'bar', data: { labels, datasets: [{ label: '每日距離(km)',
                    data, backgroundColor: '#4da6ff' }] }, options: { responsive: true,
                    maintainAspectRatio: false } });
        }

        function exportCSV() {
            if (!currentHistoryData) return;
            const stops = detectStops(currentHistoryData);
            let csv = '\uFEFF時間,緯度,經度\n';
            currentHistoryData.forEach(p => csv += `${p.recorded_at},${p.lat},${p.lng}\n`);
            csv += '\n停留明細\n';
            stops.forEach(s => csv +=
                `${s.start},${s.end},${s.lat.toFixed(6)},${s.lng.toFixed(6)},${Math.round(s.duration)}\n`);
            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
            a.download = '軌跡_' + new Date().toISOString().split('T')[0] + '.csv';
            a.click();
        }

                    console.log('✅ RPC 呼叫成功');
                } catch (rpcErr) {
                    console.warn('⚠️ RPC 呼叫失敗（不影響登入）:', rpcErr.message);
                }
                
                // 檢查是否已登入
                if (sessionData?.session?.user) {
                    currentUser = sessionData.session.user;
                    statusEl.textContent = '🟢 已連線，正在進入...';
                    statusEl.style.color = '#2ecc71';
                    enterMainApp();
                } else {
                    statusEl.textContent = '🟢 主機已就緒，請登入';
                    statusEl.style.color = '#2ecc71';
                }
                
            } catch (e) {
                console.error('初始化錯誤:', e);
                statusEl.textContent = '🔴 初始化失敗：' + e.message;
                statusEl.style.color = '#e74c3c';
            }
        };
    </script>
</body>
</html>
