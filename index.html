<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover, maximum-scale=1.0">
    <title>📍 七龍珠雷達定位系統 - 台灣精準版</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>

    <style>
        :root {
            --bg: #0a0a10;
            --surface: #161622;
            --surface2: #1e1e2e;
            --border: #2a2a3e;
            --text: #e8e8f0;
            --text2: #9898b0;
            --accent: #4ade80; /* 七龍珠雷達綠 */
            --radar-glow: rgba(74, 222, 128, 0.15);
            --success: #4ade80;
            --warning: #facc15;
            --danger: #f87171;
            --radius: 14px;
            --radius-sm: 10px;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang TC', 'Noto Sans TC', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            padding-bottom: 50px;
        }
        .app-container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .card {
            background: var(--surface);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .card-title {
            font-size: 0.9rem;
            font-weight: 700;
        }
        .btn {
            padding: 10px 16px;
            border-radius: 25px;
            border: none;
            font-weight: 700;
            font-size: 0.8rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            font-family: inherit;
        }
        .btn:active {
            transform: scale(0.95);
        }
        .btn-primary {
            background: var(--accent);
            color: #000;
            width: 100%;
        }
        .btn-outline {
            background: transparent;
            color: var(--accent);
            border: 2px solid var(--accent);
        }
        .btn-sm {
            padding: 6px 12px;
            font-size: 0.7rem;
        }
        .btn-danger {
            background: transparent;
            color: var(--danger);
            border: 2px solid var(--danger);
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .input-group label {
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--text2);
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .input-group input {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 8px 12px;
            color: var(--text);
            font-size: 0.8rem;
            font-family: inherit;
            outline: none;
        }
        .input-group input:focus {
            border-color: var(--accent);
        }
        .tab-nav {
            display: flex;
            gap: 6px;
            background: var(--surface);
            border-radius: var(--radius);
            padding: 4px;
            border: 1px solid var(--border);
        }
        .tab-btn {
            flex: 1;
            padding: 10px;
            border-radius: var(--radius-sm);
            background: transparent;
            color: var(--text2);
            font-weight: 700;
            font-size: 0.8rem;
            text-align: center;
            cursor: pointer;
            border: none;
        }
        .tab-btn.active {
            background: var(--accent);
            color: #000;
        }
        .map-container {
            height: 280px;
            border-radius: var(--radius-sm);
            overflow: hidden;
            border: 1px solid var(--border);
        }
        
        /* 🐉 七龍珠雷達風特殊地圖樣式 */
        .radar-map-wrapper {
            position: relative;
            border: 4px solid #333;
            border-radius: 50%;
            width: 100%;
            padding-bottom: 100%;
            overflow: hidden;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8), 0 0 15px var(--accent);
            background: #041408;
        }
        #radarMap {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
        }
        .radar-crosshair {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1000;
        }
        .radar-crosshair::before {
            content: ''; position: absolute; top: 0; left: 50%; width: 2px; height: 100%; background: rgba(74, 222, 128, 0.25);
        }
        .radar-crosshair::after {
            content: ''; position: absolute; top: 50%; left: 0; height: 2px; width: 100%; background: rgba(74, 222, 128, 0.25);
        }

        /* 自訂小藍點脈衝動畫 */
        .radar-pulse-icon {
            background: #2563eb;
            border: 2px solid #fff;
            border-radius: 50%;
            box-shadow: 0 0 10px #2563eb;
        }
        .radar-pulse-icon::after {
            content: '';
            display: block;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: rgba(37, 99, 235, 0.4);
            animation: pulse 1.8s infinite ease-out;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(3); opacity: 0; }
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .stat-item {
            background: var(--surface2);
            border-radius: var(--radius-sm);
            padding: 12px;
            text-align: center;
        }
        .stat-value {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--accent);
        }
        .stat-label {
            font-size: 0.65rem;
            color: var(--text2);
        }
        .chart-container {
            height: 200px;
        }
        .list-item {
            background: var(--surface2);
            border-radius: var(--radius-sm);
            padding: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.75rem;
            margin-bottom: 4px;
        }
        .toast-container {
            position: fixed;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 6px;
            pointer-events: none;
            width: 90%;
            max-width: 420px;
        }
        .toast {
            padding: 10px 16px;
            border-radius: 22px;
            font-weight: 600;
            font-size: 0.8rem;
            text-align: center;
            animation: toastIn 0.3s, toastOut 0.3s 2.7s forwards;
            pointer-events: auto;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
        }
        .toast.success { background: #1a3a2a; color: var(--success); border: 1px solid #2a5a3a; }
        .toast.error { background: #3a1a1a; color: var(--danger); border: 1px solid #5a2a2a; }
        .toast.info { background: #1a2a3a; color: #5b9cf5; border: 1px solid #2a3a5a; }
        .toast.warning { background: #3a2a1a; color: var(--warning); border: 1px solid #5a4a2a; }
        
        @keyframes toastIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes toastOut { from { opacity: 1; } to { opacity: 0; transform: translateY(-15px); } }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="toast-container" id="toastContainer"></div>

    <div class="app-container" id="authPage">
        <div class="card" style="text-align:center; padding:30px;">
            <h2 style="background:linear-gradient(135deg,#4ade80,#22c55e);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">🐉 龍珠雷達定位系統</h2>
            <p style="color:var(--text2);font-size:0.8rem;">即時雷達探測、邊界圈畫定、到訪通知、歷史分析</p>
            <p style="font-size:0.7rem;" id="connectionStatus">🔄 正在連線...</p>
        </div>
        <div class="card" id="loginCard">
            <div class="card-title">🔐 登入 / 註冊</div>
            <div class="input-group">
                <label>Email</label>
                <input type="email" id="authEmail" placeholder="you@example.com">
            </div>
            <div class="input-group">
                <label>密碼（至少 6 碼）</label>
                <input type="password" id="authPassword" placeholder="••••••">
            </div>
            <div class="input-group hidden" id="nicknameGroup">
                <label>顯示名稱</label>
                <input type="text" id="authNickname" placeholder="你的暱稱">
            </div>
            <button class="btn btn-primary" id="authActionBtn" onclick="handleAuthAction()">登入</button>
            <button class="btn btn-sm btn-outline" id="authToggleBtn" onclick="toggleAuthMode()">還沒有帳號？註冊</button>
        </div>
    </div>

    <div class="app-container hidden" id="mainApp">
        <div class="tab-nav">
            <button class="tab-btn active" onclick="switchTab('monitor')">🟢 雷達探測</button>
            <button class="tab-btn" onclick="switchTab('history')">📊 軌跡歷程</button>
        </div>

        <div id="monitorTab">
            <div class="card" style="align-items: center; background: #0c0d14;">
                <div class="card-title" style="align-self: flex-start;">📡 龍珠探測雷達區域</div>
                <div class="radar-map-wrapper">
                    <div id="radarMap"></div>
                    <div class="radar-crosshair"></div>
                </div>
                <div id="currentLocation" style="font-family:monospace; font-size:0.75rem; color:var(--text2); margin-top:5px;">--</div>
            </div>

            <div class="card">
                <div class="card-title">🛰️ 雷達控制台</div>
                <div style="display:flex; gap:8px;">
                    <button class="btn btn-primary" id="trackingBtn" onclick="toggleTracking()" style="flex:1;">▶️ 啟動雷達掃描</button>
                    <button class="btn btn-sm btn-danger" onclick="handleLogout()">登登出</button>
                </div>
            </div>

            <div class="card">
                <div class="card-title">🧑‍🤝‍🧑 好友偵測邊界 (可自訂雷達範圍)</div>
                <div id="friendList" style="max-height:160px; overflow-y:auto;">
                    <div style="text-align:center;color:var(--text2);padding:20px;">👥 尚未綁定好友</div>
                </div>
                <button class="btn btn-sm btn-outline" onclick="showAddFriendModal()">＋ 綁定好友並設定探測半徑</button>
            </div>

            <div class="card">
                <div class="card-title">📍 定點目標區域</div>
                <div id="staticTargetList" style="max-height:160px; overflow-y:auto;">
                    <div style="text-align:center;color:var(--text2);padding:20px;">📋 尚無定點目標</div>
                </div>
                <button class="btn btn-sm btn-outline" onclick="showAddStaticTargetModal()">＋ 新增搜尋地址/店名</button>
            </div>

            <div class="card">
                <div class="card-title">📅 期間限定活動</div>
                <div id="eventList" style="max-height:160px; overflow-y:auto;">
                    <div style="text-align:center;color:var(--text2);padding:20px;">📋 尚無活動</div>
                </div>
                <button class="btn btn-sm btn-outline" onclick="showAddEventModal()">＋ 新增活動</button>
            </div>
        </div>

        <div id="historyTab" class="hidden">
            <div id="printArea">
                <div class="card">
                    <div class="card-title">📆 時間區間</div>
                    <div style="display:flex; gap:10px; align-items:center;">
                        <input type="date" id="startDate" style="flex:1; background:var(--surface2); color:#fff; border:1px solid var(--border); padding:5px;">
                        <span>～</span>
                        <input type="date" id="endDate" style="flex:1; background:var(--surface2); color:#fff; border:1px solid var(--border); padding:5px;">
                    </div>
                    <button class="btn btn-primary" onclick="loadHistory()">🔍 查詢軌跡歷程</button>
                </div>
                <div class="card">
                    <div class="card-title">📊 數據摘要</div>
                    <div class="stats-grid">
                        <div class="stat-item"><div class="stat-value" id="totalDistance">--</div><div class="stat-label">總移動距離</div></div>
                        <div class="stat-item"><div class="stat-value" id="totalStayTime">--</div><div class="stat-label">總停留時間</div></div>
                        <div class="stat-item"><div class="stat-value" id="totalStops">--</div><div class="stat-label">停留次數</div></div>
                        <div class="stat-item"><div class="stat-value" id="topPlace">--</div><div class="stat-label">最常停留點</div></div>
                    </div>
                </div>
                <div class="card">
                    <div class="card-title">🗺️ 軌跡歷程地圖</div>
                    <div class="map-container" id="historyMap"></div>
                </div>
                <div class="card">
                    <div class="card-title">📈 每日移動距離</div>
                    <div class="chart-container"><canvas id="distanceChart"></canvas></div>
                </div>
            </div>
            <div class="card">
                <button class="btn btn-outline" onclick="exportCSV()">📥 匯出 CSV</button>
                <button class="btn btn-outline" onclick="window.print()">🖨️ 列印報表</button>
            </div>
        </div>

        <div class="card">
            <div class="card-title" onclick="toggleEmailSettings()" style="cursor:pointer;">⚙️ 郵件設定 ▼</div>
            <div id="emailSettingsPanel" class="hidden">
                <div class="input-group"><label>EmailJS Public Key</label><input id="emailjsPublicKey" placeholder="abc123..."></div>
                <div class="input-group"><label>Service ID</label><input id="emailjsServiceId" placeholder="service_xxx"></div>
                <div class="input-group"><label>Template ID</label><input id="emailjsTemplateId" placeholder="template_xxx"></div>
                <div class="input-group"><label>預設收件人</label><input id="defaultRecipient" placeholder="me@example.com"></div>
                <button class="btn btn-sm btn-outline" onclick="saveEmailSettings()">💾 儲存</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://hknxdvefnuxgyepuuqra.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhrbnhkdmVmbnV4Z3llcHV1cXJhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1MzM0MDAsImV4cCI6MjA5NzEwOTQwMH0.M97OwM_9CrLCrgxbyA6kQs0MLFiRDzyYlvIiGqhBGec';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = null;
        let tracking = false;
        let watchId = null;
        let currentPosition = null;
        
        let radarMap = null;
        let historyMap = null;
        let distanceChart = null;
        let currentHistoryData = null;
        let isRegisterMode = false;

        let myLocationMarker = null;
        let radarCircle = null;

        function showToast(msg, type = 'info') {
            const t = document.createElement('div');
            t.className = `toast ${type}`;
            t.textContent = msg;
            document.getElementById('toastContainer').appendChild(t);
            setTimeout(() => { if (t.parentNode) t.remove(); }, 3500);
        }

        // 🇹🇼 台灣限定防呆搜尋函數（精準過濾非台灣地區的地點）
        async function searchCoordinates(query) {
            if (!query) return null;
            try {
                const TaiwanViewBox = '119.3,25.4,122.1,21.7'; 
                const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&countrycodes=tw&viewbox=${TaiwanViewBox}&bounded=1`;
                
                const response = await fetch(url);
                const data = await response.json();
                
                if (data && data.length > 0) {
                    return { 
                        lat: parseFloat(data[0].lat), 
                        lng: parseFloat(data[0].lon), 
                        displayName: data[0].display_name 
                    };
                } else {
                    showToast('🔍 台灣境內找不到該地點，請確認名稱或加上縣市（如：台北市輕易豐盛）', 'warning');
                    return null;
                }
            } catch (e) {
                showToast('❌ 無法連線地址解析伺服器', 'error');
                return null;
            }
        }

        function initRadarMap(lat, lng, alertRadius = 1000) {
            if (radarMap) {
                radarMap.setView([lat, lng]);
                if (myLocationMarker) myLocationMarker.setLatLng([lat, lng]);
                if (radarCircle) {
                    radarCircle.setLatLng([lat, lng]);
                    radarCircle.setRadius(alertRadius);
                }
                return;
            }

            radarMap = L.map('radarMap', { zoomControl: false, attributionControl: false }).setView([lat, lng], 15);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 20 }).addTo(radarMap);

            const bluePulseIcon = L.divIcon({ className: 'radar-pulse-icon', iconSize: [14, 14], iconAnchor: [7, 7] });
            myLocationMarker = L.marker([lat, lng], { icon: bluePulseIcon }).addTo(radarMap);

            radarCircle = L.circle([lat, lng], {
                radius: alertRadius,
                color: '#4ade80',
                weight: 2,
                fillColor: '#4ade80',
                fillOpacity: 0.08
            }).addTo(radarMap);
        }

        // 帳號認證
        function toggleAuthMode() {
            isRegisterMode = !isRegisterMode;
            document.getElementById('nicknameGroup').classList.toggle('hidden', !isRegisterMode);
            document.getElementById('authActionBtn').textContent = isRegisterMode ? '註冊' : '登入';
            document.getElementById('authToggleBtn').textContent = isRegisterMode ? '還沒有帳號？登入' : '還沒有帳號？註冊';
        }

        async function handleAuthAction() {
            const email = document.getElementById('authEmail').value.trim();
            const password = document.getElementById('authPassword').value;
            if (!email || !password) { showToast('⚠️ 請填寫資料', 'error'); return; }

            try {
                if (isRegisterMode) {
                    const nickname = document.getElementById('authNickname').value.trim();
                    if (!nickname) { showToast('⚠️ 請填寫顯示名稱', 'error'); return; }
                    const { error } = await supabaseClient.auth.signUp({ email, password, options: { data: { nickname } } });
                    if (error) throw error;
                    showToast('✅ 註冊成功！請直接登入', 'success');
                    toggleAuthMode();
                } else {
                    const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
                    if (error) throw error;
                    currentUser = data.user;
                    showMainApp();
                    showToast('✅ 登入成功！', 'success');
                }
            } catch (e) {
                showToast('❌ ' + e.message, 'error');
            }
        }

        async function handleLogout() {
            if (tracking) stopTracking();
            await supabaseClient.auth.signOut();
            currentUser = null;
            document.getElementById('mainApp').classList.add('hidden');
            document.getElementById('authPage').classList.remove('hidden');
            showToast('👋 已登出', 'info');
        }

        function showMainApp() {
            document.getElementById('authPage').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            setTimeout(() => { initRadarMap(25.0478, 121.5170, 1000); }, 300);
            loadAllData();
            loadEmailSettingsFromStorage();
        }

        async function loadAllData() {
            if (!currentUser) return;
            try {
                const [fRes, tRes, eRes] = await Promise.all([
                    supabaseClient.from('friendships').select('*').eq('user_id', currentUser.id),
                    supabaseClient.from('static_targets').select('*').eq('user_id', currentUser.id),
                    supabaseClient.from('events').select('*').eq('user_id', currentUser.id).eq('is_expired', false)
                ]);
                
                let customRadius = 1000;
                const friends = fRes.data || [];
                if (friends.length > 0 && friends[0].alert_radius) {
                    customRadius = friends[0].alert_radius;
                }
                if (currentPosition) {
                    initRadarMap(currentPosition.lat, currentPosition.lng, customRadius);
                }

                renderList('friendList', friends, '👥 尚未綁定好友', '🧑', '好友', 'alert_radius', 'm');
                renderList('staticTargetList', tRes.data || [], '📋 尚無定點目標', '📍', '地點', 'alert_radius', 'm');
                renderList('eventList', eRes.data || [], '📅 尚無活動', '📅', '活動', null, null, 'end_date');
            } catch (e) {
                console.warn(e.message);
            }
        }

        function renderList(elementId, data, emptyMsg, icon, label, radiusField, radiusUnit, dateField) {
            const el = document.getElementById(elementId);
            if (!data || !data.length) {
                el.innerHTML = `<div style="text-align:center;color:var(--text2);padding:20px;">${emptyMsg}</div>`;
                return;
            }
            el.innerHTML = data.map(item => {
                let detail = '';
                if (radiusField && item[radiusField]) detail = `半徑 ${item[radiusField]}${radiusUnit||''}`;
                if (dateField && item[dateField]) detail = item[dateField];
                const name = item.name || item.friend_nickname || label;
                return `<div class="list-item" style="justify-content:space-between;">
                    <span>${icon} ${name}</span>
                    <span style="color:var(--accent); font-weight:bold;">${detail}</span>
                    <button class="btn btn-sm btn-danger" onclick="deleteItem('${elementId}', '${item.id}')">✕</button>
                </div>`;
            }).join('');
        }

        async function deleteItem(listId, id) {
            let table = listId === 'friendList' ? 'friendships' : (listId === 'staticTargetList' ? 'static_targets' : 'events');
            if (table === 'events') {
                await supabaseClient.from(table).update({ is_expired: true }).eq('id', id);
            } else {
                await supabaseClient.from(table).delete().eq('id', id);
            }
            loadAllData();
            showToast('已移除偵測點', 'info');
        }

        async function showAddFriendModal() {
            const email = prompt('請輸入好友的 Email：');
            if (!email) return;
            const nickname = prompt('請輸入要顯示的好友暱稱：');
            if (!nickname) return;
            const radius = prompt('設定雷達探測距離（公尺）：', '1000');
            const parsedRadius = parseInt(radius) || 1000;

            showToast('🔄 正在向資料庫驗證帳號約束...', 'info');

            let finalFriendId = '00000000-0000-0000-0000-000000000000';
            try {
                const { data: pData } = await supabaseClient.from('profiles').select('id').eq('email', email.trim()).single();
                if (pData) finalFriendId = pData.id;
            } catch(e) {
                finalFriendId = crypto.randomUUID ? crypto.randomUUID() : 'f92c632a-' + Math.floor(Math.random()*10000) + '-4000-8000-auto-id';
            }

            const { error } = await supabaseClient.from('friendships').insert({
                user_id: currentUser.id,
                friend_id: finalFriendId,
                friend_nickname: nickname,
                alert_radius: parsedRadius,
                alert_enabled: true
            });

            if (error) {
                showToast('❌ 新增失敗：' + error.message, 'error');
            } else {
                showToast(`✅ 成功建立 ${parsedRadius}m 雷達偵測圈！`, 'success');
                if (currentPosition) initRadarMap(currentPosition.lat, currentPosition.lng, parsedRadius);
                loadAllData();
            }
        }

        // 🟢 定點目標：加入使用者「核對地址」防呆確認機制
        async function showAddStaticTargetModal() {
            const query = prompt('請輸入地址或店家名稱：\n(例如：台北車站、輕易豐盛學院)');
            if (!query) return;

            showToast('🔄 正在台灣境內精準定位...', 'info');
            const geoData = await searchCoordinates(query);
            
            if (geoData) {
                // 💡 跳出確認對話框，強迫使用者肉眼核對地址！
                const checkAddress = confirm(`❓ 請核對系統為您找到的台灣地址：\n\n系統解析結果：\n${geoData.displayName}\n\n這是否為您想設定的正確位置？`);
                
                if (!checkAddress) {
                    showToast('⏸️ 已取消儲存，請輸入更詳細的地址再次搜尋。', 'info');
                    return;
                }

                const customName = prompt(`核對成功！請為此地點命名：`, query);
                if (!customName) return;

                addItem('static_targets', { 
                    user_id: currentUser.id, 
                    name: customName, 
                    lat: geoData.lat, 
                    lng: geoData.lng, 
                    alert_radius: 500 
                }, '定點目標');
            }
        }

        // 🟢 期間限定活動：同樣加入「核對地址」防呆確認機制
        async function showAddEventModal() {
            const query = prompt('請輸入活動舉辦的地址或店名：');
            if (!query) return;

            showToast('🔄 正在台灣境內精準定位...', 'info');
            const geoData = await searchCoordinates(query);
            
            if (geoData) {
                // 💡 跳出確認對話框，強迫使用者肉眼核對地址！
                const checkAddress = confirm(`❓ 請核對系統為您找到的台灣活動地點：\n\n系統解析結果：\n${geoData.displayName}\n\n這是否為您想設定的正確位置？`);
                
                if (!checkAddress) {
                    showToast('⏸️ 已取消儲存。', 'info');
                    return;
                }

                const eventName = prompt('請輸入活動名稱：');
                if (!eventName) return;
                const endDate = prompt('結束日期 (YYYY-MM-DD)：', new Date(Date.now() + 7 * 86400000).toISOString().split('T')[0]);
                
                addItem('events', { 
                    user_id: currentUser.id, 
                    name: eventName, 
                    lat: geoData.lat, 
                    lng: geoData.lng, 
                    alert_radius: 500, 
                    start_date: new Date().toISOString().split('T')[0], 
                    end_date: endDate 
                }, '活動');
            }
        }

        async function addItem(table, data, label) {
            const { error } = await supabaseClient.from(table).insert(data);
            if (error) { showToast('❌ 寫入失敗: ' + error.message, 'error'); return; }
            showToast(`✅ 已新增${label}至雷達背景庫`, 'success');
            loadAllData();
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            if (tab === 'monitor') {
                document.querySelector('.tab-btn:nth-child(1)').classList.add('active');
                document.getElementById('monitorTab').classList.remove('hidden');
                document.getElementById('historyTab').classList.add('hidden');
                if (radarMap) setTimeout(() => radarMap.invalidateSize(), 200);
            } else {
                document.querySelector('.tab-btn:nth-child(2)').classList.add('active');
                document.getElementById('monitorTab').classList.add('hidden');
                document.getElementById('historyTab').classList.remove('hidden');
                const now = new Date();
                document.getElementById('endDate').value = now.toISOString().split('T')[0];
                document.getElementById('startDate').value = new Date(now - 7 * 86400000).toISOString().split('T')[0];
                setTimeout(initHistoryMap, 300);
            }
        }

        // GPS 雷達監控
        function toggleTracking() { tracking ? stopTracking() : startTracking(); }

        function startTracking() {
            if (!navigator.geolocation) { showToast('❌ 設備不支援 GPS', 'error'); return; }
            showToast('📡 正在點火發射雷達波...', 'info');

            watchId = navigator.geolocation.watchPosition(
                pos => {
                    currentPosition = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                    document.getElementById('currentLocation').textContent = `雷達中心點 ➔ 緯度: ${currentPosition.lat.toFixed(6)}, 經度: ${currentPosition.lng.toFixed(6)}`;
                    
                    let currentRadius = 1000;
                    const listItems = document.getElementById('friendList').innerText;
                    if(listItems.includes('半徑')) {
                        const match = listItems.match(/半徑\s(\d+)/);
                        if(match) currentRadius = parseInt(match[1]);
                    }
                    
                    initRadarMap(currentPosition.lat, currentPosition.lng, currentRadius);
                    uploadTrailPoint();
                },
                err => showToast('❌ GPS 訊號微弱: ' + err.message, 'error'),
                { enableHighAccuracy: true, timeout: 15000, maximumAge: 5000 }
            );

            tracking = true;
            document.getElementById('trackingBtn').textContent = '⏸️ 關閉雷達掃描';
            document.getElementById('trackingBtn').style.background = '#e05858';
            showToast('✅ 雷達正持續掃描周遭中', 'success');
        }

        function stopTracking() {
            if (watchId) navigator.geolocation.clearWatch(watchId);
            tracking = false;
            document.getElementById('trackingBtn').textContent = '▶️ 啟動雷達掃描';
            document.getElementById('trackingBtn').style.background = 'var(--accent)';
            showToast('⏸️ 雷達波已關閉', 'info');
        }

        async function uploadTrailPoint() {
            if (!currentUser || !currentPosition) return;
            await supabaseClient.from('location_history').insert({ user_id: currentUser.id, lat: currentPosition.lat, lng: currentPosition.lng, recorded_at: new Date().toISOString() });
        }

        function initHistoryMap() {
            const el = document.getElementById('historyMap');
            if (!el || el.offsetHeight === 0) return;
            if (historyMap) { historyMap.invalidateSize(); return; }
            historyMap = L.map('historyMap').setView([25.033, 121.565], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(historyMap);
        }

        async function loadHistory() {
            if (!currentUser) return;
            const start = document.getElementById('startDate').value + 'T00:00:00';
            const end = document.getElementById('endDate').value + 'T23:59:59';
            const { data, error } = await supabaseClient.from('location_history').select('*').eq('user_id', currentUser.id).gte('recorded_at', start).lte('recorded_at', end).order('recorded_at', { ascending: true });
            if (error || !data.length) { showToast('⚠️ 該時段無訊號紀錄', 'warning'); return; }

            currentHistoryData = data;
            initHistoryMap();
            historyMap.eachLayer(l => { if (!(l instanceof L.TileLayer)) historyMap.removeLayer(l); });
            const latlngs = data.map(p => [p.lat, p.lng]);
            L.polyline(latlngs, { color: '#4ade80', weight: 4 }).addTo(historyMap);
            historyMap.fitBounds(L.polyline(latlngs).getBounds());
            showToast('✅ 歷史訊號加載完成', 'success');
        }

        function exportCSV() {
            if (!currentHistoryData) return;
            let csv = '\uFEFF時間,緯度,經度\n';
            currentHistoryData.forEach(p => csv += `${p.recorded_at},${p.lat},${p.lng}\n`);
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = '雷達軌跡歷程.csv'; a.click();
        }

        function toggleEmailSettings() { document.getElementById('emailSettingsPanel').classList.toggle('hidden'); }
        function saveEmailSettings() {
            const s = { publicKey: document.getElementById('emailjsPublicKey').value, serviceId: document.getElementById('emailjsServiceId').value, templateId: document.getElementById('emailjsTemplateId').value, defaultRecipient: document.getElementById('defaultRecipient').value };
            localStorage.setItem('emailjs_settings', JSON.stringify(s)); showToast('💾 儲存成功', 'success');
        }
        function loadEmailSettingsFromStorage() {
            const s = JSON.parse(localStorage.getItem('emailjs_settings') || '{}');
            if (s.publicKey) { document.getElementById('emailjsPublicKey').value = s.publicKey; document.getElementById('emailjsServiceId').value = s.serviceId; document.getElementById('emailjsTemplateId').value = s.templateId; document.getElementById('defaultRecipient').value = s.defaultRecipient; }
        }

        window.onload = async function() {
            try {
                const sessionRes = await supabaseClient.auth.getSession();
                if (sessionRes.data.session?.user) {
                    currentUser = sessionRes.data.session.user;
                    showMainApp();
                } else {
                    document.getElementById('authPage').classList.remove('hidden');
                }
                document.getElementById('connectionStatus').textContent = '🟢 雷達主機已連線';
                document.getElementById('connectionStatus').style.color = 'var(--success)';
            } catch (e) {
                document.getElementById('authPage').classList.remove('hidden');
            }
        };
    </script>
</body>
</html>
