<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover, maximum-scale=1.0">
    <title>📍 社群位置監控 + 歷史軌跡分析</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>

    <style>
        :root {
            --bg: #0a0a10; --surface: #161622; --surface2: #1e1e2e; --border: #2a2a3e;
            --text: #e8e8f0; --text2: #9898b0; --accent: #5b9cf5; --success: #4ade80;
            --warning: #facc15; --danger: #f87171; --friend: #c084fc; --event: #f59e0b;
            --radius: 14px; --radius-sm: 10px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang TC', 'Noto Sans TC', sans-serif;
            background: var(--bg); color: var(--text); min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; padding: 10px; padding-bottom: 50px;
        }
        .app-container { width:100%; max-width:500px; display:flex; flex-direction:column; gap:10px; }
        .tab-nav { display:flex; gap:6px; background:var(--surface); border-radius:var(--radius); padding:4px; border:1px solid var(--border); }
        .tab-btn { flex:1; padding:10px; border-radius:var(--radius-sm); background:transparent; color:var(--text2); font-weight:700; font-size:0.8rem; text-align:center; cursor:pointer; border:none; transition:0.2s; }
        .tab-btn.active { background:var(--accent); color:#000; }
        .card { background:var(--surface); border-radius:var(--radius); border:1px solid var(--border); padding:14px; display:flex; flex-direction:column; gap:10px; }
        .card-title { font-size:0.9rem; font-weight:700; }
        .btn { padding:10px 16px; border-radius:25px; border:none; font-weight:700; font-size:0.8rem; cursor:pointer; display:inline-flex; align-items:center; justify-content:center; gap:5px; transition:0.2s; font-family:inherit; }
        .btn:active { transform:scale(0.95); }
        .btn-primary { background:var(--accent); color:#000; }
        .btn-outline { background:transparent; color:var(--accent); border:2px solid var(--accent); }
        .btn-sm { padding:6px 12px; font-size:0.7rem; }
        .btn-danger { background:transparent; color:var(--danger); border:2px solid var(--danger); }
        .input-group { display:flex; flex-direction:column; gap:4px; }
        .input-group label { font-size:0.7rem; font-weight:700; color:var(--text2); text-transform:uppercase; letter-spacing:0.04em; }
        .input-group input, .input-group select { background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius-sm); padding:8px 12px; color:var(--text); font-size:0.8rem; font-family:inherit; outline:none; }
        .input-group input:focus { border-color:var(--accent); }
        .map-container { height:280px; border-radius:var(--radius-sm); overflow:hidden; border:1px solid var(--border); }
        .stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
        .stat-item { background:var(--surface2); border-radius:var(--radius-sm); padding:12px; text-align:center; }
        .stat-value { font-size:1.4rem; font-weight:700; color:var(--accent); }
        .stat-label { font-size:0.65rem; color:var(--text2); }
        .chart-container { height:200px; }
        .list-item { background:var(--surface2); border-radius:var(--radius-sm); padding:10px; display:flex; align-items:center; gap:8px; font-size:0.75rem; margin-bottom:4px; flex-wrap:wrap; }
        .toast-container { position:fixed; top:16px; left:50%; transform:translateX(-50%); z-index:9999; display:flex; flex-direction:column; gap:6px; pointer-events:none; width:90%; max-width:420px; }
        .toast { padding:10px 16px; border-radius:22px; font-weight:600; font-size:0.8rem; text-align:center; animation:toastIn 0.3s, toastOut 0.3s 2.7s forwards; pointer-events:auto; box-shadow:0 8px 30px rgba(0,0,0,0.5); }
        .toast.success { background:#1a3a2a; color:var(--success); border:1px solid #2a5a3a; }
        .toast.error { background:#3a1a1a; color:var(--danger); border:1px solid #5a2a2a; }
        .toast.info { background:#1a2a3a; color:var(--accent); border:1px solid #2a3a5a; }
        @keyframes toastIn { from{opacity:0;transform:translateY(-20px);} to{opacity:1;transform:translateY(0);} }
        @keyframes toastOut { from{opacity:1;} to{opacity:0;transform:translateY(-15px);} }
        .hidden { display:none!important; }
        .toggle-row { display:flex; align-items:center; gap:12px; }
        .toggle-label { font-size:0.75rem; font-weight:600; }
        .switch { position:relative; display:inline-block; width:40px; height:24px; }
        .switch input { opacity:0; width:0; height:0; }
        .slider-toggle { position:absolute; cursor:pointer; top:0; left:0; right:0; bottom:0; background-color:#444; transition:.3s; border-radius:24px; }
        .slider-toggle:before { position:absolute; content:""; height:18px; width:18px; left:3px; bottom:3px; background-color:white; transition:.3s; border-radius:50%; }
        input:checked+.slider-toggle { background-color:var(--accent); }
        input:checked+.slider-toggle:before { transform:translateX(16px); }
        @media print { body * { visibility:hidden; } #printArea, #printArea * { visibility:visible; } #printArea { position:absolute; left:0; top:0; width:100%; } .no-print { display:none!important; } }
    </style>
</head>
<body>
    <div class="toast-container" id="toastContainer"></div>

    <!-- 登入頁面 -->
    <div class="app-container" id="authPage">
        <div class="card" style="text-align:center; padding:30px;">
            <h2 style="background:linear-gradient(135deg,#5b9cf5,#c084fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">📍 社群位置監控</h2>
            <p style="color:var(--text2);font-size:0.8rem;">分享位置、綁定好友、到訪通知、歷史軌跡分析</p>
            <p style="color:var(--success);font-size:0.7rem;" id="connectionStatus">🟢 Supabase 已連線</p>
        </div>
        <div class="card" id="loginCard">
            <div class="card-title">🔐 登入 / 註冊</div>
            <div class="input-group"><label>Email</label><input type="email" id="authEmail" placeholder="you@example.com"></div>
            <div class="input-group"><label>密碼 (至少6碼)</label><input type="password" id="authPassword" placeholder="••••••"></div>
            <div class="input-group hidden" id="nicknameGroup"><label>顯示名稱</label><input type="text" id="authNickname" placeholder="你的暱稱"></div>
            <button class="btn btn-primary" id="authActionBtn" onclick="handleAuthAction()">登入</button>
            <button class="btn btn-sm btn-outline" id="authToggleBtn" onclick="toggleAuthMode()">還沒有帳號？註冊</button>
            <div style="font-size:0.65rem;color:var(--text2);text-align:center;">
                💡 首次使用請先註冊帳號<br>
                🔗 Supabase 已自動連線
            </div>
        </div>
    </div>

    <!-- 主面板 -->
    <div class="app-container hidden" id="mainApp">
        <div class="tab-nav no-print">
            <button class="tab-btn active" onclick="switchTab('monitor')">📍 即時監控</button>
            <button class="tab-btn" onclick="switchTab('history')">📊 歷史分析</button>
        </div>
        <div id="monitorTab">
            <div class="card">
                <div class="card-title">🛰️ 我的位置</div>
                <div id="currentLocation" style="font-family:monospace; font-size:0.75rem;">--</div>
                <div style="display:flex; gap:8px;">
                    <button class="btn btn-primary" id="trackingBtn" onclick="toggleTracking()" style="flex:1;">▶️ 開始監控</button>
                    <button class="btn btn-danger btn-sm" onclick="handleLogout()">登出</button>
                </div>
            </div>
            <div class="card">
                <div class="card-title">🧑‍🤝‍🧑 好友位置</div>
                <div id="friendList" style="max-height:200px; overflow-y:auto;"><div style="text-align:center;color:var(--text2);padding:20px;">👥 尚未綁定好友</div></div>
                <button class="btn btn-sm btn-outline" onclick="showAddFriendModal()">＋ 綁定好友</button>
            </div>
            <div class="card">
                <div class="card-title">📍 定點目標</div>
                <div id="staticTargetList" style="max-height:200px; overflow-y:auto;"><div style="text-align:center;color:var(--text2);padding:20px;">📋 尚無定點目標</div></div>
                <button class="btn btn-sm btn-outline" onclick="showAddStaticTargetModal()">＋ 新增地點</button>
            </div>
            <div class="card">
                <div class="card-title">📅 期間限定活動</div>
                <div id="eventList" style="max-height:200px; overflow-y:auto;"><div style="text-align:center;color:var(--text2);padding:20px;">📋 尚無活動</div></div>
                <button class="btn btn-sm btn-outline" onclick="showAddEventModal()">＋ 新增活動</button>
            </div>
        </div>
        <div id="historyTab" class="hidden">
            <div id="printArea">
                <div class="card no-print">
                    <div class="card-title">📆 時間區間</div>
                    <div style="display:flex; gap:10px; align-items:center;"><input type="date" id="startDate" style="flex:1;"><span>～</span><input type="date" id="endDate" style="flex:1;"></div>
                    <button class="btn btn-primary" onclick="loadHistory()">🔍 查詢軌跡</button>
                </div>
                <div class="card">
                    <div class="card-title">📊 摘要儀表板</div>
                    <div class="stats-grid">
                        <div class="stat-item"><div class="stat-value" id="totalDistance">--</div><div class="stat-label">總移動距離</div></div>
                        <div class="stat-item"><div class="stat-value" id="totalStayTime">--</div><div class="stat-label">總停留時間</div></div>
                        <div class="stat-item"><div class="stat-value" id="totalStops">--</div><div class="stat-label">停留次數</div></div>
                        <div class="stat-item"><div class="stat-value" id="topPlace">--</div><div class="stat-label">最常停留點</div></div>
                    </div>
                </div>
                <div class="card"><div class="card-title">🗺️ 軌跡地圖</div><div class="map-container" id="historyMap"></div></div>
                <div class="card"><div class="card-title">📈 每日移動距離</div><div class="chart-container"><canvas id="distanceChart"></canvas></div></div>
                <div class="card"><div class="card-title">⏱️ 停留明細</div><div id="stayTable" style="max-height:200px; overflow-y:auto;"></div></div>
            </div>
            <div class="card no-print">
                <button class="btn btn-outline" onclick="exportCSV()">📥 匯出 CSV</button>
                <button class="btn btn-outline" onclick="printReport()">🖨️ 列印報表</button>
            </div>
        </div>
        <div class="card no-print">
            <div class="card-title" onclick="toggleEmailSettings()" style="cursor:pointer;">⚙️ 郵件設定 ▼</div>
            <div id="emailSettingsPanel" class="hidden">
                <div class="input-group"><label>EmailJS Public Key</label><input id="emailjsPublicKey" placeholder="abc123..."></div>
                <div class="input-group"><label>Service ID</label><input id="emailjsServiceId" placeholder="service_xxx"></div>
                <div class="input-group"><label>Template ID</label><input id="emailjsTemplateId" placeholder="template_xxx"></div>
                <div class="input-group"><label>預設收件人</label><input id="defaultRecipient" placeholder="me@example.com"></div>
                <div class="toggle-row"><span class="toggle-label">📬 每季寄送移動摘要</span><label class="switch"><input type="checkbox" id="quarterlyReportToggle" onchange="toggleQuarterlyReport()"><span class="slider-toggle"></span></label></div>
                <button class="btn btn-sm btn-outline" onclick="saveEmailSettings()">💾 儲存</button>
                <button class="btn btn-sm btn-outline" onclick="testEmailConfig()">🧪 測試郵件</button>
            </div>
        </div>
    </div>

    <script>
        // Supabase 連線（已內建您的金鑰）
        const SUPABASE_URL = 'https://hknxdvefnuxgyepuuqra.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhrbnhkdmVmbnV4Z3llcHV1cXJhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1MzM0MDAsImV4cCI6MjA5NzEwOTQwMH0.M97OwM_9CrLCrgxbyA6kQs0MLFiRDzyYlvIiGqhBGec';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = null;
        let tracking = false, watchId = null, currentPosition = null;
        let historyMap = null, distanceChart = null, currentHistoryData = null;
        let isRegisterMode = false;
        const RECORD_INTERVAL = 30000;

        // ==================== Toast 通知 ====================
        function showToast(msg, type='info') {
            const t = document.createElement('div');
            t.className = `toast ${type}`;
            t.textContent = msg;
            document.getElementById('toastContainer').appendChild(t);
            setTimeout(() => { if(t.parentNode) t.remove(); }, 4000);
        }

        // ==================== 認證功能 ====================
        function toggleAuthMode() {
            isRegisterMode = !isRegisterMode;
            document.getElementById('nicknameGroup').classList.toggle('hidden', !isRegisterMode);
            document.getElementById('authActionBtn').textContent = isRegisterMode ? '註冊' : '登入';
            document.getElementById('authToggleBtn').textContent = isRegisterMode ? '已經有帳號？登入' : '還沒有帳號？註冊';
        }

        async function handleAuthAction() {
            const email = document.getElementById('authEmail').value.trim();
            const password = document.getElementById('authPassword').value;

            if (!email || !password) {
                showToast('⚠️ 請填寫 Email 和密碼', 'error');
                return;
            }
            if (password.length < 6) {
                showToast('⚠️ 密碼至少需要 6 個字元', 'error');
                return;
            }

            // 顯示載入中
            const btn = document.getElementById('authActionBtn');
            btn.textContent = '處理中...';
            btn.disabled = true;

            try {
                if (isRegisterMode) {
                    const nickname = document.getElementById('authNickname').value.trim();
                    if (!nickname) {
                        showToast('⚠️ 請填寫顯示名稱', 'error');
                        btn.textContent = '註冊';
                        btn.disabled = false;
                        return;
                    }

                    console.log('🔐 開始註冊:', email);
                    const { data, error } = await supabase.auth.signUp({
                        email,
                        password,
                        options: {
                            data: { nickname }
                        }
                    });

                    if (error) throw error;

                    console.log('✅ 註冊回應:', data);

                    if (data.user && data.user.identities && data.user.identities.length > 0) {
                        showToast('✅ 註冊成功！請檢查信箱確認帳號（或直接登入）', 'success', 6000);
                        // 切回登入模式
                        isRegisterMode = true;
                        toggleAuthMode();
                    } else if (data.user) {
                        showToast('⚠️ 此信箱已註冊，請直接登入', 'error', 5000);
                        isRegisterMode = true;
                        toggleAuthMode();
                    }
                } else {
                    console.log('🔐 開始登入:', email);
                    const { data, error } = await supabase.auth.signInWithPassword({ email, password });

                    if (error) throw error;

                    console.log('✅ 登入成功:', data);
                    currentUser = data.user;
                    showMainApp();
                    showToast('✅ 登入成功！歡迎回來', 'success');
                }
            } catch (e) {
                console.error('❌ 認證錯誤:', e);
                showToast('❌ ' + (e.message || '認證失敗，請稍後再試'), 'error', 6000);
            } finally {
                btn.textContent = isRegisterMode ? '註冊' : '登入';
                btn.disabled = false;
            }
        }

        async function handleLogout() {
            if (tracking) stopTracking();
            await supabase.auth.signOut();
            currentUser = null;
            document.getElementById('mainApp').classList.add('hidden');
            document.getElementById('authPage').classList.remove('hidden');
            document.getElementById('authEmail').value = '';
            document.getElementById('authPassword').value = '';
            showToast('👋 已登出', 'info');
        }

        async function showMainApp() {
            document.getElementById('authPage').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            loadAllData();
            loadEmailSettingsFromStorage();
            loadQuarterlySettingFromDB();
        }

        // ==================== 資料載入 ====================
        async function loadAllData() {
            if (!currentUser) return;
            try {
                const [fRes, tRes, eRes] = await Promise.all([
                    supabase.from('friendships').select('*').eq('user_id', currentUser.id),
                    supabase.from('static_targets').select('*').eq('user_id', currentUser.id),
                    supabase.from('events').select('*').eq('user_id', currentUser.id).eq('is_expired', false)
                ]);
                renderFriends(fRes.data || []);
                renderStaticTargets(tRes.data || []);
                renderEvents(eRes.data || []);
            } catch (e) {
                console.warn('⚠️ 資料表可能不存在:', e.message);
                document.getElementById('friendList').innerHTML = '<div style="text-align:center;color:var(--warning);padding:20px;">⚠️ 請先在 Supabase 建立資料表</div>';
                document.getElementById('staticTargetList').innerHTML = '<div style="text-align:center;color:var(--warning);padding:20px;">⚠️ 請先在 Supabase 建立資料表</div>';
                document.getElementById('eventList').innerHTML = '<div style="text-align:center;color:var(--warning);padding:20px;">⚠️ 請先在 Supabase 建立資料表</div>';
            }
        }

        function renderFriends(data) {
            const el = document.getElementById('friendList');
            if (!data.length) { el.innerHTML = '<div style="text-align:center;color:var(--text2);padding:20px;">👥 尚未綁定好友</div>'; return; }
            el.innerHTML = data.map(f => `<div class="list-item" style="justify-content:space-between;"><span>🧑 ${f.friend_nickname||'好友'}</span><span style="color:var(--text2);">半徑 ${f.alert_radius||2000}m</span><button class="btn btn-sm btn-danger" onclick="removeFriendship('${f.id}')">✕</button></div>`).join('');
        }

        function renderStaticTargets(data) {
            const el = document.getElementById('staticTargetList');
            if (!data.length) { el.innerHTML = '<div style="text-align:center;color:var(--text2);padding:20px;">📋 尚無定點目標</div>'; return; }
            el.innerHTML = data.map(t => `<div class="list-item" style="justify-content:space-between;"><span>📍 ${t.name}</span><span style="color:var(--text2);">半徑 ${t.alert_radius||500}m</span><button class="btn btn-sm btn-danger" onclick="removeStaticTarget('${t.id}')">✕</button></di
